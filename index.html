<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VROOM MOTO v4.2 - Cadastro Simplificado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        :root { --vroom: #FF6B00; }
        body { font-family: 'Inter', sans-serif; background: #F8FAFC; margin: 0; padding: 0; }
        .screen { display: none; min-height: 100vh; width: 100vw; flex-direction: column; background: #F8FAFC; }
        .screen.active { display: flex; }
        .vroom-btn { background: var(--vroom); color: white; font-weight: 800; text-transform: uppercase; transition: 0.2s; }
        .input-vroom { background: #F1F5F9; border: 2px solid #E2E8F0; padding: 16px; border-radius: 18px; outline: none; font-weight: 600; width: 100%; transition: 0.2s; }
        .input-vroom:focus { border-color: var(--vroom); background: white; }
    </style>
</head>
<body>

    <!-- PORTAL -->
    <div id="screen-portal" class="screen active items-center justify-center p-8 !bg-[#0F172A] text-white">
        <h1 class="text-4xl font-black italic mb-10 tracking-tighter">VROOM<span class="text-orange-500">MOTO</span></h1>
        <div class="w-full max-w-xs space-y-4">
            <button onclick="nav('cliente-login')" class="w-full vroom-btn py-5 rounded-2xl">Pedir uma Moto</button>
            <button onclick="nav('motorista-login')" class="w-full bg-slate-800 py-5 rounded-2xl font-black uppercase text-xs">Sou Motorista</button>
            <button onclick="nav('adm-login')" class="w-full bg-transparent border-2 border-slate-700 text-slate-500 py-3 rounded-2xl text-[10px] font-black uppercase">Painel Master</button>
        </div>
    </div>

    <!-- TELA LOGIN/CADASTRO CLIENTE (SEM SENHA) -->
    <div id="screen-cliente-login" class="screen p-8 justify-center items-center">
        <div class="w-full max-w-sm text-center">
            <div class="text-5xl mb-6">🏁</div>
            <h2 class="text-3xl font-black italic mb-2 uppercase">Acesso Rápido</h2>
            <p class="text-slate-400 text-sm font-medium mb-8">Digite seus dados para entrar ou cadastrar.</p>
            
            <div class="space-y-4">
                <!-- Rodolfo: Removi a senha para acelerar o pedido -->
                <input type="text" placeholder="Seu Nome" class="input-vroom">
                <input type="text" placeholder="CPF" class="input-vroom">
                <input type="tel" placeholder="Celular (WhatsApp)" class="input-vroom">
                
                <button onclick="nav('cliente-app')" class="w-full vroom-btn py-5 rounded-2xl text-lg shadow-xl shadow-orange-500/20 mt-4 italic">
                    Entrar Agora <i class="fas fa-arrow-right ml-2"></i>
                </button>

                <div class="py-6 flex items-center gap-4">
                    <div class="h-[1px] bg-slate-200 flex-1"></div>
                    <span class="text-[10px] font-black text-slate-400 uppercase italic">Ou use</span>
                    <div class="h-[1px] bg-slate-200 flex-1"></div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <button class="bg-white border-2 border-slate-100 p-4 rounded-2xl text-slate-600 font-bold text-xs flex items-center justify-center gap-2">
                        <i class="fab fa-google text-red-500"></i> Google
                    </button>
                    <button class="bg-white border-2 border-slate-100 p-4 rounded-2xl text-slate-600 font-bold text-xs flex items-center justify-center gap-2">
                        <i class="fab fa-apple text-black"></i> Apple
                    </button>
                </div>
                
                <button onclick="nav('portal')" class="text-slate-400 text-[10px] font-black uppercase mt-10 block w-full tracking-widest italic">
                    <i class="fas fa-chevron-left mr-1"></i> Voltar ao início
                </button>
            </div>
        </div>
    </div>

    <!-- APP CLIENTE (SIMULANDO LOGIN REALIZADO) -->
    <div id="screen-cliente-app" class="screen">
        <div class="p-6 bg-white flex justify-between items-center border-b">
            <span class="text-xl font-black italic">VROOM<span class="text-orange-500">MOTO</span></span>
            <div class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center text-slate-400 border border-slate-200">
                <i class="fas fa-user"></i>
            </div>
        </div>
        <div class="p-8 flex flex-col items-center justify-center flex-1 text-center">
            <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center text-3xl mb-4">
                <i class="fas fa-check"></i>
            </div>
            <h3 class="text-2xl font-black italic uppercase">Login Sucesso!</h3>
            <p class="text-slate-400 text-sm mt-2">Cadastro simplificado sem senha ativado.</p>
            <button onclick="nav('portal')" class="mt-8 text-orange-600 font-black uppercase text-xs tracking-widest italic">Sair do App</button>
        </div>
    </div>

    <!-- REUTILIZANDO LOGIN ADM (DEMAIS TELAS MANTIDAS NO CÓDIGO) -->
    <div id="screen-adm-login" class="screen p-8 justify-center items-center">
        <div class="w-full max-w-sm bg-white p-10 rounded-[40px] shadow-2xl text-center">
            <h2 class="text-2xl font-black italic mb-8 uppercase">Acesso ADM</h2>
            <div class="space-y-4">
                <input type="text" id="adm-user" placeholder="Usuário" class="input-vroom">
                <input type="password" id="adm-pass" placeholder="Senha" class="input-vroom">
                <button onclick="loginAdm()" class="w-full vroom-btn py-4 rounded-xl">Entrar</button>
                <button onclick="nav('portal')" class="text-slate-400 text-xs font-bold uppercase">Voltar</button>
            </div>
        </div>
    </div>

    <script>
        function nav(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + id).classList.add('active');
        }
        function loginAdm() {
            const u = document.getElementById('adm-user').value;
            const p = document.getElementById('adm-pass').value;
            if(u === 'Rodolfo oliveira' && p === 'Rm290198') alert('Bem-vindo, Rodolfo!');
            else alert('Erro!');
        }
    </script>
</body>
</html>
