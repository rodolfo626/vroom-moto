<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>VROOM MOTO 3.0</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
    :root { --vroom: #FF6B00; }
    body { font-family: 'Poppins', sans-serif; background: #0F172A; color: white; margin: 0; padding: 0; overflow: hidden; }
    .screen { display: none; height: 100vh; width: 100vw; flex-direction: column; position: fixed; top: 0; left: 0; background: #F8FAFC; color: #1E293B; z-index: 10; }
    .screen.active { display: flex; }
    .vroom-btn { background: var(--vroom); color: white; border: none; font-weight: 800; transition: all 0.2s; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
    .vroom-btn:active { transform: scale(0.95); filter: brightness(1.1); }
    .card { background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #F1F5F9; }
    
    /* Portal Style */
    #screen-portal { background: #0F172A; color: white; justify-content: center; align-items: center; text-align: center; }
    
    /* Autocomplete */
    #results { position: absolute; background: white; width: 100%; max-height: 200px; overflow-y: auto; z-index: 100; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); display: none; margin-top: 5px; }
    .result-item { padding: 12px 16px; border-bottom: 1px solid #F1F5F9; font-size: 13px; cursor: pointer; color: #334155; font-weight: 600; }
    
    .type-card { border: 2px solid #F1F5F9; border-radius: 16px; padding: 12px; text-align: center; cursor: pointer; transition: 0.2s; }
    .type-card.active { border-color: var(--vroom); background: #FFF7ED; }
  </style>
</head>
<body>

  <!-- PORTAL INICIAL -->
  <div id="screen-portal" class="screen active p-8">
    <div class="text-7xl mb-6 animate-bounce">🏍️</div>
    <h1 class="text-5xl font-extrabold italic tracking-tighter mb-1">VROOM<span class="text-orange-600">MOTO</span></h1>
    <p class="text-slate-500 font-bold text-[10px] tracking-[0.3em] uppercase mb-12">Plataforma Profissional v3.0</p>
    
    <div class="w-full max-w-xs space-y-4">
      <button onclick="nav('cliente')" class="w-full vroom-btn py-5 rounded-2xl text-xl shadow-2xl">Sou Cliente</button>
      <button onclick="nav('motorista')" class="w-full bg-slate-800 text-white py-5 rounded-2xl text-xl shadow-2xl font-extrabold uppercase">Sou Motorista</button>
      <button onclick="nav('adm')" class="w-full bg-transparent border-2 border-slate-700 text-slate-400 py-4 rounded-2xl text-xs font-bold uppercase flex items-center justify-center gap-2">
        <i class="fas fa-cog"></i> Painel Administrativo
      </button>
    </div>
  </div>

  <!-- TELA CLIENTE -->
  <div id="screen-cliente" class="screen">
    <div class="p-5 bg-white flex justify-between items-center border-b shadow-sm">
      <span class="text-xl font-extrabold italic">VROOM <span class="text-orange-600">CLIENTE</span></span>
      <button onclick="location.reload()" class="text-slate-400 text-xs font-bold uppercase">Sair</button>
    </div>
    
    <div class="p-6 flex-1 overflow-y-auto space-y-6" id="cliente-content">
      <div class="card p-6">
        <h3 class="text-sm font-extrabold text-slate-400 uppercase mb-4 italic">Para onde vamos hoje?</h3>
        <div class="space-y-3 relative">
          <input type="text" id="origem" placeholder="Sua localização..." class="w-full bg-slate-50 p-4 rounded-xl border-2 border-slate-100 outline-none font-semibold text-sm">
          <div class="relative">
            <input type="text" id="destino" oninput="buscarEndereco(this.value)" placeholder="Destino final" class="w-full bg-slate-50 p-4 rounded-xl border-2 border-slate-100 outline-none focus:border-orange-500 font-bold text-sm">
            <div id="results"></div>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-3 my-6">
          <div id="mod-mun" onclick="toggleMod('mun')" class="type-card active">
            <div class="text-[9px] font-extrabold text-slate-400 uppercase">MUNICIPAL</div>
            <div id="disp-fixo" class="text-orange-600 font-extrabold text-lg italic mt-1 leading-none">R$ 0,00</div>
          </div>
          <div id="mod-inter" onclick="toggleMod('inter')" class="type-card">
            <div class="text-[9px] font-extrabold text-slate-400 uppercase">INTER (KM)</div>
            <div id="disp-km" class="text-orange-600 font-extrabold text-lg italic mt-1 leading-none">R$ 0,00</div>
          </div>
        </div>

        <button id="btn-pedir" onclick="solicitarCorrida()" class="w-full vroom-btn py-5 rounded-2xl text-xl shadow-lg">Chamar Moto</button>
      </div>
    </div>
  </div>

  <!-- TELA MOTORISTA -->
  <div id="screen-motorista" class="screen">
    <div class="p-5 bg-slate-900 text-white flex justify-between items-center shadow-xl">
      <span class="text-xl font-extrabold italic">VROOM <span class="text-orange-600">MOTOS</span></span>
      <button id="btn-online" onclick="toggleOnline()" class="bg-red-500 px-5 py-2 rounded-xl font-extrabold text-[10px] uppercase shadow-lg">Offline</button>
    </div>
    <div class="p-6 flex-1 overflow-y-auto space-y-4" id="fila-motorista">
      <div class="text-center p-20 text-slate-400 font-bold italic opacity-40">Aguardando pedidos...</div>
    </div>
  </div>

  <!-- TELA ADM -->
  <div id="screen-adm" class="screen">
    <div class="p-5 bg-slate-800 text-white flex justify-between items-center">
      <span class="text-xl font-extrabold italic uppercase">Central ADM</span>
      <button onclick="location.reload()" class="bg-slate-700 px-4 py-2 rounded-lg text-[10px] font-extrabold uppercase">Voltar</button>
    </div>
    <div class="p-6 flex-1 overflow-y-auto space-y-6">
      <div class="card p-6 border-t-8 border-orange-500">
        <h4 class="text-xs font-extrabold text-slate-400 uppercase mb-4 text-center">Configurar Tarifas</h4>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="text-[9px] font-extrabold text-slate-500 uppercase">Preço Municipal</label>
            <input type="number" id="set-fixo" class="w-full bg-slate-50 p-3 rounded-lg border-2 border-slate-100 font-extrabold text-orange-600 outline-none">
          </div>
          <div>
            <label class="text-[9px] font-extrabold text-slate-500 uppercase">Valor por KM</label>
            <input type="number" step="0.1" id="set-km" class="w-full bg-slate-50 p-3 rounded-lg border-2 border-slate-100 font-extrabold text-orange-600 outline-none">
          </div>
        </div>
        <button onclick="salvarConfig()" class="w-full bg-slate-900 text-white py-4 rounded-xl font-extrabold uppercase text-xs mt-6 shadow-xl">Salvar e Atualizar Todos</button>
      </div>
      
      <div class="space-y-3">
        <h4 class="text-xs font-extrabold text-slate-400 uppercase italic">Corridas em Andamento</h4>
        <div id="monitor-corridas" class="space-y-2"></div>
      </div>
    </div>
  </div>

  <script>
    // SISTEMA DE DADOS CENTRALIZADO
    const ENDPOINT = 'https://vroom-moto-default-rtdb.firebaseio.com/vroom_v3_master.json';
    let DB = { 
      corridas: [], 
      config: { fixo: 7.0, km: 2.5 } 
    };
    
    let APP = { 
      user: null, 
      online: false, 
      mod: 'mun', 
      distancia: 0, 
      origem: null, 
      destino: null,
      idAtivo: null 
    };

    function nav(role) {
      APP.user = role;
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById('screen-' + role).classList.add('active');
      
      if(role === 'cliente') {
        detectarLocal();
      } else if(role === 'adm') {
        document.getElementById('set-fixo').value = DB.config.fixo;
        document.getElementById('set-km').value = DB.config.km;
      }
      iniciarSync();
    }

    function detectarLocal() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
          APP.origem = { lat: pos.coords.latitude, lon: pos.coords.longitude };
          fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`)
            .then(r => r.json()).then(data => {
              document.getElementById('origem').value = data.display_name.split(',')[0] + ', ' + data.display_name.split(',')[1];
            });
        });
      }
    }

    async function buscarEndereco(q) {
      const resDiv = document.getElementById('results');
      if(q.length < 3) { resDiv.style.display = 'none'; return; }
      try {
        const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}&limit=5&countrycodes=br`);
        const data = await r.json();
        if(data.length > 0) {
          resDiv.innerHTML = data.map(i => `<div class="result-item" onclick="selecionarDestino('${i.display_name}', ${i.lat}, ${i.lon})">${i.display_name}</div>`).join('');
          resDiv.style.display = 'block';
        }
      } catch(e){}
    }

    function selecionarDestino(nome, lat, lon) {
      document.getElementById('destino').value = nome;
      document.getElementById('results').style.display = 'none';
      APP.destino = { lat, lon };
      calcularRota();
    }

    async function calcularRota() {
      if(!APP.origem || !APP.destino) return;
      const url = `https://router.project-osrm.org/route/v1/driving/${APP.origem.lon},${APP.origem.lat};${APP.destino.lon},${APP.destino.lat}?overview=false`;
      try {
        const r = await fetch(url);
        const data = await r.json();
        if(data.routes && data.routes[0]) {
          APP.distancia = data.routes[0].distance / 1000;
          atualizarPrecos();
        }
      } catch(e){}
    }

    function atualizarPrecos() {
      const fixo = DB.config.fixo;
      const totalInter = APP.distancia * DB.config.km;
      
      document.getElementById('disp-fixo').innerText = `R$ ${fixo.toFixed(2).replace('.',',')}`;
      document.getElementById('disp-km').innerText = `R$ ${totalInter.toFixed(2).replace('.',',')}`;
    }

    function toggleMod(m) {
      APP.mod = m;
      document.getElementById('mod-mun').classList.toggle('active', m === 'mun');
      document.getElementById('mod-inter').classList.toggle('active', m === 'inter');
    }

    async function solicitarCorrida() {
      const dest = document.getElementById('destino').value;
      if(!dest) return alert('Escolha o destino!');
      
      let valor = APP.mod === 'mun' ? DB.config.fixo : (APP.distancia * DB.config.km);
      APP.idAtivo = Date.now();
      
      const nova = { 
        id: APP.idAtivo, 
        destino: dest.split(',')[0], 
        valor: `R$ ${valor.toFixed(2).replace('.',',')}`, 
        status: 'procurando' 
      };
      
      DB.corridas.push(nova);
      await pushDB();
      renderStatusCliente('procurando');
    }

    function toggleOnline() {
      APP.online = !APP.online;
      const btn = document.getElementById('btn-online');
      btn.innerText = APP.online ? 'Online' : 'Offline';
      btn.className = APP.online ? 'bg-green-500 px-5 py-2 rounded-xl font-extrabold text-[10px] uppercase shadow-lg' : 'bg-red-500 px-5 py-2 rounded-xl font-extrabold text-[10px] uppercase shadow-lg';
      if(APP.online) renderMotorista();
    }

    async function aceitar(id) {
      const c = DB.corridas.find(x => x.id === id);
      if(c) { c.status = 'aceita'; await pushDB(); }
    }

    async function salvarConfig() {
      DB.config.fixo = parseFloat(document.getElementById('set-fixo').value);
      DB.config.km = parseFloat(document.getElementById('set-km').value);
      await pushDB();
      alert('Preços atualizados!');
    }

    async function pushDB() {
      try { await fetch(ENDPOINT, { method: 'PUT', body: JSON.stringify(DB) }); } catch(e){}
    }

    function iniciarSync() {
      if(window.syncInterval) clearInterval(window.syncInterval);
      window.syncInterval = setInterval(async () => {
        try {
          const r = await fetch(ENDPOINT + '?t=' + Date.now());
          const data = await r.json();
          if(data) {
            DB = data;
            if(APP.user === 'motorista' && APP.online) renderMotorista();
            if(APP.user === 'cliente' && APP.idAtivo) conferirStatusCliente();
            if(APP.user === 'adm') renderMonitorAdm();
            atualizarPrecos();
          }
        } catch(e){}
      }, 3000);
    }

    function renderMotorista() {
      const container = document.getElementById('fila-motorista');
      const abertas = (DB.corridas || []).filter(c => c.status === 'procurando');
      if(abertas.length === 0) { container.innerHTML = '<div class="text-center p-20 text-slate-400 font-bold italic opacity-40">Aguardando pedidos...</div>'; return; }
      container.innerHTML = abertas.map(c => `
        <div class="card p-6 border-l-[12px] border-orange-500">
          <div class="text-lg font-extrabold text-slate-800 italic">${c.destino}</div>
          <div class="flex justify-between items-center mt-4">
            <span class="text-orange-600 font-extrabold text-xl italic">${c.valor}</span>
            <button onclick="aceitar(${c.id})" class="bg-slate-900 text-white px-8 py-3 rounded-xl font-extrabold uppercase text-xs">Aceitar</button>
          </div>
        </div>`).join('');
    }

    function renderMonitorAdm() {
      const container = document.getElementById('monitor-corridas');
      const todas = DB.corridas || [];
      if(todas.length === 0) { container.innerHTML = '<div class="text-center p-5 text-slate-400 font-bold text-xs">Nenhuma corrida.</div>'; return; }
      container.innerHTML = todas.map(c => `
        <div class="bg-white p-4 rounded-xl border flex justify-between items-center shadow-sm">
          <div class="text-xs font-extrabold text-slate-700">${c.destino}</div>
          <div class="text-right">
            <div class="text-[8px] font-extrabold ${c.status === 'aceita' ? 'text-green-500' : 'text-orange-500'} uppercase">${c.status}</div>
            <div class="text-xs font-extrabold text-slate-900">${c.valor}</div>
          </div>
        </div>`).join('');
    }

    function conferirStatusCliente() {
      const minha = (DB.corridas || []).find(c => c.id === APP.idAtivo);
      if(minha && minha.status === 'aceita') renderStatusCliente('aceita');
    }

    function renderStatusCliente(st) {
      const container = document.getElementById('cliente-content');
      if(st === 'procurando') {
        container.innerHTML = `<div class="card p-12 bg-orange-600 text-white text-center"><div class="text-3xl font-extrabold italic uppercase animate-pulse">Buscando Moto...</div><div class="text-[10px] mt-4 opacity-70 uppercase font-extrabold tracking-widest">Sincronizando com a nuvem</div></div>`;
      } else if(st === 'aceita') {
        container.innerHTML = `<div class="card p-12 bg-green-600 text-white text-center"><div class="text-3xl font-extrabold italic uppercase">Motorista Aceitou!</div><p class="text-xs mt-2 opacity-80">Ele já está a caminho do seu local.</p><button onclick="location.reload()" class="mt-10 bg-white text-green-600 px-10 py-4 rounded-2xl font-extrabold uppercase text-xs shadow-2xl">Finalizar</button></div>`;
      }
    }
  </script>
</body>
</html>
