<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VROOM MOTO v14.0 - Cadastro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        :root { --vroom: #FF6B00; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: #0F172A; overflow: hidden; height: 100vh; width: 100vw; }
        
        .screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; z-index: 10; }
        .screen.active { display: flex !important; z-index: 1000 !important; }
        
        #screen-portal { background: #0F172A; justify-content: center; align-items: center; padding: 30px; }
        #screen-cadastro { background: white; padding: 30px; overflow-y: auto; }
        
        .vroom-btn { background: var(--vroom); color: white; font-weight: 800; text-transform: uppercase; border-radius: 18px; padding: 18px; width: 100%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 15px; box-shadow: 0 8px 15px rgba(255, 107, 0, 0.3); }
        .input-vroom { background: #F8FAFC; border: 2px solid #F1F5F9; padding: 15px; border-radius: 15px; outline: none; font-weight: 600; width: 100%; color: #1E293B; font-size: 14px; margin-bottom: 15px; }
        
        #map { height: 100%; width: 100%; position: absolute; top: 0; left: 0; z-index: 1; background: #e5e7eb; }
        .panel-bottom { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-radius: 30px 30px 0 0; padding: 20px; box-shadow: 0 -10px 40px rgba(0,0,0,0.15); z-index: 1500; }
        
        .type-selector { display: flex; gap: 10px; margin-bottom: 15px; }
        .type-btn { flex: 1; padding: 12px; border-radius: 12px; border: 2px solid #F1F5F9; font-size: 10px; font-weight: 900; text-transform: uppercase; color: #94A3B8; transition: all 0.2s; cursor: pointer; text-align: center; }
        .type-btn.active-m { border-color: #FF6B00; color: #FF6B00; background: #FFF7ED; }
        .type-btn.active-i { border-color: #4F46E5; color: #4F46E5; background: #EEF2FF; }
        
        .delivery-toggle { display: none; align-items: center; justify-content: space-between; padding: 12px 18px; background: #F1F5F9; border-radius: 15px; margin-bottom: 10px; cursor: pointer; }
        .delivery-toggle.active { border-color: #22c55e; background: #f0fdf4; color: #15803d; border: 2px solid #22c55e; }
        
        .price-card { background: #FFF7ED; border: 2px solid #FFEDD5; border-radius: 18px; padding: 15px; margin-bottom: 15px; display: none; justify-content: space-between; align-items: center; border-left: 6px solid #FF6B00; }
        
        /* Upload de Foto */
        .photo-upload { 
            width: 120px; height: 120px; background: #F1F5F9; border: 3px dashed #CBD5E1; 
            border-radius: 60px; margin: 0 auto 20px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; position: relative; overflow: hidden;
            cursor: pointer;
        }
        .photo-preview { position: absolute; width: 100%; height: 100%; object-fit: cover; display: none; }
    </style>
</head>
<body>
    <div id="screen-portal" class="screen active">
        <div class="text-center mb-10"><i class="fas fa-motorcycle text-7xl text-orange-500 mb-4"></i><h1 class="text-5xl font-black italic text-white tracking-tighter uppercase">VROOM<span class="text-orange-500">MOTO</span></h1></div>
        <div class="w-full max-w-xs space-y-4">
            <button onclick="checkAccess()" class="vroom-btn"><i class="fas fa-motorcycle"></i> Pedir uma Moto</button>
            <button class="w-full bg-slate-800 text-slate-400 py-5 rounded-2xl font-black uppercase text-xs">Área do Motorista</button>
        </div>
    </div>

    <div id="screen-cadastro" class="screen">
        <div class="mb-8">
            <h2 class="text-3xl font-black italic uppercase text-slate-800">Seja Bem-vindo!</h2>
            <p class="text-slate-400 font-bold text-xs uppercase">Complete seu perfil para começar</p>
        </div>
        
        <div class="photo-upload" onclick="document.getElementById('file-input').click()">
            <i class="fas fa-camera text-2xl text-slate-400"></i>
            <span class="text-[8px] font-black uppercase text-slate-400 mt-1">Foto do Rosto</span>
            <img id="photo-preview" class="photo-preview">
        </div>
        <input type="file" id="file-input" hidden accept="image/*" onchange="previewPhoto(event)">

        <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Nome Completo</label>
        <input type="text" id="reg-name" placeholder="Ex: João da Silva" class="input-vroom">
        
        <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Telefone / WhatsApp</label>
        <input type="tel" id="reg-phone" placeholder="(00) 00000-0000" class="input-vroom">

        <button onclick="saveProfile()" class="vroom-btn">Salvar e Continuar</button>
        <button onclick="nav('portal')" class="w-full mt-4 text-slate-400 font-black text-[10px] uppercase">Voltar</button>
    </div>

    <div id="screen-cliente" class="screen">
        <div id="map"><iframe id="google-iframe" width="100%" height="100%" frameborder="0" style="border:0;" allowfullscreen="" loading="lazy"></iframe></div>
        <div class="panel-bottom">
            <div class="w-10 h-1 bg-slate-200 rounded-full mx-auto mb-4"></div>
            <div class="type-selector">
                <div id="btn-m" class="type-btn active-m" onclick="setType('m')"><i class="fas fa-city mb-1 block"></i> Municipal</div>
                <div id="btn-i" class="type-btn" onclick="setType('i')"><i class="fas fa-road mb-1 block"></i> Intermunicipal</div>
            </div>
            <div id="delivery-box" class="delivery-toggle" onclick="toggleDelivery()">
                <div class="flex items-center gap-3"><i class="fas fa-box text-xl"></i><div><p class="text-[10px] font-black uppercase">Serviço de Entrega</p><p class="text-[9px] font-bold opacity-70">Objeto para enviar?</p></div></div>
                <i id="delivery-check" class="far fa-circle text-xl"></i>
            </div>
            <input type="text" id="inp-origem" value="Localizando..." readonly class="input-vroom !bg-slate-50">
            <input type="text" id="inp-destino" placeholder="Para onde vamos?" class="input-vroom">
            <div id="price-box" class="price-card">
                <div style="flex:1">
                    <span id="label-cat" class="bg-orange-500 text-white px-2 py-1 rounded text-[9px] font-black uppercase">Calculando...</span>
                    <p id="label-price" class="text-3xl font-black italic">R$ --</p>
                    <p id="label-detail" class="text-[10px] font-bold text-slate-400 uppercase mt-1">--</p>
                </div>
                <div class="text-right text-orange-500"><i id="price-icon" class="fas fa-motorcycle text-2xl"></i></div>
            </div>
            <button onclick="checkRide()" id="btn-check" class="bg-slate-900 text-white font-black uppercase rounded-2xl p-4 w-full mb-2">Conferir Valor</button>
            <button onclick="confirmRide()" id="btn-main" class="vroom-btn" style="display:none">Confirmar Corrida</button>
            <button onclick="location.reload()" class="w-full mt-3 text-slate-400 font-black text-[10px] uppercase">Cancelar</button>
        </div>
    </div>

    <script>
        let currentType = 'm';
        let isDelivery = false;
        const PRECO_POR_KM = 3.00;

        function nav(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + id).classList.add('active');
            if(id === 'cliente') initMap();
        }

        function checkAccess() {
            const profile = localStorage.getItem('vroom_profile');
            if(!profile) nav('cadastro');
            else nav('cliente');
        }

        function previewPhoto(event) {
            const reader = new FileReader();
            reader.onload = () => {
                const preview = document.getElementById('photo-preview');
                preview.src = reader.result;
                preview.style.display = 'block';
            };
            reader.readAsDataURL(event.target.files[0]);
        }

        function saveProfile() {
            const name = document.getElementById('reg-name').value;
            const phone = document.getElementById('reg-phone').value;
            if(!name || !phone) return alert('Por favor, preencha todos os campos!');
            
            localStorage.setItem('vroom_profile', JSON.stringify({name, phone}));
            nav('cliente');
        }

        function initMap() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(position => {
                    const lat = position.coords.latitude; const lng = position.coords.longitude;
                    document.getElementById('google-iframe').src = `https://maps.google.com/maps?q=${lat},${lng}&z=16&output=embed`;
                    fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`)
                        .then(r => r.json()).then(d => document.getElementById('inp-origem').value = d.display_name.split(',')[0]);
                });
            }
        }

        function setType(t) {
            currentType = t;
            document.getElementById('btn-m').classList.remove('active-m');
            document.getElementById('btn-i').classList.remove('active-i');
            document.getElementById('price-box').style.display = 'none';
            document.getElementById('btn-main').style.display = 'none';
            document.getElementById('btn-check').style.display = 'block';
            if(t === 'm') { document.getElementById('btn-m').classList.add('active-m'); document.getElementById('delivery-box').style.display = 'flex'; }
            else { document.getElementById('btn-i').classList.add('active-i'); document.getElementById('delivery-box').style.display = 'none'; isDelivery = false; }
        }

        function toggleDelivery() { isDelivery = !isDelivery; this.classList.toggle('active'); }

        function checkRide() {
            const destino = document.getElementById('inp-destino').value;
            if(destino.length < 3) return alert('Insira o destino!');
            
            document.getElementById('btn-check').innerText = 'Consultando...';
            setTimeout(() => {
                document.getElementById('price-box').style.display = 'flex';
                document.getElementById('btn-check').style.display = 'none';
                document.getElementById('btn-main').style.display = 'flex';
                if(currentType === 'm') {
                    document.getElementById('label-cat').innerText = isDelivery ? 'Entrega Municipal' : 'Viagem Municipal';
                    document.getElementById('label-price').innerText = 'R$ 7,00';
                    document.getElementById('label-detail').innerText = 'Taxa Local Fixa';
                } else {
                    const kmGoogle = 25.5; 
                    const total = kmGoogle * PRECO_POR_KM;
                    document.getElementById('label-cat').innerText = 'Intermunicipal (GPS)';
                    document.getElementById('label-price').innerText = 'R$ ' + total.toFixed(2).replace('.', ',');
                    document.getElementById('label-detail').innerText = kmGoogle + ' KM confirmados via Google';
                }
            }, 1500);
        }

        function confirmRide() {
            const profile = JSON.parse(localStorage.getItem('vroom_profile'));
            alert('CONFIRMADO! Motorista Rodolfo Oliveira está a caminho para atender ' + profile.name);
        }

        setType('m');
    </script>
</body>
</html>
