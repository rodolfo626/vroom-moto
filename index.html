<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VROOM MOTO v4.4 - Gestão Centralizada</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        :root { --vroom: #FF6B00; }
        body { font-family: 'Inter', sans-serif; background: #0F172A; margin: 0; padding: 0; }
        .screen { display: none; min-height: 100vh; width: 100vw; flex-direction: column; background: #F8FAFC; }
        .screen.active { display: flex; }
        .vroom-btn { background: var(--vroom); color: white; font-weight: 800; text-transform: uppercase; transition: 0.2s; border-radius: 18px; }
        .input-vroom { background: #F1F5F9; border: 2px solid #E2E8F0; padding: 16px; border-radius: 18px; outline: none; font-weight: 600; width: 100%; color: #1E293B; }
        .input-vroom:focus { border-color: var(--vroom); background: white; }
    </style>
</head>
<body>

    <!-- PORTAL INICIAL -->
    <div id="screen-portal" class="screen active items-center justify-center p-8 !bg-[#0F172A] text-white">
        <h1 class="text-4xl font-black italic mb-10 tracking-tighter uppercase text-center">VROOM<span class="text-orange-500">MOTO</span></h1>
        <div class="w-full max-w-xs space-y-4">
            <button onclick="nav('cliente-login')" class="w-full vroom-btn py-5">Pedir uma Moto</button>
            <button onclick="nav('motorista-login')" class="w-full bg-slate-800 py-5 rounded-2xl font-black uppercase text-xs">Acesso Motorista</button>
            <button onclick="nav('adm-login')" class="w-full bg-transparent border-2 border-slate-700 text-slate-500 py-3 rounded-2xl text-[10px] font-black uppercase">Painel Master</button>
        </div>
    </div>

    <!-- TELA LOGIN MOTORISTA (SOMENTE LOGIN) -->
    <div id="screen-motorista-login" class="screen p-8 justify-center items-center">
        <div class="w-full max-w-sm text-center">
            <div class="text-5xl mb-6">🏍️</div>
            <h2 class="text-3xl font-black italic mb-2 uppercase text-slate-800">Motorista</h2>
            <p class="text-slate-400 text-sm font-medium mb-8">Entre com seus dados de acesso.</p>
            
            <div class="space-y-4">
                <input type="text" placeholder="Usuário (E-mail ou CPF)" class="input-vroom">
                <input type="password" placeholder="Sua Senha" class="input-vroom">
                <button onclick="alert('Login realizado! Verificando status da mensalidade...')" class="w-full vroom-btn py-5 shadow-xl shadow-orange-500/20">Entrar para Trabalhar</button>
                <button class="text-orange-600 text-[10px] font-black uppercase tracking-widest mt-4">Esqueci minha senha</button>
                <button onclick="nav('portal')" class="text-slate-400 text-[10px] font-black uppercase mt-10 block w-full">Voltar ao Início</button>
            </div>
        </div>
    </div>

    <!-- PAINEL ADM - CADASTRO DE MOTORISTA (CENTRALIZADO AQUI) -->
    <div id="screen-adm-dashboard" class="screen overflow-y-auto">
        <div class="p-6 bg-slate-900 text-white flex justify-between items-center sticky top-0 z-50">
            <span class="font-black italic uppercase">VROOM <span class="text-orange-500">MASTER</span></span>
            <button onclick="nav('portal')" class="text-slate-400"><i class="fas fa-sign-out-alt"></i></button>
        </div>

        <div class="p-6 space-y-8">
            <div class="bg-white p-6 rounded-[32px] border shadow-sm">
                <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-6 text-center italic">Novo Motorista (Cadastro Central)</h3>
                
                <div class="space-y-4">
                    <div class="flex flex-col items-center mb-6">
                        <div class="w-20 h-20 bg-slate-100 rounded-full border-2 border-dashed border-slate-300 flex items-center justify-center text-slate-400 cursor-pointer">
                            <i class="fas fa-camera text-xl"></i>
                        </div>
                        <span class="text-[8px] font-black text-slate-400 mt-2 uppercase">Foto do Perfil</span>
                    </div>

                    <div class="grid grid-cols-1 gap-3">
                        <input type="text" placeholder="Nome do Motorista" class="input-vroom !py-3 !text-sm">
                        <input type="text" placeholder="CPF" class="input-vroom !py-3 !text-sm">
                        <input type="text" placeholder="Modelo da Moto / Placa" class="input-vroom !py-3 !text-sm">
                        <input type="password" placeholder="Definir Senha Inicial" class="input-vroom !py-3 !text-sm">
                    </div>
                    
                    <button class="w-full vroom-btn py-4 shadow-lg shadow-orange-500/10 mt-4 italic">Cadastrar e Ativar Motorista</button>
                </div>
            </div>

            <div class="bg-slate-100 p-6 rounded-[32px]">
                 <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4">Motoristas Ativos</h3>
                 <div class="space-y-3">
                     <div class="bg-white p-4 rounded-2xl flex items-center justify-between shadow-sm">
                         <div class="flex items-center gap-3">
                             <div class="w-10 h-10 bg-orange-100 rounded-full"></div>
                             <div class="flex flex-col">
                                 <span class="text-xs font-black text-slate-800">João Silva</span>
                                 <span class="text-[8px] font-bold text-green-500 uppercase">Em Corrida</span>
                             </div>
                         </div>
                         <button class="text-slate-300"><i class="fas fa-ellipsis-v"></i></button>
                     </div>
                 </div>
            </div>
        </div>
    </div>

    <!-- LOGIN ADM REPRODUZIDO -->
    <div id="screen-adm-login" class="screen p-8 justify-center items-center">
        <div class="w-full max-w-sm bg-white p-10 rounded-[40px] shadow-2xl text-center">
            <h2 class="text-2xl font-black italic mb-8 uppercase text-slate-800">Acesso Master</h2>
            <div class="space-y-4 text-center">
                <input type="text" id="adm-user" placeholder="Usuário" class="input-vroom text-center">
                <input type="password" id="adm-pass" placeholder="Senha" class="input-vroom text-center">
                <button onclick="loginAdm()" class="w-full vroom-btn py-4">Entrar no Painel</button>
                <button onclick="nav('portal')" class="text-slate-400 text-[10px] font-black uppercase mt-6 block">Voltar</button>
            </div>
        </div>
    </div>

    <script>
        function nav(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + id).classList.add('active');
        }
        function loginAdm() {
            const u = document.getElementById('adm-user').value;
            const p = document.getElementById('adm-pass').value;
            if(u === 'Rodolfo oliveira' && p === 'Rm290198') nav('adm-dashboard');
            else alert('Acesso Negado!');
        }
    </script>
</body>
</html>
