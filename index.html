<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VROOM MOTO v4.3 - Cadastro com Foto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        :root { --vroom: #FF6B00; }
        body { font-family: 'Inter', sans-serif; background: #F8FAFC; margin: 0; padding: 0; }
        .screen { display: none; min-height: 100vh; width: 100vw; flex-direction: column; background: #F8FAFC; }
        .screen.active { display: flex; }
        .vroom-btn { background: var(--vroom); color: white; font-weight: 800; text-transform: uppercase; transition: 0.2s; }
        .input-vroom { background: #F1F5F9; border: 2px solid #E2E8F0; padding: 14px; border-radius: 16px; outline: none; font-weight: 600; width: 100%; }
        .photo-upload { width: 100px; height: 100px; background: #F1F5F9; border: 3px dashed #E2E8F0; border-radius: 50%; display: flex; flex-direction: column; items-center; justify-center; cursor: pointer; margin: 0 auto 20px; overflow: hidden; position: relative; }
        .photo-upload i { font-size: 24px; color: #94A3B8; }
        .photo-upload span { font-size: 8px; font-weight: 800; text-transform: uppercase; color: #94A3B8; margin-top: 4px; }
        .photo-preview { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; display: none; }
    </style>
</head>
<body>

    <!-- PORTAL -->
    <div id="screen-portal" class="screen active items-center justify-center p-8 !bg-[#0F172A] text-white">
        <h1 class="text-4xl font-black italic mb-10">VROOM<span class="text-orange-500">MOTO</span></h1>
        <div class="w-full max-w-xs space-y-4">
            <button onclick="nav('cliente-login')" class="w-full vroom-btn py-5 rounded-2xl">Área do Cliente</button>
            <button onclick="nav('motorista-login')" class="w-full bg-slate-800 py-5 rounded-2xl font-black uppercase text-xs">Área do Motorista</button>
            <button onclick="nav('adm-login')" class="w-full bg-transparent border-2 border-slate-700 text-slate-500 py-3 rounded-2xl text-[10px] font-black uppercase">Painel Master</button>
        </div>
    </div>

    <!-- CADASTRO CLIENTE COM FOTO -->
    <div id="screen-cliente-login" class="screen p-8 justify-center items-center">
        <div class="w-full max-w-sm text-center">
            <h2 class="text-2xl font-black italic mb-6 uppercase">Cadastro de Cliente</h2>
            
            <!-- Campo de Foto -->
            <div class="photo-upload" onclick="triggerUpload('photo-cli')">
                <i class="fas fa-camera"></i>
                <span>Adicionar Foto</span>
                <img id="preview-cli" class="photo-preview">
                <input type="file" id="photo-cli" hidden accept="image/*" onchange="previewImg(this, 'preview-cli')">
            </div>

            <div class="space-y-3">
                <input type="text" placeholder="Nome Completo" class="input-vroom">
                <input type="text" placeholder="CPF" class="input-vroom">
                <input type="tel" placeholder="WhatsApp" class="input-vroom">
                <button onclick="nav('portal')" class="w-full vroom-btn py-4 rounded-xl mt-4">Concluir Cadastro</button>
                <button onclick="nav('portal')" class="text-slate-400 text-[10px] font-black uppercase mt-6 block w-full">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- CADASTRO MOTORISTA COM FOTO -->
    <div id="screen-motorista-login" class="screen p-8 justify-center items-center">
        <div class="w-full max-w-sm text-center">
            <h2 class="text-2xl font-black italic mb-6 uppercase text-slate-800">Novo Motorista</h2>
            
            <div class="photo-upload" onclick="triggerUpload('photo-mot')">
                <i class="fas fa-user-plus"></i>
                <span>Foto de Perfil</span>
                <img id="preview-mot" class="photo-preview">
                <input type="file" id="photo-mot" hidden accept="image/*" onchange="previewImg(this, 'preview-mot')">
            </div>

            <div class="space-y-3 text-left">
                <label class="text-[9px] font-black text-slate-400 uppercase ml-2">Dados Pessoais</label>
                <input type="text" placeholder="Nome Completo" class="input-vroom">
                <input type="text" placeholder="CPF" class="input-vroom">
                <input type="password" placeholder="Crie sua Senha" class="input-vroom">
                
                <label class="text-[9px] font-black text-slate-400 uppercase ml-2 block mt-4">Dados da Moto</label>
                <input type="text" placeholder="Placa da Moto" class="input-vroom">
                
                <button onclick="nav('portal')" class="w-full bg-slate-900 text-white py-4 rounded-xl mt-6 font-black uppercase italic">Enviar para Aprovação</button>
                <button onclick="nav('portal')" class="text-slate-400 text-xs font-black uppercase mt-4 block w-full text-center">Voltar</button>
            </div>
        </div>
    </div>

    <!-- CADASTRO/LOGIN ADM COM FOTO -->
    <div id="screen-adm-login" class="screen p-8 justify-center items-center">
        <div class="w-full max-w-sm bg-white p-10 rounded-[40px] shadow-2xl text-center">
            <h2 class="text-2xl font-black italic mb-6 uppercase">Acesso Master</h2>
            
            <!-- Avatar do Admin (Rodolfo por padrão) -->
            <div class="w-20 h-20 bg-slate-100 rounded-full mx-auto mb-6 border-2 border-orange-500 p-1">
                <img src="https://ui-avatars.com/api/?name=Rodolfo+Oliveira&background=0F172A&color=fff" class="w-full h-full rounded-full object-cover">
            </div>

            <div class="space-y-4">
                <input type="text" id="adm-user" placeholder="Usuário" class="input-vroom text-center">
                <input type="password" id="adm-pass" placeholder="Senha" class="input-vroom text-center">
                <button onclick="loginAdm()" class="w-full vroom-btn py-4 rounded-xl">Entrar no Sistema</button>
                <button onclick="nav('portal')" class="text-slate-400 text-[10px] font-black uppercase mt-4 block">Voltar</button>
            </div>
        </div>
    </div>

    <script>
        function nav(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + id).classList.add('active');
        }

        function triggerUpload(id) {
            document.getElementById(id).click();
        }

        function previewImg(input, previewId) {
            if (input.files && input.files[0]) {
                var reader = new FileReader();
                reader.onload = function(e) {
                    const preview = document.getElementById(previewId);
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function loginAdm() {
            const u = document.getElementById('adm-user').value;
            const p = document.getElementById('adm-pass').value;
            if(u === 'Rodolfo oliveira' && p === 'Rm290198') alert('Bem-vindo, Rodolfo!');
            else alert('Erro!');
        }
    </script>
</body>
</html>
