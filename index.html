<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vroom Moto - Preços Fixos</title>
    <style>
        :root { --primary: #FF6B00; --dark: #000000; --surface: #121212; --text: #FFFFFF; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: var(--text); margin: 0; padding: 0; }
        .header { padding: 20px; text-align: center; background: var(--surface); border-bottom: 2px solid var(--primary); }
        .logo { font-size: 24px; font-weight: 900; color: var(--primary); margin: 0; letter-spacing: 1px; }
        .modo-selector { display: flex; background: #1a1a1a; padding: 10px; gap: 10px; }
        .modo-btn { flex: 1; padding: 15px; border: none; border-radius: 12px; background: #333; color: white; font-weight: bold; cursor: pointer; font-size: 14px; transition: 0.3s; }
        .modo-btn.active { background: var(--primary); box-shadow: 0 0 15px rgba(255,107,0,0.3); }
        .container { padding: 20px; max-width: 500px; margin: auto; }
        .card { background: var(--surface); padding: 25px; border-radius: 24px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        label { display: block; font-size: 11px; color: var(--primary); font-weight: bold; text-transform: uppercase; margin-bottom: 8px; margin-top: 15px; }
        input, select { width: 100%; padding: 16px; border-radius: 14px; border: 1px solid #444; background: #222; color: white; box-sizing: border-box; font-size: 16px; }
        input:focus { border-color: var(--primary); outline: none; }
        .price-display { margin-top: 25px; background: rgba(255,107,0,0.05); padding: 20px; border-radius: 20px; text-align: center; border: 2px dashed rgba(255,107,0,0.3); }
        .price-val { font-size: 42px; font-weight: 900; color: var(--primary); display: block; margin-top: 5px; }
        .btn-solicitar { background: var(--primary); color: white; border: none; padding: 22px; border-radius: 18px; width: 100%; font-weight: bold; font-size: 20px; cursor: pointer; margin-top: 25px; box-shadow: 0 8px 20px rgba(255,107,0,0.3); transition: 0.3s; }
        .btn-solicitar:active { transform: scale(0.97); }
        .footer-info { text-align: center; font-size: 11px; opacity: 0.5; margin-top: 20px; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="logo">VROOM MOTO</h1>
    </div>
    <div class="modo-selector">
        <button class="modo-btn active" id="btn-mun" onclick="trocarModo('municipal')">📍 MUNICIPAL</button>
        <button class="modo-btn" id="btn-int" onclick="trocarModo('intermunicipal')">🛣️ INTERMUNICIPAL</button>
    </div>
    <div class="container">
        <div class="card">
            <label>Ponto de Partida</label>
            <input type="text" id="partida" placeholder="Detectando GPS..." readonly>
            <label>Para onde vamos?</label>
            <input type="text" id="destino" placeholder="Digite o bairro ou cidade" oninput="atualizarPreco()">
            <label>Tipo de Moto</label>
            <select id="categoria" onchange="atualizarPreco()">
                <option value="basica">🛵 Corrida Básica</option>
                <option value="expressa">🚀 Corrida Expressa</option>
            </select>
            <div class="price-display">
                <span style="font-size: 13px; font-weight: bold; opacity: 0.8; letter-spacing: 1px;">VALOR FIXO</span>
                <span class="price-val" id="preco-final">R$ 0,00</span>
            </div>
            <button class="btn-solicitar" onclick="pedir()">SOLICITAR AGORA</button>
        </div>
        <div class="footer-info">
            Sistema de Preço Fixo Vroom Moto.<br>
            A segurança do GPS é monitorada em tempo real.
        </div>
    </div>
    <script>
        let modoAtual = 'municipal';
        const tabelaPrecos = {
            municipal: { basica: 10.00, expressa: 15.00 },
            intermunicipal: { basica: 35.00, expressa: 55.00 }
        };
        function trocarModo(m) {
            modoAtual = m;
            document.getElementById('btn-mun').classList.toggle('active', m === 'municipal');
            document.getElementById('btn-int').classList.toggle('active', m === 'intermunicipal');
            atualizarPreco();
        }
        function atualizarPreco() {
            const cat = document.getElementById('categoria').value;
            const dest = document.getElementById('destino').value;
            const display = document.getElementById('preco-final');
            if (dest.length >= 2) {
                let valor = tabelaPrecos[modoAtual][cat];
                display.innerText = "R$ " + valor.toFixed(2).replace('.', ',');
            } else {
                display.innerText = "R$ 0,00";
            }
        }
        function pedir() {
            const dest = document.getElementById('destino').value;
            if (!dest) { alert("Por favor, informe o destino para continuar!"); return; }
            const preco = document.getElementById('preco-final').innerText;
            alert("✅ PEDIDO ENVIADO!\n\nUm piloto Vroom está a caminho.\nValor Fixo: " + preco);
        }
        function iniciarGPS() {
            const campoPartida = document.getElementById('partida');
            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => { campoPartida.value = "📍 Localização detectada"; },
                    (err) => { campoPartida.readOnly = false; campoPartida.placeholder = "Sua localização (digite aqui)"; },
                    { timeout: 5000 }
                );
            } else {
                campoPartida.readOnly = false;
                campoPartida.placeholder = "Sua localização (digite aqui)";
            }
        }
        window.onload = iniciarGPS;
    </script>
</body>
</html>
