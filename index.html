<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Vroom Moto 2.0</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
    :root { --vroom: #FF6B00; }
    body { font-family: 'Inter', sans-serif; background: #F9FAFB; overflow: hidden; }
    .screen { display: none; height: 100vh; width: 100vw; flex-direction: column; position: absolute; top:0; left:0; }
    .screen.active { display: flex; }
    .vroom-btn { background: var(--vroom); color: white; border: none; }
    .vroom-btn:active { transform: scale(0.96); opacity: 0.9; }
    .card { background: white; border-radius: 30px; box-shadow: 0 10px 40px -10px rgba(0,0,0,0.08); }
    .type-card { border: 3px solid #F3F4F6; transition: 0.3s; cursor: pointer; }
    .type-card.active { border-color: var(--vroom); background: #FFF7ED; }
    .pulse { animation: pulse 2s infinite; }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
  </style>
</head>
<body>

  <div id="screen-portal" class="screen active p-8 items-center justify-center bg-white text-center">
    <div class="text-9xl mb-8 animate-bounce">🏍️</div>
    <h1 class="text-6xl font-black italic tracking-tighter">VROOM<span class="text-orange-600">MOTO</span></h1>
    <p class="text-slate-400 mt-4 font-bold tracking-widest text-xs uppercase">The Power of Choice</p>
    <div class="mt-16 w-full max-w-xs space-y-4">
      <button onclick="initApp('cliente')" class="w-full vroom-btn py-6 rounded-3xl font-black text-2xl shadow-xl shadow-orange-100 italic">SOU CLIENTE</button>
      <button onclick="initApp('motorista')" class="w-full bg-slate-900 text-white py-6 rounded-3xl font-black text-2xl shadow-xl italic">SOU MOTORISTA</button>
    </div>
    <div class="absolute bottom-8 text-[10px] font-black text-slate-200 tracking-widest">v2.0 • RODOLFO OLIVEIRA</div>
  </div>

  <div id="screen-cliente-home" class="screen bg-slate-50">
    <div class="p-6 bg-white flex justify-between items-center border-b border-slate-100 shadow-sm">
      <span class="text-3xl font-black italic tracking-tighter">VROOM</span>
      <button onclick="location.reload()" class="w-10 h-10 bg-slate-50 rounded-xl flex items-center justify-center text-slate-300"><i class="fa-solid fa-rotate"></i></button>
    </div>
    <div class="p-6 flex-1 overflow-y-auto space-y-6">
      <div id="pedir-box" class="card p-8 text-center">
        <h3 class="text-2xl font-black text-slate-800 mb-8 italic">Para onde vamos?</h3>
        <div class="relative mb-8">
            <i class="fa-solid fa-flag-checkered absolute left-5 top-1/2 -translate-y-1/2 text-slate-300"></i>
            <input type="text" id="cli-destino" placeholder="Digite o destino final" class="w-full bg-slate-50 pl-14 p-5 rounded-2xl border-2 border-slate-100 outline-none focus:border-orange-500 font-black text-lg shadow-inner transition-all">
        </div>
        <div class="grid grid-cols-2 gap-4 mb-8">
          <div id="btn-mun" onclick="setMod('municipal')" class="type-card active p-5 rounded-3xl text-center shadow-sm">
            <div class="font-black text-slate-400 text-[10px] tracking-widest mb-1">MUNICIPAL</div>
            <div class="text-orange-600 font-black text-2xl italic leading-none">R$ 7,00</div>
          </div>
          <div id="btn-inter" onclick="setMod('inter')" class="type-card p-5 rounded-3xl text-center shadow-sm">
            <div class="font-black text-slate-400 text-[10px] tracking-widest mb-1">INTER</div>
            <div class="text-orange-600 font-black text-2xl italic leading-none">R$ 2,50/km</div>
          </div>
        </div>
        <button id="btn-pedir" onclick="pedirCorrida()" class="w-full vroom-btn py-6 rounded-3xl font-black text-2xl shadow-2xl shadow-orange-200 uppercase italic tracking-tighter">CHAMAR AGORA</button>
      </div>
      <div id="cli-status-card" class="hidden card p-10 bg-orange-600 text-white text-center shadow-2xl shadow-orange-300">
         <div class="text-6xl mb-6 pulse">🔍</div>
         <div class="text-3xl font-black uppercase tracking-tighter italic leading-none mb-4">Buscando<br>Motorista...</div>
         <div class="h-1 w-16 bg-white/30 mx-auto rounded-full"></div>
         <p class="text-xs font-bold mt-4 opacity-70">Aguarde, estamos conectando você.</p>
      </div>
    </div>
  </div>

  <div id="screen-motorista-home" class="screen bg-slate-50">
    <div class="p-6 bg-slate-900 text-white flex justify-between items-center shadow-lg">
      <div>
        <div class="text-[10px] font-black opacity-30 uppercase tracking-[0.2em] mb-1">Status</div>
        <div class="text-2xl font-black italic tracking-tighter uppercase leading-none">Motorista</div>
      </div>
      <button onclick="toggleOnline()" id="mot-toggle" class="bg-red-500 px-8 py-3 rounded-2xl font-black text-xs uppercase tracking-widest transition-all shadow-lg">Offline</button>
    </div>
    <div class="p-6 flex-1 overflow-y-auto space-y-4" id="fila-corridas">
      <div class="text-center p-20 text-slate-300 font-black italic opacity-40">
        <i class="fa-solid fa-clock text-4xl mb-4 block"></i>
        Nenhuma chamada ativa
      </div>
    </div>
  </div>

  <script>
    const CLOUD_URL = 'https://vroom-moto-default-rtdb.firebaseio.com/vroom_v2_final_prod.json';
    let DB = { corridas: [] };
    let STATE = { role: null, online: false, modalidade: 'municipal' };

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function initApp(role) {
      STATE.role = role;
      showScreen('screen-' + role + '-home');
      startSync();
    }

    function setMod(m) {
      STATE.modalidade = m;
      document.getElementById('btn-mun').classList.toggle('active', m === 'municipal');
      document.getElementById('btn-inter').classList.toggle('active', m === 'inter');
    }

    async function pedirCorrida() {
      const dest = document.getElementById('cli-destino').value;
      if(!dest) return;
      const nova = { id: Date.now(), destino: dest, tipo: STATE.modalidade, status: 'buscando' };
      DB.corridas.push(nova);
      document.getElementById('pedir-box').classList.add('hidden');
      document.getElementById('cli-status-card').classList.remove('hidden');
      await syncPush();
    }

    function toggleOnline() {
      STATE.online = !STATE.online;
      const btn = document.getElementById('mot-toggle');
      btn.innerText = STATE.online ? 'Online' : 'Offline';
      btn.classList.toggle('bg-green-500', STATE.online);
      btn.classList.toggle('bg-red-500', !STATE.online);
    }

    async function aceitarCorrida(id) {
      const c = DB.corridas.find(x => x.id === id);
      if(c) {
        c.status = 'aceita';
        c.motorista = 'Rodolfo';
        await syncPush();
      }
    }

    async function syncPush() {
      try { await fetch(CLOUD_URL, { method: 'PUT', body: JSON.stringify(DB) }); } catch(e){}
    }

    function startSync() {
      setInterval(async () => {
        try {
          const r = await fetch(CLOUD_URL + '?t=' + Date.now());
          if(r.ok) {
            const data = await r.json();
            if(data && data.corridas) {
                DB = data;
                if(STATE.role === 'motorista' && STATE.online) renderFila();
                if(STATE.role === 'cliente') updateClienteStatus();
            }
          }
        } catch(e){}
      }, 3000);
    }

    function renderFila() {
      const container = document.getElementById('fila-corridas');
      const disp = (DB.corridas || []).filter(c => c.status === 'buscando');
      if(disp.length === 0) {
        container.innerHTML = '<div class="text-center p-20 text-slate-300 font-black italic opacity-40"><i class="fa-solid fa-clock text-4xl mb-4 block"></i>Nenhuma chamada ativa</div>';
        return;
      }
      container.innerHTML = disp.map(c => `
        <div class="card p-8 border-l-[16px] border-orange-500 shadow-xl animate-pulse">
          <div class="mb-6">
            <div class="text-[10px] font-black text-slate-300 uppercase mb-1">Destino</div>
            <div class="text-2xl font-black text-slate-800 leading-tight italic tracking-tighter">${c.destino}</div>
          </div>
          <div class="flex justify-between items-center">
            <div class="bg-orange-100 text-orange-600 px-3 py-1 rounded-lg font-black text-[10px] italic">${c.tipo.toUpperCase()}</div>
            <button onclick="aceitarCorrida(${c.id})" class="bg-slate-900 text-white px-8 py-4 rounded-2xl font-black uppercase text-xs tracking-widest shadow-lg">Aceitar</button>
          </div>
        </div>
      `).join('');
    }

    function updateClienteStatus() {
        const minha = (DB.corridas || []).find(c => c.status === 'aceita');
        if(minha) {
            document.getElementById('cli-status-card').innerHTML = `<div class="text-6xl mb-6">🚀</div><div class="text-3xl font-black italic uppercase tracking-tighter">A Caminho!</div><p class="text-xs font-bold mt-4 opacity-70">O motorista já aceitou o seu chamado.</p>`;
            document.getElementById('cli-status-card').classList.replace('bg-orange-600', 'bg-green-600');
        }
    }
  </script>
</body>
</html>
