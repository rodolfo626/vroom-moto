<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VROOM MOTO - v4.9</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        :root { --vroom: #FF6B00; }
        body { font-family: 'Inter', sans-serif; background: #0F172A; margin: 0; padding: 0; overflow-x: hidden; }
        .screen { display: none; min-height: 100vh; width: 100vw; flex-direction: column; background: #F8FAFC; }
        .screen.active { display: flex; }
        .vroom-btn { background: var(--vroom); color: white; font-weight: 800; text-transform: uppercase; border-radius: 18px; transition: 0.2s; }
        .input-vroom { background: #F1F5F9; border: 2px solid #E2E8F0; padding: 16px; border-radius: 18px; outline: none; font-weight: 600; width: 100%; color: #1E293B; }
        #map { height: 350px; width: 100%; z-index: 1; }
        .photo-box { width: 80px; height: 80px; background: #F1F5F9; border: 2px dashed #CBD5E1; border-radius: 20px; display: flex; flex-direction: column; items-center; justify-center; cursor: pointer; overflow: hidden; position: relative; }
        .preview-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: none; }
    </style>
</head>
<body>

    <!-- 1. PORTAL INICIAL (DEVE SER A PRIMEIRA TELA) -->
    <div id="screen-portal" class="screen active items-center justify-center p-8 !bg-[#0F172A] text-white">
        <div class="text-center mb-12">
            <i class="fas fa-motorcycle text-7xl text-orange-500 mb-4"></i>
            <h1 class="text-5xl font-black italic tracking-tighter uppercase">VROOM<span class="text-orange-500">MOTO</span></h1>
            <p class="text-slate-500 text-[10px] font-bold uppercase tracking-[0.3em] mt-2 italic">Professional v4.9</p>
        </div>
        <div class="w-full max-w-xs space-y-4">
            <button onclick="nav('cliente-login')" class="w-full vroom-btn py-5 text-lg shadow-2xl shadow-orange-500/20">Pedir uma Moto</button>
            <button onclick="nav('motorista-login')" class="w-full bg-slate-800 py-5 rounded-2xl font-black uppercase text-xs tracking-widest">Motorista</button>
            <button onclick="nav('adm-login')" class="w-full bg-transparent border-2 border-slate-800 text-slate-500 py-3 rounded-2xl text-[9px] font-black uppercase">Painel Master</button>
        </div>
    </div>

    <!-- 2. LOGIN CLIENTE -->
    <div id="screen-cliente-login" class="screen p-8 justify-center items-center">
        <div class="w-full max-w-sm text-center">
             <div class="photo-box !w-24 !h-24 !rounded-full mx-auto mb-6" onclick="trigger('f-cli')">
                <i class="fas fa-camera"></i>
                <img id="p-f-cli" class="preview-img">
                <input type="file" id="f-cli" hidden onchange="pv(this, 'p-f-cli')">
            </div>
            <h2 class="text-2xl font-black italic mb-6 uppercase">Seja Bem-vindo</h2>
            <div class="space-y-4">
                <input type="text" id="cli-nome" placeholder="Nome Completo" class="input-vroom">
                <input type="text" placeholder="CPF" class="input-vroom">
                <input type="tel" placeholder="WhatsApp" class="input-vroom">
                <button onclick="nav('cliente-app')" class="w-full vroom-btn py-5 shadow-xl">Entrar Agora</button>
                <button onclick="nav('portal')" class="text-slate-400 text-[10px] font-black uppercase mt-8 block w-full">Voltar</button>
            </div>
        </div>
    </div>

    <!-- 3. MAPA CLIENTE -->
    <div id="screen-cliente-app" class="screen">
        <div class="p-4 bg-white flex justify-between items-center border-b">
            <span class="text-xl font-black italic">VROOM<span class="text-orange-500">MOTO</span></span>
            <button onclick="nav('portal')" class="text-slate-400"><i class="fas fa-sign-out-alt"></i></button>
        </div>
        <div id="map"></div>
        <div class="p-6 bg-slate-50 flex-1 space-y-4">
            <input type="text" placeholder="Para onde vamos?" class="input-vroom !text-left">
            <div class="grid grid-cols-2 gap-3">
                <button onclick="alert('Solicitando Municipal...')" class="bg-white p-4 rounded-2xl border-2 border-slate-100 font-black text-xs uppercase italic">Municipal</button>
                <button onclick="alert('Calculando Intermunicipal...')" class="bg-white p-4 rounded-2xl border-2 border-slate-100 font-black text-xs uppercase italic">Intermunicipal</button>
            </div>
        </div>
    </div>

    <!-- 4. LOGIN MOTORISTA -->
    <div id="screen-motorista-login" class="screen p-8 justify-center items-center">
        <div class="w-full max-w-sm text-center space-y-6">
            <i class="fas fa-motorcycle text-6xl text-slate-800"></i>
            <h2 class="text-3xl font-black italic uppercase text-slate-800">Motorista</h2>
            <input type="text" placeholder="Usuário" class="input-vroom">
            <input type="password" placeholder="Senha" class="input-vroom">
            <button class="w-full vroom-btn py-5">Entrar</button>
            <button onclick="nav('portal')" class="text-slate-400 font-bold uppercase text-[10px]">Voltar</button>
        </div>
    </div>

    <!-- 5. LOGIN ADM -->
    <div id="screen-adm-login" class="screen p-8 justify-center items-center">
        <div class="w-full max-w-sm bg-white p-10 rounded-[40px] shadow-2xl text-center">
            <h2 class="text-2xl font-black italic mb-8 uppercase">Painel Master</h2>
            <div class="space-y-4">
                <input type="text" id="adm-user" placeholder="Usuário" class="input-vroom" value="Rodolfo Oliveira">
                <input type="password" id="adm-pass" placeholder="Senha" class="input-vroom">
                <button onclick="checkAdm()" class="w-full vroom-btn py-4">Entrar no Sistema</button>
                <button onclick="nav('portal')" class="text-slate-400 text-[10px] font-black uppercase mt-6 block">Voltar</button>
            </div>
        </div>
    </div>

    <!-- 6. PAINEL ADM (MULTITABS) -->
    <div id="screen-adm-dashboard" class="screen !bg-slate-50">
        <header class="bg-slate-900 text-white p-6 flex justify-between items-center sticky top-0 z-50">
            <span class="font-black italic">VROOM <span class="text-orange-500">MASTER</span></span>
            <button onclick="nav('portal')" class="text-slate-400"><i class="fas fa-sign-out-alt"></i></button>
        </header>
        <nav class="bg-white border-b p-2 flex overflow-x-auto gap-2">
            <button onclick="tab('m')" class="p-3 font-black text-[10px] uppercase">Motoristas</button>
            <button onclick="tab('t')" class="p-3 font-black text-[10px] uppercase">Tarifas</button>
            <button onclick="tab('f')" class="p-3 font-black text-[10px] uppercase">Financeiro</button>
        </nav>
        <div class="p-6" id="adm-content">
            <div class="bg-white p-8 rounded-3xl shadow-sm text-center">
                 <h3 class="font-black uppercase text-xs text-slate-400 mb-6 italic italic">Configurações Gerais</h3>
                 <p class="text-sm font-bold text-slate-600">Painel Master Ativo. Use o menu para navegar.</p>
            </div>
        </div>
    </div>

    <script>
        let map;
        function nav(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            const target = document.getElementById('screen-' + id);
            if(target) target.classList.add('active');
            
            if(id === 'cliente-app') {
                setTimeout(() => {
                    if(!map) {
                        map = L.map('map').setView([-23.55, -46.63], 13);
                        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                    }
                    map.invalidateSize();
                }, 300);
            }
        }
        function checkAdm() {
            const u = document.getElementById('adm-user').value;
            const p = document.getElementById('adm-pass').value;
            if(u === 'Rodolfo Oliveira' && p === 'Rm290198') nav('adm-dashboard');
            else alert('Acesso Negado!');
        }
        function trigger(id) { document.getElementById(id).click(); }
        function pv(input, pre) {
            if (input.files && input.files[0]) {
                var r = new FileReader();
                r.onload = e => { 
                    const img = document.getElementById(pre);
                    img.src = e.target.result; img.style.display = 'block';
                }
                r.readAsDataURL(input.files[0]);
            }
        }
        function tab(t) { alert('Módulo ' + t + ' carregado no painel master.'); }
    </script>
</body>
</html>
