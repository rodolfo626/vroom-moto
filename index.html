<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VROOM MOTO v11.0 - 1782765662</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        :root { --vroom: #FF6B00; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: #0F172A; overflow: hidden; height: 100vh; width: 100vw; }
        
        .screen { 
            display: none; 
            height: 100%; 
            width: 100%; 
            position: fixed; 
            top: 0; 
            left: 0; 
            flex-direction: column;
            background: #F8FAFC;
            z-index: 10;
        }
        .screen.active { display: flex !important; z-index: 100 !important; }
        
        #screen-portal { background: #0F172A !important; justify-content: center; align-items: center; padding: 30px; }
        
        .vroom-btn { 
            background: var(--vroom); color: white; font-weight: 800; text-transform: uppercase; 
            border-radius: 20px; padding: 20px; width: 100%; border: none; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; gap: 10px;
            box-shadow: 0 10px 20px rgba(255, 107, 0, 0.3); font-size: 16px;
        }
        
        .input-vroom { background: #F1F5F9; border: 2px solid #E2E8F0; padding: 16px; border-radius: 18px; outline: none; font-weight: 600; width: 100%; color: #1E293B; font-size: 15px; }
        #map { height: 100%; width: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
        
        .hud-driver { position: fixed; top: 20px; left: 20px; right: 20px; background: white; border-radius: 20px; padding: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); z-index: 200; display: none; border-left: 6px solid var(--vroom); }
        .panel-client { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-radius: 35px 35px 0 0; padding: 25px; box-shadow: 0 -10px 40px rgba(0,0,0,0.1); z-index: 150; }
        
        .price-box { background: #FFF7ED; border: 2px solid #FFEDD5; border-radius: 20px; padding: 15px; margin-bottom: 15px; display: none; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <audio id="audio-buzina" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2855/2855-preview.mp3" type="audio/mpeg">
    </audio>

    <!-- TELA 1: PORTAL -->
    <div id="screen-portal" class="screen active">
        <div class="text-center mb-12">
            <i class="fas fa-motorcycle text-8xl text-orange-500 mb-4"></i>
            <h1 class="text-5xl font-black italic tracking-tighter uppercase text-white">VROOM<span class="text-orange-500">MOTO</span></h1>
            <p class="text-slate-500 text-[10px] font-black uppercase mt-2 italic tracking-[0.3em]">PRO VERSION 11.0</p>
        </div>
        <div class="w-full max-w-xs space-y-4">
            <button onclick="nav('cliente-login')" class="vroom-btn">Pedir uma Moto</button>
            <button onclick="nav('motorista-login')" class="w-full bg-slate-800 text-white py-5 rounded-2xl font-black uppercase text-xs">Área do Motorista</button>
            <button onclick="nav('adm-login')" class="w-full bg-transparent border-2 border-slate-700 text-slate-500 py-3 rounded-2xl text-[9px] font-black uppercase">Painel Master</button>
        </div>
    </div>

    <!-- TELA 2: LOGIN CLIENTE -->
    <div id="screen-cliente-login" class="screen justify-center items-center p-8">
        <div class="w-full max-w-sm text-center">
            <h2 class="text-3xl font-black italic mb-8 uppercase text-slate-800">Seja Bem-vindo</h2>
            <input type="text" id="cli-nome" placeholder="Seu Nome" class="input-vroom mb-4">
            <input type="tel" id="cli-tel" placeholder="Seu WhatsApp" class="input-vroom mb-8">
            <button onclick="nav('cliente-app')" class="vroom-btn">Entrar e Pedir</button>
            <button onclick="nav('portal')" class="mt-6 block w-full text-xs font-black text-slate-400 uppercase">Voltar ao Início</button>
        </div>
    </div>

    <!-- TELA 3: APP CLIENTE COMPLETO -->
    <div id="screen-cliente-app" class="screen">
        <div id="hud-driver" class="hud-driver items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-slate-200 rounded-full border-2 border-orange-500 flex items-center justify-center">
                    <i class="fas fa-user text-slate-400"></i>
                </div>
                <div><p class="text-[9px] font-black text-slate-400 uppercase leading-none">Motorista a caminho</p><p class="text-sm font-black italic">Rodolfo Oliveira</p></div>
            </div>
            <p class="text-lg font-black text-orange-500 italic">4 min</p>
        </div>
        
        <div id="map"></div>
        
        <div class="panel-client">
            <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-6"></div>
            <div class="space-y-4">
                <div class="relative">
                    <i class="fas fa-dot-circle text-blue-500 absolute left-4 top-4"></i>
                    <input type="text" value="Sua Localização (Google Precise)" readonly class="input-vroom !pl-10 !bg-slate-50 !border-none text-xs">
                </div>
                <div class="relative">
                    <i class="fas fa-map-marker-alt text-slate-400 absolute left-4 top-4"></i>
                    <input type="text" id="loc-destino" placeholder="Para onde você vai?" class="input-vroom !pl-10" oninput="showPrice()">
                </div>
                <div id="price-box" class="price-box">
                    <div><p class="text-[9px] font-black text-orange-600 uppercase italic">Municipal (Fixo)</p><p class="text-3xl font-black italic">R$ 7,00</p></div>
                    <p class="text-xs font-bold text-slate-400 uppercase">12 min</p>
                </div>
                <div class="flex flex-col gap-3">
                    <button onclick="fazerPedido()" id="btn-request" class="vroom-btn shadow-orange-500/40">Confirmar Corrida</button>
                    <button onclick="cancelarPedido()" id="btn-cancel" class="hidden w-full bg-slate-100 text-slate-400 py-4 rounded-2xl font-black uppercase text-xs">Cancelar</button>
                </div>
            </div>
            <button onclick="nav('portal')" class="w-full text-center text-[10px] font-black text-slate-300 uppercase mt-6">Sair do App</button>
        </div>
    </div>

    <!-- TELA 4: LOGIN MOTORISTA -->
    <div id="screen-motorista-login" class="screen justify-center items-center p-8">
        <div class="w-full max-w-sm text-center">
            <h2 class="text-2xl font-black italic mb-8 uppercase text-slate-800">Acesso Motorista</h2>
            <input type="text" value="Rodolfo Oliveira" class="input-vroom mb-4">
            <input type="password" value="Rm280198" class="input-vroom mb-8">
            <button onclick="nav('motorista-app')" class="vroom-btn">Ficar Online</button>
            <button onclick="nav('portal')" class="mt-6 block w-full text-xs font-black text-slate-400">VOLTAR</button>
        </div>
    </div>

    <!-- TELA 5: FILA MOTORISTA -->
    <div id="screen-motorista-app" class="screen !bg-slate-50">
        <header class="bg-slate-900 text-white p-6 flex justify-between items-center">
            <span class="font-black italic uppercase">VROOM OPERATOR</span>
            <span class="text-[10px] font-black uppercase bg-green-500 px-3 py-1.5 rounded-full">Online</span>
        </header>
        <div class="p-8 text-center flex-1">
            <p class="text-slate-400 font-bold mb-8 uppercase text-xs tracking-widest">Aguardando Chamados</p>
            <button onclick="document.getElementById('audio-buzina').play()" class="bg-white border-2 border-slate-200 px-6 py-3 rounded-2xl text-[10px] font-black uppercase italic shadow-sm">Testar Buzina (Bi-Bii)</button>
        </div>
        <button onclick="nav('portal')" class="p-6 text-slate-400 text-[10px] font-black uppercase border-t bg-white">Sair do Turno</button>
    </div>

    <!-- TELA 6: ADM -->
    <div id="screen-adm-login" class="screen justify-center items-center p-8">
        <h2 class="text-2xl font-black italic mb-6">ADM MASTER</h2>
        <button onclick="nav('portal')" class="vroom-btn">VOLTAR AO INÍCIO</button>
    </div>

    <script>
        function nav(id) {
            // Forçar limpeza de todas as telas
            const allScreens = document.querySelectorAll('.screen');
            allScreens.forEach(s => {
                s.style.display = 'none';
                s.classList.remove('active');
            });
            
            // Ativar a tela desejada
            const target = document.getElementById('screen-' + id);
            if(target) {
                target.style.display = 'flex';
                setTimeout(() => target.classList.add('active'), 10);
            }
            
            if(id === 'cliente-app') initMap();
        }

        function initMap() {
            setTimeout(() => {
                const mapDiv = document.getElementById('map');
                if(mapDiv && !mapDiv.innerHTML) {
                    let m = L.map('map', { zoomControl: false }).setView([-23.55, -46.63], 15);
                    L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}').addTo(m);
                }
            }, 400);
        }

        function showPrice() {
            const d = document.getElementById('loc-destino').value;
            const pb = document.getElementById('price-box');
            if(d.length > 4) pb.style.display = 'flex';
            else pb.style.display = 'none';
        }

        function fazerPedido() {
            const btn = document.getElementById('btn-request');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Solicitando...';
            document.getElementById('audio-buzina').play();
            setTimeout(() => {
                alert('Moto solicitada! Toca a buzina no motorista.');
                btn.innerHTML = 'Buscando Motorista...';
                document.getElementById('btn-cancel').classList.remove('hidden');
                setTimeout(() => {
                    document.getElementById('hud-driver').style.display = 'flex';
                    btn.innerHTML = 'Motorista Aceitou!';
                    btn.style.background = '#22c55e';
                }, 3000);
            }, 1500);
        }

        function cancelarPedido() {
            if(confirm('Cancelar sua moto?')) window.location.reload();
        }
    </script>
</body>
</html>
