<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VROOM MOTO v10.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        :root { --vroom: #FF6B00; }
        body { font-family: 'Inter', sans-serif; background: #0F172A; margin: 0; padding: 0; overflow: hidden; height: 100vh; width: 100vw; }
        
        .screen { 
            display: none; 
            height: 100vh; 
            width: 100vw; 
            position: fixed; 
            top: 0; 
            left: 0; 
            z-index: 10;
            flex-direction: column;
            background: #F8FAFC;
        }
        .screen.active { display: flex !important; z-index: 50; }
        
        #screen-portal { background: #0F172A !important; }
        
        .vroom-btn { 
            background: var(--vroom); 
            color: white; 
            font-weight: 800; 
            text-transform: uppercase; 
            border-radius: 18px; 
            padding: 18px;
            width: 100%;
            border: none; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px;
            box-shadow: 0 10px 15px -3px rgba(255, 107, 0, 0.3);
        }
        
        .input-vroom { background: #F1F5F9; border: 2px solid #E2E8F0; padding: 14px; border-radius: 16px; outline: none; font-weight: 600; width: 100%; color: #1E293B; font-size: 14px; }
        #map { height: 100%; width: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
        
        .driver-hud { position: fixed; top: 20px; left: 20px; right: 20px; background: white; border-radius: 20px; padding: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); z-index: 100; display: none; border-left: 6px solid var(--vroom); }
        .client-panel { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-radius: 35px 35px 0 0; padding: 25px; box-shadow: 0 -10px 40px rgba(0,0,0,0.1); z-index: 60; }
    </style>
</head>
<body onload="nav('portal')">

    <audio id="audio-buzina" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2855/2855-preview.mp3" type="audio/mpeg">
    </audio>

    <!-- TELA INICIAL -->
    <div id="screen-portal" class="screen active items-center justify-center p-8">
        <div class="text-center mb-12">
            <i class="fas fa-motorcycle text-7xl text-orange-500 mb-4"></i>
            <h1 class="text-5xl font-black italic tracking-tighter uppercase text-white">VROOM<span class="text-orange-500">MOTO</span></h1>
            <p class="text-slate-500 text-[10px] font-bold uppercase mt-2 italic tracking-[0.2em]">Google Precision v10.1</p>
        </div>
        <div class="w-full max-w-xs space-y-4">
            <button onclick="nav('cliente-login')" class="vroom-btn">Pedir uma Moto</button>
            <button onclick="nav('motorista-login')" class="w-full bg-slate-800 text-white py-5 rounded-2xl font-black uppercase text-xs">Entrar como Motorista</button>
            <button onclick="nav('adm-login')" class="w-full bg-transparent border-2 border-slate-700 text-slate-500 py-3 rounded-2xl text-[9px] font-black uppercase">Painel Master</button>
        </div>
    </div>

    <!-- ÁREA CLIENTE: CADASTRO -->
    <div id="screen-cliente-login" class="screen items-center justify-center p-8">
        <div class="w-full max-w-sm text-center">
            <h2 class="text-2xl font-black italic mb-8 uppercase text-slate-800">Bem-vindo!</h2>
            <input type="text" id="cli-nome" placeholder="Seu Nome" class="input-vroom mb-4">
            <input type="tel" id="cli-tel" placeholder="Seu WhatsApp" class="input-vroom mb-6">
            <button onclick="nav('cliente-app')" class="vroom-btn">Entrar no App</button>
            <button onclick="nav('portal')" class="mt-6 block w-full text-xs font-black text-slate-400">VOLTAR</button>
        </div>
    </div>

    <!-- ÁREA CLIENTE: MAPA -->
    <div id="screen-cliente-app" class="screen">
        <div id="driver-hud" class="driver-hud items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-slate-100 rounded-full border-2 border-orange-500 flex items-center justify-center">
                    <i class="fas fa-user text-slate-400"></i>
                </div>
                <div><p class="text-[10px] font-black text-slate-400 uppercase">Motorista Chegando</p><p class="text-sm font-black italic">Rodolfo Oliveira</p></div>
            </div>
            <p class="text-lg font-black text-orange-500 italic">3 min</p>
        </div>
        <div id="map"></div>
        <div class="client-panel">
            <div class="w-12 h-1 bg-slate-200 rounded-full mx-auto mb-4"></div>
            <input type="text" id="loc-destino" placeholder="Para onde vamos?" class="input-vroom mb-4" oninput="document.getElementById('price-box').style.display='block'">
            <div id="price-box" class="hidden p-4 bg-orange-50 border-2 border-orange-100 rounded-2xl flex justify-between items-center mb-4">
                <div><p class="text-[9px] font-black text-orange-600 uppercase">Municipal</p><p class="text-2xl font-black italic">R$ 7,00</p></div>
                <p class="text-xs font-bold text-slate-400 uppercase">10-15 min</p>
            </div>
            <button onclick="fazerPedido()" class="vroom-btn">Confirmar Corrida</button>
            <button onclick="nav('portal')" class="mt-4 w-full text-[10px] font-black text-slate-300 uppercase">Sair</button>
        </div>
    </div>

    <!-- ÁREA MOTORISTA: LOGIN -->
    <div id="screen-motorista-login" class="screen items-center justify-center p-8">
        <div class="w-full max-w-sm text-center">
            <h2 class="text-2xl font-black italic mb-8 uppercase text-slate-800">Motorista</h2>
            <input type="text" value="Rodolfo Oliveira" class="input-vroom mb-4">
            <input type="password" value="Rm280198" class="input-vroom mb-6">
            <button onclick="nav('motorista-app')" class="vroom-btn">Ficar Online</button>
            <button onclick="nav('portal')" class="mt-6 block w-full text-xs font-black text-slate-400">VOLTAR</button>
        </div>
    </div>

    <!-- ÁREA MOTORISTA: APP -->
    <div id="screen-motorista-app" class="screen !bg-slate-50">
        <header class="bg-slate-900 text-white p-6 flex justify-between items-center">
            <span class="font-black italic uppercase">VROOM OPERATOR</span>
            <span class="text-[10px] font-black uppercase bg-green-500 px-3 py-1 rounded">Online</span>
        </header>
        <div class="p-8 text-center flex-1">
            <p class="text-slate-400 font-bold mb-6">Nenhuma corrida no momento.</p>
            <button onclick="document.getElementById('audio-buzina').play()" class="bg-slate-200 px-4 py-2 rounded-xl text-[10px] font-black uppercase italic">Simular Som (Bi-Bii)</button>
        </div>
        <button onclick="nav('portal')" class="p-6 text-slate-400 text-xs font-black uppercase border-t bg-white">Sair</button>
    </div>

    <!-- ÁREA ADM -->
    <div id="screen-adm-login" class="screen items-center justify-center p-8">
        <h2 class="text-2xl font-black italic mb-6">ADM MASTER</h2>
        <button onclick="nav('portal')" class="vroom-btn">VOLTAR</button>
    </div>

    <script>
        function nav(id) {
            // ESCONDER TUDO
            const screens = document.querySelectorAll('.screen');
            screens.forEach(s => {
                s.style.display = 'none';
                s.classList.remove('active');
            });
            // MOSTRAR DESTINO
            const target = document.getElementById('screen-' + id);
            if(target) {
                target.style.display = 'flex';
                target.classList.add('active');
            }
            if(id === 'cliente-app') initMap();
        }

        function initMap() {
            setTimeout(() => {
                if(!document.getElementById('map').innerHTML) {
                    let m = L.map('map', {zoomControl: false}).setView([-23.55, -46.63], 15);
                    L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}').addTo(m);
                }
            }, 300);
        }

        function fazerPedido() {
            alert('Pedido enviado para a fila! Toca a buzina.');
            document.getElementById('audio-buzina').play();
            setTimeout(() => {
                document.getElementById('driver-hud').style.display = 'flex';
            }, 3000);
        }
    </script>
</body>
</html>
