<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VROOM MOTO v21.1 - Sistema Completo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #020617; color: white; font-family: 'Inter', sans-serif; }
        .vroom-card { background: #0f172a; border: 1px solid #1e293b; border-radius: 24px; }
        .screen { display: none; min-height: 100vh; padding: 16px; flex-direction: column; }
        .screen.active { display: flex; }
        .vroom-input { background: #1e293b; border: 1px solid #334155; padding: 16px; border-radius: 16px; width: 100%; color: white; outline: none; }
        .btn-main { background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); padding: 18px; border-radius: 20px; font-weight: 900; text-transform: uppercase; width: 100%; box-shadow: 0 10px 15px -3px rgba(249, 115, 22, 0.3); }
        .btn-secondary { background: #1e293b; border: 1px solid #334155; padding: 18px; border-radius: 20px; font-weight: 900; text-transform: uppercase; width: 100%; color: #94a3b8; }
        #map-container { width: 100%; height: 280px; border-radius: 24px; margin-bottom: 16px; background: #020617; border: 1px solid #1e293b; position: relative; }
        .radar-pulse { width: 100px; height: 100px; background: rgba(249, 115, 22, 0.2); border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; } 50% { opacity: 1; } 100% { transform: translate(-50%, -50%) scale(2); opacity: 0; } }
    </style>
</head>
<body>

    <!-- TELA: PORTAL -->
    <div id="screen-portal" class="screen active justify-center items-center">
        <div class="text-center mb-12">
            <h1 class="text-6xl font-black italic tracking-tighter leading-none">VROOM<br><span class="text-orange-500">MOTO</span></h1>
            <p class="text-slate-500 font-bold uppercase text-[10px] tracking-[0.4em] mt-4">Sistema v21.1 Completo</p>
        </div>
        <div class="w-full max-w-sm space-y-4">
            <button onclick="nav('cliente')" class="btn-main italic">Chamar uma Vroom</button>
            <button onclick="nav('motorista-login')" class="btn-secondary">Área do Piloto</button>
            <button onclick="nav('recrutamento')" class="w-full text-orange-500 py-4 font-black uppercase text-[11px] tracking-widest bg-orange-500/5 rounded-2xl border border-orange-500/10">Trabalhe Conosco (Cadastro)</button>
        </div>
        <button onclick="location.href='adm.html'" class="mt-12 text-slate-700 font-black uppercase text-[9px] tracking-widest flex items-center gap-2">
            <i class="fas fa-shield-halved"></i> Central de Comando ADM
        </button>
    </div>

    <!-- TELA: CLIENTE -->
    <div id="screen-cliente" class="screen overflow-y-auto">
        <div class="flex items-center justify-between mb-4">
            <button onclick="nav('portal')" class="w-10 h-10 rounded-full bg-slate-900 flex items-center justify-center border border-slate-800"><i class="fas fa-arrow-left"></i></button>
            <h2 class="text-lg font-black italic uppercase text-orange-500">Nova Viagem</h2>
            <div class="w-10"></div>
        </div>
        <div id="map-container" class="flex flex-col items-center justify-center">
            <div class="radar-pulse"></div>
            <p class="text-[10px] font-black uppercase tracking-widest text-slate-700">Aguardando Localização...</p>
        </div>
        <div class="vroom-card p-6 space-y-4">
            <input id="cli-origem" type="text" placeholder="Sua localização atual..." class="vroom-input">
            <input id="cli-destino" type="text" placeholder="Para onde vamos?" class="vroom-input">
            <input id="cli-ref" type="text" placeholder="Ponto de Referência (Opcional)" class="vroom-input">
            <div class="flex justify-between items-end border-t border-slate-800 pt-4">
                <p class="text-slate-500 font-bold uppercase text-[10px]">Total Estimado</p>
                <p class="text-3xl font-black italic text-green-500">R$ 15,00</p>
            </div>
            <button onclick="pedirVroom()" class="btn-main">Pedir Vroom Moto</button>
        </div>
    </div>

    <!-- TELA: CADASTRO -->
    <div id="screen-recrutamento" class="screen overflow-y-auto">
        <button onclick="nav('portal')" class="text-slate-500 mb-4"><i class="fas fa-arrow-left"></i> Voltar</button>
        <h2 class="text-3xl font-black italic uppercase mb-2">Recrutamento</h2>
        <div class="space-y-4 pb-20">
            <input id="rec-nome" type="text" placeholder="Nome Completo" class="vroom-input">
            <input id="rec-cpf" type="tel" placeholder="CPF" class="vroom-input">
            <input id="rec-placa" type="text" placeholder="Placa da Moto" class="vroom-input">
            <input id="rec-user" type="text" placeholder="Crie um Usuário" class="vroom-input">
            <input id="rec-pass" type="password" placeholder="Crie uma Senha" class="vroom-input">
            <button onclick="processarCadastro()" class="btn-main">Enviar Dados</button>
        </div>
    </div>

    <!-- TELA: LOGIN MOTORISTA -->
    <div id="screen-motorista-login" class="screen justify-center items-center">
        <button onclick="nav('portal')" class="absolute top-8 left-8 text-slate-500"><i class="fas fa-arrow-left"></i></button>
        <div class="vroom-card w-full max-w-sm p-8">
            <h2 class="text-2xl font-black italic uppercase mb-8 text-center">Acesso Piloto</h2>
            <input id="log-user" type="text" placeholder="Usuário" class="vroom-input mb-4">
            <input id="log-pass" type="password" placeholder="Senha" class="vroom-input mb-8">
            <button onclick="loginPiloto()" class="btn-main">Iniciar Turno</button>
        </div>
    </div>

    <!-- TELA: DASHBOARD DO MOTORISTA (NOVO) -->
    <div id="screen-motorista-dash" class="screen">
        <div class="flex justify-between items-center mb-8">
            <h2 id="dash-welcome" class="text-xl font-black italic uppercase">Piloto Online</h2>
            <button onclick="nav('portal')" class="text-[10px] font-bold text-slate-500 border border-slate-800 px-3 py-1 rounded-full">Sair</button>
        </div>
        
        <div class="vroom-card p-6 flex justify-between items-center mb-6">
            <div>
                <p class="text-[10px] font-black text-slate-500 uppercase italic">Ganhos do Dia</p>
                <p class="text-3xl font-black text-green-500 italic">R$ 142,50</p>
            </div>
            <div class="text-right">
                <span class="bg-green-500/10 text-green-500 text-[9px] font-black px-3 py-1 rounded-full uppercase italic tracking-widest border border-green-500/20">Ativo</span>
            </div>
        </div>

        <h3 class="text-xs font-black uppercase text-orange-500 mb-4 tracking-widest italic">Pedidos no Radar</h3>
        <div id="radar-pedidos" class="space-y-4">
            <div class="vroom-card p-5 border-l-4 border-orange-500">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <p class="text-lg font-black italic">João Silva</p>
                        <p class="text-[10px] text-slate-500 font-bold uppercase italic">Distância: 1.2 km</p>
                    </div>
                    <p class="text-xl font-black text-white italic">R$ 12,00</p>
                </div>
                <div class="flex gap-2">
                    <button class="flex-1 bg-orange-500 py-3 rounded-xl font-black uppercase text-xs">Aceitar</button>
                    <button class="flex-1 bg-slate-800 py-3 rounded-xl font-black uppercase text-xs text-slate-500">Recusar</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentDriver = null;

        function nav(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + id).classList.add('active');
            window.scrollTo(0,0);
        }

        function processarCadastro() {
            const data = {
                id: Date.now(),
                nome: document.getElementById('rec-nome').value,
                cpf: document.getElementById('rec-cpf').value,
                placa: document.getElementById('rec-placa').value,
                user: document.getElementById('rec-user').value,
                pass: document.getElementById('rec-pass').value,
                status: 'pendente'
            };
            if(!data.user || !data.pass) return alert("Preencha tudo!");
            let p = JSON.parse(localStorage.getItem('vroom_v21_pendentes') || '[]');
            p.push(data);
            localStorage.setItem('vroom_v21_pendentes', JSON.stringify(p));
            alert("Cadastro enviado! Aguarde aprovação.");
            nav('portal');
        }

        function loginPiloto() {
            const u = document.getElementById('log-user').value;
            const p = document.getElementById('log-pass').value;
            let ativos = JSON.parse(localStorage.getItem('vroom_v21_ativos') || '[]');
            const found = ativos.find(m => m.user === u && m.pass === p);
            if(found) {
                currentDriver = found;
                document.getElementById('dash-welcome').innerText = "Piloto: " + found.nome.split(' ')[0];
                nav('motorista-dash');
            } else {
                alert("Acesso Negado ou Aguardando Aprovação.");
            }
        }

        function pedirVroom() {
            alert("Buscando pilotos no radar... Você verá o piloto assim que ele aceitar.");
        }
    </script>
</body>
</html>
