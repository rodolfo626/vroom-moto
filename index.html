<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VROOM MOTO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .vroom-card { background: #1e293b; border: 1px solid #334155; border-radius: 24px; padding: 24px; }
        .btn-primary { background: #f97316; color: white; font-weight: 900; text-transform: uppercase; padding: 16px; border-radius: 16px; width: 100%; transition: all 0.2s; }
        .btn-primary:active { transform: scale(0.98); background: #ea580c; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">
    <div class="w-full max-w-sm text-center">
        <div class="mb-8">
            <i class="fas fa-motorcycle text-6xl text-orange-500 mb-4"></i>
            <h1 class="text-4xl font-black italic tracking-tighter">VROOM<span class="text-orange-500">MOTO</span></h1>
            <p class="text-slate-500 text-xs font-bold uppercase tracking-widest mt-2">Versão 17.0 - Start</p>
        </div>

        <div class="vroom-card space-y-4">
            <button onclick="alert('Área do Cliente em breve')" class="btn-primary">Pedir uma Moto</button>
            <button onclick="alert('Área do Motorista em breve')" class="w-full bg-slate-800 text-slate-400 py-4 rounded-xl font-black uppercase text-xs">Área do Motorista</button>
            <button onclick="location.href='adm.html'" class="w-full text-slate-600 py-2 font-black uppercase text-[10px] tracking-widest flex items-center justify-center gap-2">
                <i class="fas fa-shield-halved"></i> Painel Administrativo
            </button>
        </div>
        
        <p class="mt-12 text-[10px] text-slate-700 font-bold uppercase italic tracking-widest">Powered by BrainLogic AI</p>
    </div>
</body>
</html>
