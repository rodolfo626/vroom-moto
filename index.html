<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VROOM MOTO v21.3 - Localização Real</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Leaflet para Mapas Reais (Sem necessidade de Chave Google no momento) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { background-color: #020617; color: white; font-family: sans-serif; }
        .vroom-card { background: #0f172a; border: 1px solid #1e293b; border-radius: 28px; }
        .screen { display: none; min-height: 100vh; padding: 16px; flex-direction: column; }
        .screen.active { display: flex; }
        .vroom-input { background: #1e293b; border: 1px solid #334155; padding: 16px; border-radius: 18px; width: 100%; color: white; outline: none; }
        .btn-main { background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); padding: 20px; border-radius: 22px; font-weight: 900; text-transform: uppercase; width: 100%; }
        #map { width: 100%; height: 260px; border-radius: 28px; margin-bottom: 16px; border: 1px solid #1e293b; z-index: 10; }
        .loading-gps { animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <!-- PORTAL -->
    <div id="screen-portal" class="screen active justify-center items-center">
        <h1 class="text-6xl font-black italic tracking-tighter text-center">VROOM<br><span class="text-orange-500">MOTO</span></h1>
        <div class="w-full max-w-sm space-y-4 mt-12">
            <button onclick="initClient()" class="btn-main italic">Chamar uma Vroom</button>
            <button onclick="nav('motorista-login')" class="w-full bg-slate-900 py-5 rounded-2xl font-black text-slate-500 uppercase border border-slate-800">Acesso Piloto</button>
            <button onclick="nav('cadastro')" class="w-full text-orange-500/50 py-4 font-black uppercase text-[10px] tracking-widest">Cadastro Externo</button>
        </div>
    </div>

    <!-- TELA CLIENTE -->
    <div id="screen-cliente" class="screen overflow-y-auto">
        <div class="flex items-center justify-between mb-4">
            <button onclick="nav('portal')" class="w-10 h-10 rounded-full bg-slate-900 flex items-center justify-center border border-slate-800"><i class="fas fa-arrow-left"></i></button>
            <h2 class="text-lg font-black italic uppercase">Viagem Ativa</h2>
            <div class="w-10"></div>
        </div>

        <div id="map"></div>

        <div class="vroom-card p-6 space-y-4 mb-8">
            <div class="relative">
                <label class="text-[9px] font-black uppercase text-slate-500 ml-3 mb-1 block italic">Partida (Localização Automática)</label>
                <input id="cli-origem" type="text" placeholder="Buscando seu GPS..." class="vroom-input pr-12">
                <div id="gps-icon" class="absolute right-4 top-9 text-slate-600"><i class="fas fa-circle-notch fa-spin"></i></div>
            </div>
            <input id="cli-destino" type="text" placeholder="Para onde vamos?" class="vroom-input">
            <input id="cli-ref" type="text" placeholder="Referência (Opcional)" class="vroom-input">
            
            <div class="flex justify-between items-center p-4 bg-slate-950 rounded-2xl mt-4">
                <p class="text-2xl font-black text-green-500 italic">R$ 10,00</p>
                <p class="text-[10px] font-black uppercase text-slate-500">Valor Fixo</p>
            </div>
            <button onclick="alert('Buscando piloto...')" class="btn-main">Confirmar Moto</button>
        </div>
    </div>

    <!-- ÁREAS ADICIONAIS (CADASTRO/LOGIN) MANTIDAS EM ESTRUTURA SIMPLIFICADA PARA FOCO NO GPS -->
    <div id="screen-cadastro" class="screen">... (Mantido da v21.2) ...</div>
    <div id="screen-motorista-login" class="screen">... (Mantido da v21.2) ...</div>

    <script>
        let map, marker;

        function nav(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + id).classList.add('active');
            if(id === 'cliente') setTimeout(() => map.invalidateSize(), 300);
        }

        function initClient() {
            nav('cliente');
            initMap();
            getGeoLocation();
        }

        function initMap() {
            if (!map) {
                map = L.map('map').setView([-23.5505, -46.6333], 15);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap'
                }).addTo(map);
                marker = L.marker([-23.5505, -46.6333]).addTo(map);
            }
        }

        function getGeoLocation() {
            const input = document.getElementById('cli-origem');
            const icon = document.getElementById('gps-icon');

            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(async (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;

                    // Atualiza Mapa
                    map.setView([lat, lon], 17);
                    marker.setLatLng([lat, lon]);

                    // Busca Nome da Rua via Reversão de Coordenadas (Nominatim API gratuita)
                    try {
                        const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
                        const data = await response.json();
                        input.value = data.display_name.split(',').slice(0, 2).join(',');
                        icon.innerHTML = '<i class="fas fa-check-circle text-green-500"></i>';
                    } catch (e) {
                        input.value = lat.toFixed(5) + ", " + lon.toFixed(5);
                        icon.innerHTML = '<i class="fas fa-location-dot text-orange-500"></i>';
                    }
                }, (error) => {
                    alert("Erro ao obter GPS: " + error.message);
                    input.placeholder = "Por favor, digite o endereço";
                    icon.innerHTML = '<i class="fas fa-exclamation-triangle text-red-500"></i>';
                }, { enableHighAccuracy: true });
            } else {
                alert("Seu navegador não suporta GPS automático.");
            }
        }
    </script>
</body>
</html>
