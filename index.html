<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VROOM MOTO v9.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        :root { --vroom: #FF6B00; }
        body { font-family: 'Inter', sans-serif; background: #0F172A; margin: 0; padding: 0; overflow-x: hidden; }
        .screen { display: none; min-height: 100vh; width: 100vw; flex-direction: column; background: #F8FAFC; }
        .screen.active { display: flex; }
        .vroom-btn { background: var(--vroom); color: white; font-weight: 800; text-transform: uppercase; border-radius: 18px; transition: 0.2s; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .input-vroom { background: #F1F5F9; border: 2px solid #E2E8F0; padding: 14px; border-radius: 16px; outline: none; font-weight: 600; width: 100%; color: #1E293B; font-size: 14px; }
        #map { height: 400px; width: 100%; z-index: 1; }
    </style>
</head>
<body onload="nav('portal')"> <!-- SEMPRE PORTAL -->

    <audio id="audio-buzina" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2855/2855-preview.mp3" type="audio/mpeg">
    </audio>

    <!-- TELA INICIAL (PORTAL) -->
    <div id="screen-portal" class="screen active items-center justify-center p-8 !bg-[#0F172A] text-white">
        <div class="text-center mb-12">
            <i class="fas fa-motorcycle text-7xl text-orange-500 mb-4"></i>
            <h1 class="text-5xl font-black italic tracking-tighter uppercase leading-none">VROOM<span class="text-orange-500">MOTO</span></h1>
            <p class="text-slate-500 text-[10px] font-bold uppercase mt-2 italic">v9.1 - Menu Principal</p>
        </div>
        <div class="w-full max-w-xs space-y-4">
            <button onclick="nav('cliente-login')" class="w-full vroom-btn py-5 text-lg shadow-2xl">Pedir uma Moto</button>
            <button onclick="nav('motorista-login')" class="w-full bg-slate-800 py-5 rounded-2xl font-black uppercase text-xs text-white">Sou Motorista</button>
            <button onclick="nav('adm-login')" class="w-full bg-transparent border-2 border-slate-700 text-slate-500 py-3 rounded-2xl text-[9px] font-black uppercase">Painel ADM</button>
        </div>
    </div>

    <!-- ÁREA CLIENTE -->
    <div id="screen-cliente-login" class="screen p-8 justify-center items-center">
        <div class="w-full max-w-sm text-center">
            <h2 class="text-2xl font-black italic mb-6">CLIENTE</h2>
            <input type="text" id="cli-nome" placeholder="Seu Nome" class="input-vroom mb-4">
            <button onclick="nav('cliente-app')" class="w-full vroom-btn py-5">Entrar</button>
            <button onclick="nav('portal')" class="mt-4 text-xs font-bold text-slate-400">VOLTAR AO INÍCIO</button>
        </div>
    </div>

    <div id="screen-cliente-app" class="screen !bg-white">
        <div id="map"></div>
        <div class="p-6">
            <input type="text" id="loc-destino" placeholder="Para onde?" class="input-vroom mb-4">
            <button onclick="alert('Pedido enviado!')" class="w-full vroom-btn py-5">Solicitar Moto</button>
            <button onclick="nav('portal')" class="mt-4 w-full text-xs font-bold text-slate-400">SAIR</button>
        </div>
    </div>

    <!-- ÁREA MOTORISTA -->
    <div id="screen-motorista-login" class="screen p-8 justify-center items-center">
        <div class="w-full max-w-sm text-center">
            <h2 class="text-2xl font-black italic mb-6">MOTORISTA</h2>
            <input type="text" id="mot-user" placeholder="Usuário" class="input-vroom mb-4" value="Rodolfo Oliveira">
            <input type="password" id="mot-pass" placeholder="Senha" class="input-vroom mb-4" value="Rm280198">
            <button onclick="nav('motorista-app')" class="w-full vroom-btn py-5">Ficar Online</button>
            <button onclick="nav('portal')" class="mt-4 text-xs font-bold text-slate-400">VOLTAR AO INÍCIO</button>
        </div>
    </div>

    <div id="screen-motorista-app" class="screen !bg-slate-50">
        <header class="bg-slate-900 text-white p-6 flex justify-between items-center">
            <span class="font-black italic">FILA VROOM</span>
            <button onclick="nav('portal')" class="text-[10px] font-black">SAIR</button>
        </header>
        <div class="p-8 text-center">
            <p class="text-slate-400 text-sm mb-4">Aguardando corridas...</p>
            <button onclick="document.getElementById('audio-buzina').play()" class="bg-slate-200 px-4 py-2 rounded-xl text-[10px] font-black uppercase italic">Testar Buzina</button>
        </div>
    </div>

    <!-- ÁREA ADM -->
    <div id="screen-adm-login" class="screen p-8 justify-center items-center">
        <div class="w-full max-w-sm text-center">
            <h2 class="text-2xl font-black italic mb-6">ADM</h2>
            <input type="text" id="adm-user" placeholder="Usuário" class="input-vroom mb-4" value="Rodolfo Oliveira">
            <input type="password" id="adm-pass" placeholder="Senha" class="input-vroom mb-4">
            <button onclick="alert('Painel Master Ativo!')" class="w-full vroom-btn py-5">Acessar</button>
            <button onclick="nav('portal')" class="mt-4 text-xs font-bold text-slate-400">VOLTAR AO INÍCIO</button>
        </div>
    </div>

    <script>
        function nav(id) {
            // Remove classe active de todas as telas
            document.querySelectorAll('.screen').forEach(s => {
                s.classList.remove('active');
                s.style.display = 'none';
            });
            // Ativa a tela correta
            const target = document.getElementById('screen-' + id);
            if(target) {
                target.classList.add('active');
                target.style.display = 'flex';
            }
            if(id === 'cliente-app') initMap();
        }

        function initMap() {
            setTimeout(() => {
                if(!document.getElementById('map').innerHTML) {
                    let m = L.map('map').setView([-23.55, -46.63], 15);
                    L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}').addTo(m);
                }
            }, 300);
        }
    </script>
</body>
</html>
