<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VROOM MOTO v24.4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        body { background: #f4f7f6; color: #1e293b; font-family: 'Outfit', sans-serif; }
        .screen { display: none; min-height: 100vh; padding: 20px; flex-direction: column; }
        .screen.active { display: flex; }
        .vroom-card { background: white; border-radius: 28px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); transition: 0.3s; border: 1px solid #f1f5f9; }
        .vroom-card:active { transform: scale(0.95); }
        .btn-main { background: #f97316; color: white; padding: 20px; border-radius: 24px; font-weight: 900; text-transform: uppercase; width: 100%; }
        .gradient-orange { background: linear-gradient(135deg, #f97316 0%, #fb923c 100%); }
    </style>
</head>
<body>

    <!-- PORTAL DE ENTRADA -->
    <div id="screen-portal" class="screen active justify-center">
        <div class="text-center mb-12">
            <h1 class="text-5xl font-black italic tracking-tighter leading-none">VROOM<br><span class="text-orange-500">MOTO</span></h1>
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.4em] mt-2">Plataforma de Serviços</p>
        </div>

        <div class="space-y-6 max-w-sm mx-auto w-full">
            <!-- BOTÃO CLIENTE -->
            <div onclick="nav('cliente')" class="vroom-card p-8 flex items-center gap-6 cursor-pointer border-l-8 border-orange-500">
                <div class="w-16 h-16 bg-orange-50 rounded-2xl flex items-center justify-center text-orange-500 text-3xl">
                    <i class="fas fa-motorcycle"></i>
                </div>
                <div>
                    <h2 class="text-2xl font-black italic uppercase leading-none">Cliente</h2>
                    <p class="text-xs font-bold text-slate-400 mt-1 uppercase">Pedir Viagem Agora</p>
                </div>
            </div>

            <!-- BOTÃO PILOTO -->
            <div onclick="abrirCheckinPiloto()" class="vroom-card p-8 flex items-center gap-6 cursor-pointer border-l-8 border-slate-800">
                <div class="w-16 h-16 bg-slate-100 rounded-2xl flex items-center justify-center text-slate-800 text-3xl">
                    <i class="fas fa-helmet-safety"></i>
                </div>
                <div>
                    <h2 class="text-2xl font-black italic uppercase leading-none">Piloto</h2>
                    <p class="text-xs font-bold text-slate-400 mt-1 uppercase">Centro de Prestação</p>
                </div>
            </div>
        </div>

        <p onclick="location.href='adm.html'" class="text-center mt-20 text-slate-300 font-bold text-[10px] uppercase tracking-widest cursor-pointer">Administração</p>
    </div>

    <!-- TELA DE SELEÇÃO DE PILOTO (O "LOGIN" SEM SENHA) -->
    <div id="screen-piloto-checkin" class="screen">
        <header class="flex items-center gap-4 mb-10">
            <button onclick="nav('portal')" class="w-12 h-12 rounded-2xl bg-white shadow-sm flex items-center justify-center"><i class="fas fa-chevron-left"></i></button>
            <h2 class="text-xl font-black italic uppercase">Quem está operando?</h2>
        </header>

        <div id="lista-pilotos" class="grid grid-cols-1 gap-4">
            <!-- CARDS DE PILOTOS SERÃO INJETADOS AQUI -->
        </div>
    </div>

    <!-- ÁREA DO PILOTO (CENTRO DE PRESTAÇÃO) -->
    <div id="screen-piloto-dash" class="screen">
        <div class="flex justify-between items-center mb-8">
            <h2 id="current-pilot" class="font-black italic uppercase text-lg">Piloto Online</h2>
            <button onclick="nav('portal')" class="bg-red-50 text-red-500 px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest">Sair</button>
        </div>

        <div class="vroom-card p-6 gradient-orange text-white mb-6">
            <p class="text-[10px] font-bold uppercase opacity-80 mb-1">Ganhos em Aberto</p>
            <p class="text-4xl font-black italic tracking-tighter">R$ 0,00</p>
        </div>

        <div class="space-y-4">
            <h3 class="text-xs font-black uppercase text-slate-400 tracking-[0.2em] italic ml-2">Serviços Disponíveis</h3>
            <div class="p-12 border-2 border-dashed border-slate-200 rounded-[32px] flex flex-col items-center justify-center text-slate-300 text-center">
                <i class="fas fa-satellite-dish text-4xl mb-4"></i>
                <p class="text-xs font-bold uppercase italic leading-tight">Aguardando pedidos<br>do Terminal do Cliente</p>
            </div>
        </div>
    </div>

    <!-- TELA CLIENTE (TERMINAL) -->
    <div id="screen-cliente" class="screen">
        <header class="flex items-center gap-4 mb-8">
            <button onclick="nav('portal')" class="w-12 h-12 rounded-2xl bg-white shadow-sm flex items-center justify-center"><i class="fas fa-chevron-left"></i></button>
            <h2 class="text-xl font-black italic uppercase">Terminal Vroom</h2>
        </header>
        <div class="vroom-card p-8 space-y-4">
            <input type="text" placeholder="Origem" class="w-full p-5 bg-slate-50 rounded-2xl border-2 border-slate-100 outline-none font-bold" value="Minha Localização">
            <input type="text" placeholder="Destino" class="w-full p-5 bg-slate-50 rounded-2xl border-2 border-slate-100 outline-none font-bold">
            <button class="btn-main mt-4">Solicitar Moto</button>
        </div>
    </div>

    <script>
        // Pilotos Simulados (No sistema real viriam do ADM)
        const pilotosCadastrados = [
            { id: 1, nome: "Claudio Piloto", moto: "Titan 160", placa: "ABC-1234" },
            { id: 2, nome: "Rodolfo Oliveira", moto: "XRE 300", placa: "XYZ-9999" },
            { id: 3, nome: "Marcos Vroom", moto: "Fazer 250", placa: "MOT-0000" }
        ];

        function nav(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + id).classList.add('active');
            window.scrollTo(0,0);
        }

        function abrirCheckinPiloto() {
            const container = document.getElementById('lista-pilotos');
            container.innerHTML = pilotosCadastrados.map(p => `
                <div onclick="entrarComo('${p.nome}')" class="vroom-card p-6 flex items-center justify-between cursor-pointer hover:border-orange-500">
                    <div class="flex items-center gap-4">
                        <div class="w-14 h-14 bg-slate-800 rounded-2xl flex items-center justify-center text-white text-xl font-black italic">
                            ${p.nome.charAt(0)}
                        </div>
                        <div>
                            <p class="font-black uppercase italic leading-none">${p.nome}</p>
                            <p class="text-[10px] font-bold text-slate-400 uppercase mt-1">${p.moto} • ${p.placa}</p>
                        </div>
                    </div>
                    <i class="fas fa-chevron-right text-slate-200"></i>
                </div>
            `).join('');
            nav('piloto-checkin');
        }

        function entrarComo(nome) {
            document.getElementById('current-pilot').innerText = "Piloto: " + nome;
            nav('piloto-dash');
        }
    </script>
</body>
</html>
