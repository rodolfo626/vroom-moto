<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VROOM MOTO v7.1 - Sistema Unificado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        :root { --vroom: #FF6B00; }
        body { font-family: 'Inter', sans-serif; background: #0F172A; margin: 0; padding: 0; overflow-x: hidden; }
        .screen { display: none; min-height: 100vh; width: 100vw; flex-direction: column; background: #F8FAFC; }
        .screen.active { display: flex; }
        .vroom-btn { background: var(--vroom); color: white; font-weight: 800; text-transform: uppercase; border-radius: 18px; transition: 0.2s; border: none; cursor: pointer; }
        .input-vroom { background: #F1F5F9; border: 2px solid #E2E8F0; padding: 14px; border-radius: 16px; outline: none; font-weight: 600; width: 100%; color: #1E293B; font-size: 14px; }
        #map { height: 300px; width: 100%; z-index: 1; border-bottom: 4px solid var(--vroom); }
        .card-adm { background: white; border-radius: 24px; padding: 20px; border: 1px solid #E2E8F0; margin-bottom: 20px; }
        .nav-item { padding: 10px; border-radius: 10px; font-weight: 700; font-size: 9px; text-transform: uppercase; color: #64748B; cursor: pointer; flex-shrink: 0; white-space: nowrap; }
        .nav-item.active { background: #0F172A; color: white; }
        .card-job { background: white; border-radius: 20px; padding: 20px; border: 2px solid #E2E8F0; position: relative; overflow: hidden; margin-bottom: 16px; }
        .card-job.next { border-color: var(--vroom); box-shadow: 0 10px 15px -3px rgba(255, 107, 0, 0.1); }
        .badge-next { position: absolute; top: 0; right: 0; background: var(--vroom); color: white; font-size: 8px; font-weight: 900; padding: 4px 12px; border-radius: 0 0 0 12px; text-transform: uppercase; }
        .modal-bottom { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-radius: 32px 32px 0 0; padding: 24px; z-index: 100; transform: translateY(100%); transition: 0.4s; box-shadow: 0 -10px 25px rgba(0,0,0,0.1); }
        .modal-bottom.show { transform: translateY(0); }
        .photo-box { width: 80px; height: 80px; background: #F1F5F9; border: 2px dashed #CBD5E1; border-radius: 20px; display: flex; flex-direction: column; items-center; justify-center; cursor: pointer; overflow: hidden; position: relative; margin: 0 auto; }
        .preview-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: none; }
    </style>
</head>
<body onload="checkFirstAccess()">

    <!-- PORTAL PRINCIPAL -->
    <div id="screen-portal" class="screen items-center justify-center p-8 !bg-[#0F172A] text-white">
        <div class="text-center mb-12">
            <i class="fas fa-motorcycle text-7xl text-orange-500 mb-4"></i>
            <h1 class="text-5xl font-black italic tracking-tighter uppercase">VROOM<span class="text-orange-500">MOTO</span></h1>
            <p class="text-slate-500 text-[10px] font-bold uppercase mt-2 italic">Professional v7.1</p>
        </div>
        <div class="w-full max-w-xs space-y-4">
            <button onclick="nav('cliente-login')" class="w-full vroom-btn py-5 text-lg shadow-2xl">Pedir uma Moto</button>
            <button onclick="nav('motorista-login')" class="w-full bg-slate-800 py-5 rounded-2xl font-black uppercase text-xs text-white">Motorista</button>
            <button onclick="nav('adm-login')" class="w-full bg-transparent border-2 border-slate-700 text-slate-500 py-3 rounded-2xl text-[9px] font-black uppercase">Painel Master</button>
        </div>
    </div>

    <!-- TELA: CADASTRO CLIENTE -->
    <div id="screen-cliente-login" class="screen p-8 justify-center items-center">
        <div class="w-full max-w-sm text-center">
            <div class="photo-box !w-24 !h-24 !rounded-full mb-6" onclick="trigger('f-cli')">
                <i class="fas fa-camera text-slate-400"></i>
                <img id="p-f-cli" class="preview-img"><input type="file" id="f-cli" hidden onchange="pv(this, 'p-f-cli')">
            </div>
            <h2 class="text-2xl font-black italic mb-6 uppercase">Seja Bem-vindo</h2>
            <div class="space-y-3">
                <input type="text" id="cli-nome" placeholder="Seu Nome" class="input-vroom">
                <input type="tel" id="cli-tel" placeholder="WhatsApp (DDD+Número)" class="input-vroom">
                <button onclick="registrarCliente()" class="w-full vroom-btn py-5 mt-4">Concluir e Entrar</button>
                <button onclick="nav('portal')" class="text-slate-400 text-[10px] font-black uppercase mt-8 block w-full">Voltar</button>
            </div>
        </div>
    </div>

    <!-- TELA: APP CLIENTE (MAPA) -->
    <div id="screen-cliente-app" class="screen !bg-white">
        <div class="p-4 flex justify-between items-center border-b">
            <span class="font-black text-xs italic uppercase" id="user-display-name">Usuário</span>
            <button onclick="logout()" class="text-slate-300 text-[10px] font-black uppercase">Sair</button>
        </div>
        <div id="map"></div>
        <div class="p-6 space-y-4 overflow-y-auto pb-32">
            <input type="text" id="loc-origem" readonly class="input-vroom !bg-slate-50 !border-none text-xs">
            <input type="text" id="loc-destino" placeholder="Para onde vamos?" class="input-vroom">
            <div class="grid grid-cols-2 gap-3">
                <button onclick="solicitar('M')" class="p-4 rounded-2xl border-2 border-slate-100 flex flex-col items-center">
                    <span class="text-[8px] font-black uppercase text-slate-400">Municipal</span>
                    <span class="text-xs font-black">R$ 7,00</span>
                </button>
                <button onclick="solicitar('I')" class="p-4 rounded-2xl border-2 border-slate-100 flex flex-col items-center">
                    <span class="text-[8px] font-black uppercase text-slate-400">Inter (KM)</span>
                    <span class="text-xs font-black">R$ 2,00/KM</span>
                </button>
            </div>
            <button onclick="solicitar('Vroom')" class="w-full vroom-btn py-5">Confirmar Pedido</button>
        </div>
    </div>

    <!-- TELA: LOGIN MOTORISTA -->
    <div id="screen-motorista-login" class="screen p-8 justify-center items-center">
        <div class="w-full max-w-sm text-center">
            <i class="fas fa-motorcycle text-6xl text-slate-800 mb-6"></i>
            <h2 class="text-2xl font-black italic mb-8 uppercase">Motorista</h2>
            <div class="space-y-4">
                <input type="text" placeholder="Usuário" class="input-vroom">
                <input type="password" placeholder="Senha" class="input-vroom">
                <button onclick="nav('motorista-app')" class="w-full vroom-btn py-5">Entrar</button>
                <button onclick="nav('portal')" class="text-slate-400 font-bold uppercase text-[10px] mt-6 block w-full">Voltar</button>
            </div>
        </div>
    </div>

    <!-- TELA: APP MOTORISTA (FILA) -->
    <div id="screen-motorista-app" class="screen !bg-slate-50">
        <header class="bg-slate-900 text-white p-6 flex justify-between items-center">
            <span class="font-black italic">VROOM <span class="text-orange-500">PRO</span></span>
            <span class="text-[10px] font-black uppercase bg-green-500 px-2 py-1 rounded">Online</span>
        </header>
        <div class="p-6 space-y-4 flex-1 overflow-y-auto">
            <h2 class="text-xs font-black uppercase text-slate-400 italic">Fila de Corridas (FIFO)</h2>
            <div id="queue-container" class="space-y-4">
                <div class="card-job next">
                    <div class="badge-next">PRÓXIMA DA FILA</div>
                    <p class="text-[10px] font-black text-slate-400 uppercase">Cliente: João Pedro</p>
                    <p class="text-sm font-black italic mb-4">R$ 7,00 (Municipal)</p>
                    <button onclick="alert('Corrida Aceita!')" class="w-full vroom-btn py-4 text-xs">Aceitar Corrida</button>
                </div>
            </div>
        </div>
        <button onclick="nav('portal')" class="p-4 text-slate-400 text-xs font-black uppercase">Sair</button>
    </div>

    <!-- TELA: LOGIN ADM -->
    <div id="screen-adm-login" class="screen p-8 justify-center items-center">
        <div class="w-full max-w-sm bg-white p-10 rounded-[40px] shadow-2xl text-center">
            <h2 class="text-2xl font-black italic mb-8 uppercase">Painel Master</h2>
            <div class="space-y-4">
                <input type="text" id="adm-user" placeholder="Usuário" class="input-vroom" value="Rodolfo Oliveira">
                <input type="password" id="adm-pass" placeholder="Senha" class="input-vroom">
                <button onclick="checkAdm()" class="w-full vroom-btn py-4">Entrar</button>
                <button onclick="nav('portal')" class="text-slate-400 text-[10px] font-black uppercase mt-6 block">Voltar</button>
            </div>
        </div>
    </div>

    <!-- TELA: DASHBOARD ADM -->
    <div id="screen-adm-dashboard" class="screen !bg-slate-50 overflow-y-auto">
        <header class="bg-slate-900 text-white p-6 flex justify-between items-center sticky top-0 z-50">
            <span class="font-black italic uppercase">VROOM <span class="text-orange-500">MASTER</span></span>
            <button onclick="nav('portal')" class="text-slate-400"><i class="fas fa-sign-out-alt"></i></button>
        </header>
        <nav class="bg-white border-b p-2 flex overflow-x-auto gap-2">
            <div onclick="tab('mot')" class="nav-item active">Motoristas</div>
            <div onclick="tab('pre')" class="nav-item">Preços</div>
            <div onclick="tab('fin')" class="nav-item">Financeiro</div>
        </nav>
        <div class="p-6">
            <div class="card-adm">
                <h3 class="text-[10px] font-black uppercase text-slate-400 mb-4">Gestão de Sistema</h3>
                <p class="text-sm font-bold text-slate-600">Painel Operacional Ativo.</p>
            </div>
        </div>
    </div>

    <script>
        let map;
        function nav(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            const target = document.getElementById('screen-' + id);
            if(target) target.classList.add('active');
            if(id === 'cliente-app') initMap();
        }
        function checkFirstAccess() {
            const c = localStorage.getItem('vroom_cliente');
            if(c) loginAutomatico(JSON.parse(c));
            else nav('portal');
        }
        function registrarCliente() {
            const n = document.getElementById('cli-nome').value;
            const t = document.getElementById('cli-tel').value;
            if(!n || !t) { alert('Preencha tudo!'); return; }
            const d = { nome: n, tel: t };
            localStorage.setItem('vroom_cliente', JSON.stringify(d));
            loginAutomatico(d);
        }
        function loginAutomatico(d) {
            document.getElementById('user-display-name').innerText = d.nome;
            nav('cliente-app');
        }
        function logout() { localStorage.removeItem('vroom_cliente'); window.location.reload(); }
        function checkAdm() {
            const u = document.getElementById('adm-user').value;
            const p = document.getElementById('adm-pass').value;
            if(u === 'Rodolfo Oliveira' && p === 'Rm290198') nav('adm-dashboard');
            else alert('Acesso Negado!');
        }
        function initMap() {
            setTimeout(() => {
                if(!map) {
                    map = L.map('map').setView([-23.55, -46.63], 15);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                    if(navigator.geolocation) {
                        navigator.geolocation.getCurrentPosition(pos => {
                            const { latitude, longitude } = pos.coords;
                            map.setView([latitude, longitude], 17);
                            L.marker([latitude, longitude]).addTo(map);
                        });
                    }
                }
                map.invalidateSize();
            }, 300);
        }
        function tab(t) { alert('Aba ' + t + ' ativa.'); }
        function trigger(id) { document.getElementById(id).click(); }
        function pv(input, pre) {
            if (input.files && input.files[0]) {
                var r = new FileReader();
                r.onload = e => { 
                    const img = document.getElementById(pre);
                    img.src = e.target.result; img.style.display = 'block';
                }
                r.readAsDataURL(input.files[0]);
            }
        }
        function solicitar(t) { alert('Buscando motoristas...'); }
    </script>
</body>
</html>
