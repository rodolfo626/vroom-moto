<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VROOM MOTO v22.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #f8fafc; color: #1e293b; font-family: sans-serif; }
        .screen { display: none; min-height: 100vh; }
        .screen.active { display: flex; flex-direction: column; }
        .btn { padding: 16px; border-radius: 12px; font-weight: bold; text-align: center; transition: 0.2s; cursor: pointer; }
        .btn-orange { background: #f97316; color: white; }
        .btn-slate { background: #1e293b; color: white; }
        .input-vroom { background: white; border: 1px solid #e2e8f0; padding: 14px; border-radius: 12px; width: 100%; outline: none; }
        .card { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <!-- TELA 1: PORTAL SIMPLES -->
    <div id="screen-portal" class="screen active justify-center p-6 items-center">
        <h1 class="text-5xl font-black italic mb-2">VROOM<span class="text-orange-500">MOTO</span></h1>
        <p class="text-slate-400 font-bold uppercase text-[10px] tracking-widest mb-12">Simples • Direto • Completo</p>
        
        <div class="w-full max-w-xs space-y-4">
            <div onclick="nav('cliente')" class="btn btn-orange text-lg italic">Pedir Moto</div>
            <div onclick="nav('login')" class="btn btn-slate italic">Sou Piloto</div>
            <div onclick="nav('cadastro')" class="text-center text-orange-500 font-bold text-sm mt-4 cursor-pointer">Quero trabalhar na Vroom</div>
        </div>

        <button onclick="location.href='adm.html'" class="mt-20 text-slate-300 text-[10px] uppercase font-bold tracking-widest">Painel ADM</button>
    </div>

    <!-- TELA 2: CLIENTE -->
    <div id="screen-cliente" class="screen p-6">
        <div class="flex items-center mb-6">
            <i onclick="nav('portal')" class="fas fa-arrow-left text-xl mr-4 cursor-pointer"></i>
            <h2 class="text-xl font-black italic uppercase">Chamar Vroom</h2>
        </div>
        <div class="space-y-4">
            <input id="cli-origem" type="text" placeholder="De onde você sai?" class="input-vroom">
            <input id="cli-destino" type="text" placeholder="Para onde você vai?" class="input-vroom">
            <input id="cli-ref" type="text" placeholder="Ponto de Referência" class="input-vroom">
            
            <div class="card flex justify-between items-center">
                <span class="font-bold text-slate-500">Valor Fixo</span>
                <span class="text-2xl font-black text-green-600 italic">R$ 10,00</span>
            </div>
            
            <div onclick="alert('Buscando piloto...')" class="btn btn-orange text-lg italic">Confirmar Agora</div>
        </div>
    </div>

    <!-- TELA 3: CADASTRO MOTORISTA -->
    <div id="screen-cadastro" class="screen p-6 overflow-y-auto">
        <div class="flex items-center mb-6">
            <i onclick="nav('portal')" class="fas fa-arrow-left text-xl mr-4 cursor-pointer"></i>
            <h2 class="text-xl font-black italic uppercase">Cadastro Piloto</h2>
        </div>
        <div class="space-y-3 pb-10">
            <input id="rec-nome" type="text" placeholder="Nome Completo" class="input-vroom">
            <input id="rec-cpf" type="tel" placeholder="CPF" class="input-vroom">
            <input id="rec-placa" type="text" placeholder="Placa da Moto" class="input-vroom">
            <input id="rec-user" type="text" placeholder="Escolha um Usuário" class="input-vroom">
            <input id="rec-pass" type="password" placeholder="Crie uma Senha" class="input-vroom">
            <div onclick="salvarCadastro()" class="btn btn-orange italic">Enviar Dados</div>
        </div>
    </div>

    <!-- TELA 4: LOGIN MOTORISTA -->
    <div id="screen-login" class="screen p-6 justify-center">
        <div class="card text-center">
            <h2 class="text-2xl font-black italic mb-6">LOGIN PILOTO</h2>
            <input id="log-user" type="text" placeholder="Usuário" class="input-vroom mb-3">
            <input id="log-pass" type="password" placeholder="Senha" class="input-vroom mb-6">
            <div onclick="login()" class="btn btn-slate italic mb-4">Entrar</div>
            <p onclick="nav('portal')" class="text-slate-400 text-sm font-bold uppercase">Voltar</p>
        </div>
    </div>

    <script>
        function nav(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + id).classList.add('active');
            window.scrollTo(0,0);
        }

        function salvarCadastro() {
            const data = {
                id: Date.now(),
                nome: document.getElementById('rec-nome').value,
                user: document.getElementById('rec-user').value,
                pass: document.getElementById('rec-pass').value,
                status: 'pendente'
            };
            if(!data.user || !data.nome) return alert("Preencha os campos!");
            let db = JSON.parse(localStorage.getItem('vroom_db') || '[]');
            db.push(data);
            localStorage.setItem('vroom_db', JSON.stringify(db));
            alert("Enviado! O Rodolfo vai aprovar seu acesso.");
            nav('portal');
        }

        function login() {
            const u = document.getElementById('log-user').value;
            const p = document.getElementById('log-pass').value;
            let ativos = JSON.parse(localStorage.getItem('vroom_ativos') || '[]');
            if(ativos.find(x => x.user === u && x.pass === p)) {
                alert("Bem-vindo ao trabalho!");
            } else {
                alert("Usuário não encontrado ou não aprovado.");
            }
        }
    </script>
</body>
</html>
