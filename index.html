<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VROOM MOTO - v1.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Outfit:wght@400;900&display=swap');
        
        body { 
            background: #0f172a; 
            color: white; 
            font-family: 'Outfit', sans-serif;
            margin: 0;
            overflow: hidden;
        }

        .bg-gradient {
            background: radial-gradient(circle at top right, #f97316 0%, transparent 40%),
                        radial-gradient(circle at bottom left, #4338ca 0%, transparent 40%);
            position: fixed;
            inset: 0;
            z-index: 0;
            opacity: 0.3;
        }

        .main-content {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .logo-vroom {
            font-family: 'Archivo Black', sans-serif;
            font-size: 70px;
            line-height: 0.8;
            letter-spacing: -4px;
            text-transform: uppercase;
            font-style: italic;
            text-align: center;
            margin-bottom: 60px;
        }

        .btn-impact {
            width: 100%;
            max-width: 340px;
            padding: 24px;
            border-radius: 28px;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 18px;
            letter-spacing: 1px;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .btn-impact:active { transform: scale(0.95); }

        .btn-orange { 
            background: #f97316; 
            box-shadow: 0 15px 30px -10px rgba(249, 115, 22, 0.5); 
        }

        .btn-dark { 
            background: rgba(255,255,255,0.1); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .footer-link {
            position: absolute;
            bottom: 40px;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: rgba(255,255,255,0.2);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="bg-gradient"></div>

    <div class="main-content">
        <!-- LOGO IMPACTANTE -->
        <div class="logo-vroom">
            VROOM<br><span class="text-orange-500">MOTO</span>
        </div>

        <!-- BOTÕES DE AÇÃO -->
        <div class="w-full flex flex-col items-center">
            <button class="btn-impact btn-orange">
                <span>Chamar Agora</span>
                <i class="fas fa-arrow-right"></i>
            </button>

            <button class="btn-impact btn-dark">
                <span>Sou Piloto</span>
                <i class="fas fa-helmet-safety"></i>
            </button>
        </div>

        <!-- ACESSO ADM -->
        <div onclick="alert('Área Restrita')" class="footer-link">
            Painel Administrativo
        </div>
    </div>

</body>
</html>
