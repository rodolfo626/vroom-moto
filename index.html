<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VROOM MOTO - v1.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Outfit:wght@400;900&display=swap');
        
        body { background: #0f172a; color: white; font-family: 'Outfit', sans-serif; margin: 0; min-height: 100vh; display: flex; flex-direction: column; }
        .bg-gradient { background: radial-gradient(circle at top right, #f97316 0%, transparent 40%), radial-gradient(circle at bottom left, #4338ca 0%, transparent 40%); position: fixed; inset: 0; z-index: 0; opacity: 0.3; }
        
        .main-content { position: relative; z-index: 10; flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 30px; }
        .logo-vroom { font-family: 'Archivo Black', sans-serif; font-size: 64px; line-height: 0.8; letter-spacing: -4px; text-transform: uppercase; font-style: italic; text-align: center; margin-bottom: 50px; }
        
        .btn-impact { width: 100%; max-width: 340px; padding: 22px; border-radius: 24px; font-weight: 900; text-transform: uppercase; font-size: 16px; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 12px; }
        .btn-impact:active { transform: scale(0.96); }
        .btn-orange { background: #f97316; box-shadow: 0 10px 20px -5px rgba(249, 115, 22, 0.4); }
        .btn-dark { background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.1); }
        .btn-outline { background: transparent; border: 2px solid #f97316; color: #f97316; }
        .btn-adm { background: #1e293b; color: #64748b; font-size: 10px; padding: 12px 24px; border-radius: 12px; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>

    <div class="main-content">
        <div class="logo-vroom">VROOM<br><span class="text-orange-500">MOTO</span></div>

        <div class="w-full flex flex-col items-center gap-2">
            <!-- CLIENTE -->
            <button class="btn-impact btn-orange">
                <i class="fas fa-motorcycle"></i> Pedir Viagem
            </button>

            <!-- PILOTO -->
            <button class="btn-impact btn-dark">
                <i class="fas fa-helmet-safety"></i> Sou Piloto
            </button>

            <!-- CADASTRO -->
            <button class="btn-impact btn-outline mt-2">
                <i class="fas fa-user-plus"></i> Novo Cadastro
            </button>
            
            <p class="text-[9px] text-slate-500 font-bold uppercase tracking-widest mt-2 italic">Seja um parceiro Vroom</p>
        </div>

        <!-- BOTÃO ADM VISÍVEL -->
        <div class="mt-16 w-full flex justify-center">
            <button class="btn-adm font-black uppercase">
                <i class="fas fa-lock mr-2"></i> Área Administrativa
            </button>
        </div>
    </div>
</body>
</html>
