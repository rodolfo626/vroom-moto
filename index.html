<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Vroom Moto 2.0</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
    :root { --vroom: #FF6B00; }
    body { font-family: 'Inter', sans-serif; background: #F3F4F6; margin: 0; padding: 0; overflow: hidden; }
    .screen { display: none; height: 100vh; width: 100vw; flex-direction: column; position: fixed; top: 0; left: 0; background: #F3F4F6; z-index: 10; }
    .screen.active { display: flex; }
    .vroom-btn { background: var(--vroom); color: white; border: none; font-weight: 900; transition: transform 0.1s; cursor: pointer; }
    .vroom-btn:active { transform: scale(0.95); }
    .card { background: white; border-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
    .type-card { border: 2px solid #E5E7EB; border-radius: 16px; transition: 0.2s; cursor: pointer; padding: 12px; text-align: center; }
    .type-card.active { border-color: var(--vroom); background: #FFF7ED; }
    #results { position: absolute; background: white; width: calc(100% - 48px); max-height: 200px; overflow-y: auto; z-index: 100; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: none; }
    .result-item { padding: 12px 16px; border-bottom: 1px solid #F3F4F6; font-size: 14px; cursor: pointer; font-weight: 600; color: #475569; }
  </style>
</head>
<body>

  <!-- PORTAL -->
  <div id="screen-portal" class="screen active p-8 items-center justify-center text-center">
    <div class="text-7xl mb-6">🏍️</div>
    <h1 class="text-5xl font-black italic tracking-tighter mb-2">VROOM<span class="text-orange-600">MOTO</span></h1>
    <p class="text-slate-400 font-bold text-xs tracking-widest uppercase mb-12 italic">Escolha seu Perfil</p>
    <div class="w-full max-w-xs space-y-4">
      <button onclick="initApp('cliente')" class="w-full vroom-btn py-6 rounded-2xl text-xl shadow-xl italic uppercase">Sou Cliente</button>
      <button onclick="initApp('motorista')" class="w-full bg-slate-900 text-white py-6 rounded-2xl text-xl shadow-xl italic uppercase">Sou Motorista</button>
      
      <!-- BOTÃO DA CENTRAL ADM -->
      <button onclick="initApp('adm')" class="w-full bg-white border-2 border-slate-200 text-slate-500 py-4 rounded-2xl text-xs font-black uppercase tracking-widest flex items-center justify-center gap-2">
        <i class="fas fa-lock"></i> Central ADM
      </button>
    </div>
  </div>

  <!-- TELAS RESTANTES (CLIENTE, MOTORISTA, ADM) -->
  <div id="screen-cliente-home" class="screen">
    <div class="p-6 bg-white flex justify-between items-center shadow-sm">
      <span class="text-2xl font-black italic tracking-tighter">VROOM</span>
      <button onclick="location.reload()" class="bg-slate-100 p-2 rounded-lg text-slate-500 font-bold text-xs uppercase">Sair</button>
    </div>
    <div class="p-6 flex-1 overflow-y-auto space-y-6">
      <div id="status-cliente-container">
          <div id="pedir-box" class="card p-6">
            <h3 class="text-lg font-black text-slate-800 mb-4 italic">Para onde vamos?</h3>
            <div class="space-y-3 mb-6 relative">
                <input type="text" id="cli-origem" placeholder="Sua localização..." class="w-full bg-slate-50 p-4 rounded-xl border-2 border-slate-100 outline-none font-bold text-sm">
                <input type="text" id="cli-destino" oninput="searchAddress(this.value)" placeholder="Destino final" class="w-full bg-slate-50 p-4 rounded-xl border-2 border-slate-100 outline-none focus:border-orange-500 font-bold text-sm">
                <div id="results"></div>
            </div>
            <div class="grid grid-cols-2 gap-3 mb-6">
              <div id="btn-mun" onclick="setMod('municipal')" class="type-card active">
                <div class="text-[10px] font-black text-slate-400 uppercase">MUNICIPAL</div>
                <div id="price-mun" class="text-orange-600 font-black text-lg italic mt-1 leading-none">R$ 7,00</div>
              </div>
              <div id="btn-inter" onclick="setMod('inter')" class="type-card">
                <div class="text-[10px] font-black text-slate-400 uppercase">INTER</div>
                <div id="price-inter" class="text-orange-600 font-black text-lg italic mt-1 leading-none">R$ 2,50/km</div>
              </div>
            </div>
            <button onclick="pedirCorrida()" class="w-full vroom-btn py-5 rounded-2xl text-xl shadow-lg uppercase italic">Solicitar Agora</button>
          </div>
      </div>
    </div>
  </div>

  <div id="screen-motorista-home" class="screen">
    <div class="p-6 bg-slate-900 text-white flex justify-between items-center">
      <span class="text-xl font-black italic tracking-tighter">MOTORISTA</span>
      <button onclick="toggleOnline()" id="mot-toggle" class="bg-red-500 px-6 py-2 rounded-xl font-black text-xs uppercase">Offline</button>
    </div>
    <div class="p-6 flex-1 overflow-y-auto space-y-4" id="lista-chamadas">
      <div class="text-center p-20 text-slate-400 font-bold italic opacity-60">Fique online...</div>
    </div>
  </div>

  <div id="screen-adm-home" class="screen">
    <div class="p-6 bg-slate-800 text-white flex justify-between items-center">
      <span class="text-xl font-black italic tracking-tighter uppercase">Painel ADM</span>
      <button onclick="location.reload()" class="bg-slate-700 p-2 rounded-lg text-xs uppercase font-black tracking-widest">Sair</button>
    </div>
    <div class="p-6 flex-1 overflow-y-auto space-y-6">
      <div class="card p-6 border-t-4 border-orange-500">
        <h3 class="text-xs font-black text-slate-400 uppercase mb-4 text-center">Tarifas Atuais</h3>
        <div class="grid grid-cols-2 gap-4">
          <div><label class="text-[10px] font-black uppercase">Fixo (R$)</label><input type="number" id="adm-fixo" class="w-full bg-slate-50 p-3 rounded-lg border-2 border-slate-100 font-black"></div>
          <div><label class="text-[10px] font-black uppercase">KM (R$)</label><input type="number" step="0.1" id="adm-km" class="w-full bg-slate-50 p-3 rounded-lg border-2 border-slate-100 font-black"></div>
        </div>
        <button onclick="saveSettings()" class="w-full bg-slate-900 text-white py-3 rounded-xl font-black uppercase text-xs mt-4 italic">Salvar Configurações</button>
      </div>
      <div id="adm-monitor" class="space-y-3"></div>
    </div>
  </div>

  <script>
    const CLOUD_URL = 'https://vroom-moto-default-rtdb.firebaseio.com/vroom_v2_ultimate.json';
    let DB = { corridas: [], settings: { fixo: 7.00, km: 2.50 } };
    let STATE = { role: null, online: false, modalidade: 'municipal', activeId: null, distKm: 0, 
                  origCoord: null, destCoord: null };

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function initApp(role) {
      STATE.role = role;
      showScreen('screen-' + role + '-home');
      if(role === 'cliente') detectMyLocation();
      if(role === 'adm') loadAdmSettings();
      startSync();
    }

    function loadAdmSettings() {
      document.getElementById('adm-fixo').value = DB.settings.fixo;
      document.getElementById('adm-km').value = DB.settings.km;
    }

    async function saveSettings() {
      DB.settings.fixo = parseFloat(document.getElementById('adm-fixo').value);
      DB.settings.km = parseFloat(document.getElementById('adm-km').value);
      await syncPush();
      alert('Configurações salvas!');
    }

    function detectMyLocation() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
          STATE.origCoord = { lat: pos.coords.latitude, lon: pos.coords.longitude };
          fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`)
            .then(r => r.json()).then(data => {
              document.getElementById('cli-origem').value = data.display_name.split(',')[0] + ', ' + data.display_name.split(',')[1];
            });
        });
      }
    }

    async function searchAddress(query) {
      const resultsDiv = document.getElementById('results');
      if(query.length < 3) { resultsDiv.style.display = 'none'; return; }
      try {
        const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}&limit=5&countrycodes=br`);
        const data = await r.json();
        if(data.length > 0) {
          resultsDiv.innerHTML = data.map(item => `
            <div class="result-item" onclick="selectDestino('${item.display_name}', ${item.lat}, ${item.lon})">
              ${item.display_name}
            </div>`).join('');
          resultsDiv.style.display = 'block';
        }
      } catch(e){}
    }

    function selectDestino(name, lat, lon) {
      document.getElementById('cli-destino').value = name;
      document.getElementById('results').style.display = 'none';
      STATE.destCoord = { lat: lat, lon: lon };
      calcularDistancia();
    }

    async function calcularDistancia() {
      if(!STATE.origCoord || !STATE.destCoord) return;
      const url = `https://router.project-osrm.org/route/v1/driving/${STATE.origCoord.lon},${STATE.origCoord.lat};${STATE.destCoord.lon},${STATE.destCoord.lat}?overview=false`;
      try {
        const r = await fetch(url);
        const data = await r.json();
        if(data.routes && data.routes[0]) {
          STATE.distKm = data.routes[0].distance / 1000;
          updatePrices();
        }
      } catch(e){}
    }

    function updatePrices() {
      document.getElementById('price-mun').innerText = 'R$ ' + DB.settings.fixo.toFixed(2).replace('.', ',');
      const precoInter = (STATE.distKm * DB.settings.km).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
      document.getElementById('price-inter').innerText = precoInter;
    }

    function setMod(m) {
      STATE.modalidade = m;
      document.getElementById('btn-mun').classList.toggle('active', m === 'municipal');
      document.getElementById('btn-inter').classList.toggle('active', m === 'inter');
    }

    async function pedirCorrida() {
      const dest = document.getElementById('cli-destino').value;
      if(!dest) return alert('Escolha o destino!');
      let valorFinal = DB.settings.fixo.toFixed(2);
      if(STATE.modalidade === 'inter') valorFinal = (STATE.distKm * DB.settings.km).toFixed(2);
      STATE.activeId = Date.now();
      DB.corridas.push({ id: STATE.activeId, destino: dest, tipo: STATE.modalidade, valor: 'R$ ' + valorFinal.replace('.', ','), status: 'buscando' });
      renderStatusCliente('buscando');
      await syncPush();
    }

    function toggleOnline() {
      STATE.online = !STATE.online;
      const btn = document.getElementById('mot-toggle');
      btn.innerText = STATE.online ? 'Online' : 'Offline';
      btn.style.backgroundColor = STATE.online ? '#22c55e' : '#ef4444';
      if(STATE.online) renderFilaMotorista();
    }

    async function aceitarCorrida(id) {
      const c = DB.corridas.find(x => x.id === id);
      if(c) { c.status = 'aceita'; c.motorista = 'Rodolfo'; await syncPush(); }
    }

    async function syncPush() {
      try { await fetch(CLOUD_URL, { method: 'PUT', body: JSON.stringify(DB) }); } catch(e){}
    }

    function startSync() {
      setInterval(async () => {
        try {
          const r = await fetch(CLOUD_URL + '?t=' + Date.now());
          if(r.ok) {
            const data = await r.json();
            if(data) {
                DB = data;
                if(STATE.role === 'motorista' && STATE.online) renderFilaMotorista();
                if(STATE.role === 'cliente' && STATE.activeId) checkStatusCliente();
                if(STATE.role === 'adm') renderAdmMonitor();
                updatePrices();
            }
          }
        } catch(e){}
      }, 3000);
    }

    function renderFilaMotorista() {
      const container = document.getElementById('lista-chamadas');
      const disp = (DB.corridas || []).filter(c => c.status === 'buscando');
      if(disp.length === 0) { container.innerHTML = '<div class="text-center p-20 text-slate-400 font-bold italic">Aguardando...</div>'; return; }
      container.innerHTML = disp.map(c => `
        <div class="card p-6 border-l-[12px] border-orange-500 shadow-md mb-4">
          <div class="text-[9px] font-black text-slate-300 uppercase">PEDIDO</div>
          <div class="text-xl font-black text-slate-800 italic">${c.destino.split(',')[0]}</div>
          <div class="flex justify-between items-center mt-4">
            <span class="text-orange-600 font-black text-lg italic">${c.valor}</span>
            <button onclick="aceitarCorrida(${c.id})" class="bg-slate-900 text-white px-6 py-3 rounded-xl font-black uppercase text-xs">Aceitar</button>
          </div>
        </div>`).join('');
    }

    function renderAdmMonitor() {
      const container = document.getElementById('adm-monitor');
      const todas = DB.corridas || [];
      if(todas.length === 0) { container.innerHTML = '<div class="text-center p-10 text-slate-300 font-bold italic">Sem atividade...</div>'; return; }
      container.innerHTML = todas.map(c => `
        <div class="bg-white p-4 rounded-xl border flex justify-between items-center">
          <div><div class="text-xs font-black text-slate-800">${c.destino.split(',')[0]}</div></div>
          <div class="text-right">
            <div class="text-[10px] font-black ${c.status === 'aceita' ? 'text-green-500' : 'text-orange-500'} uppercase">${c.status}</div>
            <div class="text-xs font-black text-slate-800">${c.valor}</div>
          </div>
        </div>`).join('');
    }

    function checkStatusCliente() {
      const minha = (DB.corridas || []).find(c => c.id === STATE.activeId);
      if(minha && minha.status === 'aceita') renderStatusCliente('aceita');
    }

    function renderStatusCliente(status) {
      const container = document.getElementById('status-cliente-container');
      if(status === 'buscando') {
        container.innerHTML = `<div class="card p-10 bg-orange-600 text-white text-center shadow-xl"><div class="text-2xl font-black italic uppercase">Buscando Moto...</div></div>`;
      } else if(status === 'aceita') {
        container.innerHTML = `<div class="card p-10 bg-green-600 text-white text-center shadow-xl"><div class="text-2xl font-black italic uppercase">Motorista a Caminho!</div><button onclick="location.reload()" class="mt-8 bg-white text-green-600 px-8 py-3 rounded-xl font-black text-xs uppercase shadow-md">Cheguei</button></div>`;
      }
    }
  </script>
</body>
</html>
