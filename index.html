<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VROOM MOTO v4.6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        :root { --vroom: #FF6B00; }
        body { font-family: 'Inter', sans-serif; background: #0F172A; margin: 0; padding: 0; }
        .screen { display: none; min-height: 100vh; width: 100vw; flex-direction: column; background: #F8FAFC; }
        .screen.active { display: flex; }
        .vroom-btn { background: var(--vroom); color: white; font-weight: 800; text-transform: uppercase; transition: 0.2s; border-radius: 18px; }
        .input-vroom { background: #F1F5F9; border: 2px solid #E2E8F0; padding: 14px; border-radius: 16px; outline: none; font-weight: 600; width: 100%; color: #1E293B; text-align: center; }
        #map { height: 350px; width: 100%; background: #E2E8F0; }
    </style>
</head>
<body>

    <!-- PORTAL -->
    <div id="screen-portal" class="screen active items-center justify-center p-8 !bg-[#0F172A] text-white">
        <h1 class="text-4xl font-black italic mb-10 tracking-tighter uppercase">VROOM<span class="text-orange-500">MOTO</span></h1>
        <div class="w-full max-w-xs space-y-4">
            <button onclick="nav('cliente-login')" class="w-full vroom-btn py-5">Pedir uma Moto</button>
            <button onclick="nav('motorista-login')" class="w-full bg-slate-800 py-5 rounded-2xl font-black uppercase text-xs">Motorista</button>
            <button onclick="nav('adm-login')" class="w-full bg-transparent border-2 border-slate-700 text-slate-500 py-3 rounded-2xl text-[10px] font-black uppercase">Painel Master</button>
        </div>
    </div>

    <!-- LOGIN CLIENTE -->
    <div id="screen-cliente-login" class="screen p-8 justify-center items-center">
        <div class="w-full max-w-sm text-center">
            <h2 class="text-3xl font-black italic mb-8 uppercase text-slate-800">Seja Bem-vindo</h2>
            <div class="space-y-4">
                <input type="text" id="cli-nome" placeholder="Seu Nome" class="input-vroom">
                <input type="text" placeholder="CPF" class="input-vroom">
                <input type="tel" placeholder="WhatsApp" class="input-vroom">
                <button onclick="nav('cliente-app')" class="w-full vroom-btn py-5 shadow-xl">Entrar Agora</button>
                <button onclick="nav('portal')" class="text-slate-400 text-[10px] font-black uppercase mt-10 block w-full">Voltar</button>
            </div>
        </div>
    </div>

    <!-- ÁREA DO CLIENTE (MAPA) -->
    <div id="screen-cliente-app" class="screen">
        <div class="p-4 bg-white flex justify-between items-center border-b">
            <span class="text-xl font-black italic">VROOM<span class="text-orange-500">MOTO</span></span>
            <button onclick="nav('portal')" class="text-slate-400"><i class="fas fa-sign-out-alt"></i></button>
        </div>
        <div id="map"></div>
        <div class="p-6 bg-slate-50 flex-1 space-y-4">
            <div class="bg-white p-4 rounded-2xl shadow-sm">
                <input type="text" id="destino" placeholder="Para onde vamos?" class="w-full font-bold outline-none text-slate-800">
            </div>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="alert('Solicitando Corrida Municipal (Fixo)...')" class="bg-white p-4 rounded-2xl border-2 border-slate-100 font-black text-xs uppercase text-slate-600 italic">Municipal</button>
                <button onclick="alert('Calculando Corrida por KM...')" class="bg-white p-4 rounded-2xl border-2 border-slate-100 font-black text-xs uppercase text-slate-600 italic">Intermunicipal</button>
            </div>
        </div>
    </div>

    <!-- LOGIN ADM (CORRIGIDO: Rodolfo Oliveira / Rm290198) -->
    <div id="screen-adm-login" class="screen p-8 justify-center items-center">
        <div class="w-full max-w-sm bg-white p-10 rounded-[40px] shadow-2xl text-center">
            <h2 class="text-2xl font-black italic mb-8 uppercase text-slate-800">Painel ADM</h2>
            <div class="space-y-4">
                <input type="text" id="adm-user" placeholder="Usuário" class="input-vroom" value="Rodolfo Oliveira">
                <input type="password" id="adm-pass" placeholder="Senha" class="input-vroom">
                <button onclick="checkAdm()" class="w-full vroom-btn py-4">Entrar no Sistema</button>
                <button onclick="nav('portal')" class="text-slate-400 text-[10px] font-black uppercase mt-6 block">Voltar</button>
            </div>
        </div>
    </div>

    <!-- PAINEL ADM -->
    <div id="screen-adm-dashboard" class="screen !bg-slate-50">
        <div class="p-6 bg-slate-900 text-white flex justify-between items-center">
            <span class="font-black italic">VROOM <span class="text-orange-500">MASTER</span></span>
            <button onclick="nav('portal')" class="text-slate-400"><i class="fas fa-sign-out-alt"></i></button>
        </div>
        <div class="p-6">
            <div class="bg-white p-8 rounded-[32px] shadow-sm text-center">
                <h3 class="font-black uppercase text-xs text-slate-400 mb-6 italic">Cadastro de Motoristas</h3>
                <div class="space-y-4">
                    <input type="text" placeholder="Nome do Motorista" class="input-vroom !text-sm">
                    <input type="text" placeholder="CPF" class="input-vroom !text-sm">
                    <button class="w-full vroom-btn py-4">Salvar Motorista</button>
                </div>
            </div>
        </div>
    </div>

    <!-- LOGIN MOTORISTA -->
    <div id="screen-motorista-login" class="screen p-8 justify-center items-center">
        <div class="w-full max-w-sm text-center space-y-6">
            <h2 class="text-3xl font-black italic uppercase">Motorista</h2>
            <input type="text" placeholder="Usuário" class="input-vroom">
            <input type="password" placeholder="Senha" class="input-vroom">
            <button class="w-full vroom-btn py-5">Entrar</button>
            <button onclick="nav('portal')" class="text-slate-400 font-bold uppercase text-[10px]">Voltar</button>
        </div>
    </div>

    <script>
        let map;
        function nav(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + id).classList.add('active');
            if(id === 'cliente-app') {
                setTimeout(() => {
                    if(!map) {
                        map = L.map('map').setView([-23.55, -46.63], 13);
                        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                    }
                    map.invalidateSize();
                }, 200);
            }
        }

        function checkAdm() {
            const u = document.getElementById('adm-user').value;
            const p = document.getElementById('adm-pass').value;
            // Rodolfo: O sistema diferencia MAIÚSCULAS de minúsculas. Ajustado para Rodolfo Oliveira.
            if(u === 'Rodolfo Oliveira' && p === 'Rm290198') {
                nav('adm-dashboard');
            } else {
                alert('Acesso Negado! Verifique Usuário e Senha.');
            }
        }
    </script>
</body>
</html>
