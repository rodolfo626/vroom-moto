<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Vroom Moto 2.0 - Maps</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- GOOGLE MAPS API -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA_SUA_CHAVE_AQUI&libraries=places"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
    :root { --vroom: #FF6B00; }
    body { font-family: 'Inter', sans-serif; background: #F3F4F6; margin: 0; padding: 0; overflow: hidden; }
    .screen { display: none; height: 100vh; width: 100vw; flex-direction: column; position: fixed; top: 0; left: 0; background: #F3F4F6; z-index: 10; }
    .screen.active { display: flex; }
    .vroom-btn { background: var(--vroom); color: white; border: none; font-weight: 900; transition: transform 0.1s; cursor: pointer; }
    .vroom-btn:active { transform: scale(0.95); }
    .card { background: white; border-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
    .type-card { border: 2px solid #E5E7EB; border-radius: 16px; transition: 0.2s; cursor: pointer; padding: 12px; text-align: center; }
    .type-card.active { border-color: var(--vroom); background: #FFF7ED; }
    .pac-container { border-radius: 12px; border: none; box-shadow: 0 10px 20px rgba(0,0,0,0.1); margin-top: 8px; z-index: 9999; }
  </style>
</head>
<body>

  <!-- PORTAL -->
  <div id="screen-portal" class="screen active p-8 items-center justify-center text-center">
    <div class="text-7xl mb-6">🏍️</div>
    <h1 class="text-5xl font-black italic tracking-tighter mb-2">VROOM<span class="text-orange-600">MOTO</span></h1>
    <p class="text-slate-400 font-bold text-xs tracking-widest uppercase mb-12">Inteligência Google Maps</p>
    <div class="w-full max-w-xs space-y-4">
      <button onclick="initApp('cliente')" class="w-full vroom-btn py-6 rounded-2xl text-2xl shadow-xl italic">SOU CLIENTE</button>
      <button onclick="initApp('motorista')" class="w-full bg-slate-900 text-white py-6 rounded-2xl text-2xl shadow-xl italic">SOU MOTORISTA</button>
    </div>
  </div>

  <!-- CLIENTE -->
  <div id="screen-cliente-home" class="screen">
    <div class="p-6 bg-white flex justify-between items-center shadow-sm">
      <span class="text-2xl font-black italic tracking-tighter">VROOM</span>
      <button onclick="location.reload()" class="bg-slate-100 p-2 rounded-lg text-slate-500 font-bold text-xs uppercase">Sair</button>
    </div>
    <div class="p-6 flex-1 overflow-y-auto space-y-6">
      <div id="status-cliente-container">
          <div id="pedir-box" class="card p-6">
            <h3 class="text-lg font-black text-slate-800 mb-4 italic">Para onde vamos?</h3>
            <div class="space-y-3 mb-6">
                <input type="text" id="cli-origem" placeholder="Sua localização..." class="w-full bg-slate-50 p-4 rounded-xl border-2 border-slate-100 outline-none font-bold text-sm">
                <input type="text" id="cli-destino" placeholder="Destino final" class="w-full bg-slate-50 p-4 rounded-xl border-2 border-slate-100 outline-none focus:border-orange-500 font-bold text-sm">
            </div>
            
            <div class="grid grid-cols-2 gap-3 mb-6">
              <div id="btn-mun" onclick="setMod('municipal')" class="type-card active">
                <div class="text-[10px] font-black text-slate-400 uppercase">MUNICIPAL</div>
                <div class="text-orange-600 font-black text-lg italic mt-1 leading-none">R$ 7,00</div>
              </div>
              <div id="btn-inter" onclick="setMod('inter')" class="type-card">
                <div class="text-[10px] font-black text-slate-400 uppercase">INTER</div>
                <div id="price-inter" class="text-orange-600 font-black text-lg italic mt-1 leading-none">R$ 2,50/km</div>
              </div>
            </div>
            
            <button onclick="pedirCorrida()" id="btn-chamar" class="w-full vroom-btn py-5 rounded-2xl text-xl shadow-lg uppercase italic">CHAMAR AGORA</button>
          </div>
      </div>
    </div>
  </div>

  <!-- MOTORISTA -->
  <div id="screen-motorista-home" class="screen">
    <div class="p-6 bg-slate-900 text-white flex justify-between items-center shadow-lg">
      <span class="text-xl font-black italic tracking-tighter">MOTORISTA</span>
      <button onclick="toggleOnline()" id="mot-toggle" class="bg-red-500 px-6 py-2 rounded-xl font-black text-xs uppercase shadow-md transition-all">Offline</button>
    </div>
    <div class="p-6 flex-1 overflow-y-auto" id="lista-chamadas">
      <div class="text-center p-20 text-slate-400 font-bold italic opacity-60">Aguardando novos pedidos...</div>
    </div>
  </div>

  <script>
    const CLOUD_URL = 'https://vroom-moto-default-rtdb.firebaseio.com/vroom_v2_maps_prod.json';
    let DB = { corridas: [] };
    let STATE = { role: null, online: false, modalidade: 'municipal', activeId: null, distKm: 0 };
    
    let autocompleteOrigem, autocompleteDestino;

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function initApp(role) {
      STATE.role = role;
      showScreen('screen-' + role + '-home');
      if(role === 'cliente') setTimeout(initMaps, 500);
      startSync();
    }

    function initMaps() {
      try {
          autocompleteOrigem = new google.maps.places.Autocomplete(document.getElementById('cli-origem'));
          autocompleteDestino = new google.maps.places.Autocomplete(document.getElementById('cli-destino'));
          
          if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
              const geocoder = new google.maps.Geocoder();
              geocoder.geocode({ location: {lat: pos.coords.latitude, lng: pos.coords.longitude} }, (res, status) => {
                if (status === "OK" && res[0]) document.getElementById('cli-origem').value = res[0].formatted_address;
              });
            });
          }

          autocompleteDestino.addListener('place_changed', calcularDistancia);
      } catch(e) { console.log('Maps não carregado'); }
    }

    function calcularDistancia() {
      const origem = document.getElementById('cli-origem').value;
      const destino = document.getElementById('cli-destino').value;
      if(!origem || !destino) return;

      const service = new google.maps.DistanceMatrixService();
      service.getDistanceMatrix({
        origins: [origem],
        destinations: [destino],
        travelMode: 'DRIVING'
      }, (response, status) => {
        if (status === 'OK' && response.rows[0].elements[0].status !== "ZERO_RESULTS") {
          const distValue = response.rows[0].elements[0].distance.value / 1000;
          STATE.distKm = distValue;
          const preco = (distValue * 2.5).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
          document.getElementById('price-inter').innerText = preco;
        }
      });
    }

    function setMod(m) {
      STATE.modalidade = m;
      document.getElementById('btn-mun').classList.toggle('active', m === 'municipal');
      document.getElementById('btn-inter').classList.toggle('active', m === 'inter');
    }

    async function pedirCorrida() {
      const orig = document.getElementById('cli-origem').value;
      const dest = document.getElementById('cli-destino').value;
      if(!dest) return alert('Digite o destino!');
      
      let valorFinal = "R$ 7,00";
      if(STATE.modalidade === 'inter') {
          valorFinal = (STATE.distKm * 2.5).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
      }

      STATE.activeId = Date.now();
      const nova = { 
        id: STATE.activeId, 
        origem: orig,
        destino: dest, 
        tipo: STATE.modalidade, 
        valor: valorFinal,
        distancia: STATE.distKm.toFixed(1) + " km",
        status: 'buscando'
      };
      
      DB.corridas.push(nova);
      renderStatusCliente('buscando');
      await syncPush();
    }

    function toggleOnline() {
      STATE.online = !STATE.online;
      const btn = document.getElementById('mot-toggle');
      btn.innerText = STATE.online ? 'Online' : 'Offline';
      btn.style.backgroundColor = STATE.online ? '#22c55e' : '#ef4444';
      if(STATE.online) renderFilaMotorista();
    }

    async function aceitarCorrida(id) {
      const c = DB.corridas.find(x => x.id === id);
      if(c) {
        c.status = 'aceita';
        c.motorista = 'Rodolfo Oliveira';
        await syncPush();
      }
    }

    async function syncPush() {
      try { await fetch(CLOUD_URL, { method: 'PUT', body: JSON.stringify(DB) }); } catch(e){}
    }

    function startSync() {
      setInterval(async () => {
        try {
          const r = await fetch(CLOUD_URL + '?t=' + Date.now());
          if(r.ok) {
            const data = await r.json();
            if(data && data.corridas) {
                DB = data;
                if(STATE.role === 'motorista' && STATE.online) renderFilaMotorista();
                if(STATE.role === 'cliente' && STATE.activeId) checkStatusCliente();
            }
          }
        } catch(e){}
      }, 3000);
    }

    function renderFilaMotorista() {
      const container = document.getElementById('lista-chamadas');
      const disp = (DB.corridas || []).filter(c => c.status === 'buscando');
      if(disp.length === 0) {
        container.innerHTML = '<div class="text-center p-20 text-slate-400 font-bold italic opacity-60">Aguardando pedidos...</div>';
        return;
      }
      container.innerHTML = disp.map(c => `
        <div class="card p-6 border-l-[12px] border-orange-500 shadow-md">
          <div class="mb-4">
            <div class="text-[9px] font-black text-slate-300 uppercase">Distância: ${c.distancia}</div>
            <div class="text-xl font-black text-slate-800 italic leading-tight">${c.destino}</div>
          </div>
          <div class="flex justify-between items-center">
            <span class="text-orange-600 font-black text-lg italic">${c.valor}</span>
            <button onclick="aceitarCorrida(${c.id})" class="bg-slate-900 text-white px-6 py-3 rounded-xl font-black uppercase text-xs">Aceitar</button>
          </div>
        </div>
      `).join('');
    }

    function checkStatusCliente() {
      const minha = (DB.corridas || []).find(c => c.id === STATE.activeId);
      if(minha && minha.status === 'aceita') renderStatusCliente('aceita');
    }

    function renderStatusCliente(status) {
      const container = document.getElementById('status-cliente-container');
      if(status === 'buscando') {
        container.innerHTML = `<div class="card p-10 bg-orange-600 text-white text-center shadow-xl"><div class="text-5xl mb-4 animate-bounce">🔍</div><div class="text-2xl font-black italic uppercase">Buscando Moto...</div><p class="text-[10px] mt-4 opacity-70 uppercase font-black">Calculando rota via Google Maps</p></div>`;
      } else if(status === 'aceita') {
        container.innerHTML = `<div class="card p-10 bg-green-600 text-white text-center shadow-xl"><div class="text-5xl mb-4">🚀</div><div class="text-2xl font-black italic uppercase">A Caminho!</div><p class="text-xs mt-2 opacity-80">Seu motorista aceitou o chamado.</p><button onclick="location.reload()" class="mt-8 bg-white text-green-600 px-8 py-3 rounded-xl font-black text-xs uppercase italic">Cheguei</button></div>`;
      }
    }
  </script>
</body>
</html>
