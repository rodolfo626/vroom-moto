<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>VROOM MOTO 3.1 - Gestão</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
    :root { --vroom: #FF6B00; }
    body { font-family: 'Poppins', sans-serif; background: #0F172A; color: white; margin: 0; padding: 0; overflow: hidden; }
    .screen { display: none; height: 100vh; width: 100vw; flex-direction: column; position: fixed; top: 0; left: 0; background: #F8FAFC; color: #1E293B; z-index: 10; }
    .screen.active { display: flex; }
    .vroom-btn { background: var(--vroom); color: white; border: none; font-weight: 800; transition: all 0.2s; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
    .vroom-btn:active { transform: scale(0.95); filter: brightness(1.1); }
    .card { background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #F1F5F9; }
    #screen-portal { background: #0F172A; color: white; justify-content: center; align-items: center; text-align: center; }
    #results { position: absolute; background: white; width: 100%; max-height: 200px; overflow-y: auto; z-index: 100; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); display: none; margin-top: 5px; }
    .result-item { padding: 12px 16px; border-bottom: 1px solid #F1F5F9; font-size: 13px; cursor: pointer; color: #334155; font-weight: 600; }
    .type-card { border: 2px solid #F1F5F9; border-radius: 16px; padding: 12px; text-align: center; cursor: pointer; transition: 0.2s; }
    .type-card.active { border-color: var(--vroom); background: #FFF7ED; }
  </style>
</head>
<body>

  <!-- PORTAL INICIAL -->
  <div id="screen-portal" class="screen active p-8">
    <div class="text-7xl mb-6">🏍️</div>
    <h1 class="text-5xl font-extrabold italic tracking-tighter mb-1">VROOM<span class="text-orange-600">MOTO</span></h1>
    <p class="text-slate-500 font-bold text-[10px] tracking-[0.3em] uppercase mb-12">Gestão de Motoristas v3.1</p>
    <div class="w-full max-w-xs space-y-4">
      <button onclick="nav('cliente')" class="w-full vroom-btn py-5 rounded-2xl text-xl shadow-2xl">Sou Cliente</button>
      <button onclick="showLoginMotorista()" class="w-full bg-slate-800 text-white py-5 rounded-2xl text-xl shadow-2xl font-extrabold uppercase">Sou Motorista</button>
      <button onclick="nav('adm')" class="w-full bg-transparent border-2 border-slate-700 text-slate-400 py-4 rounded-2xl text-xs font-bold uppercase">Painel Administrativo</button>
    </div>
  </div>

  <!-- LOGIN MOTORISTA -->
  <div id="screen-login-motorista" class="screen p-8 justify-center items-center">
    <div class="w-full max-w-xs text-center">
        <h2 class="text-2xl font-extrabold italic mb-6 uppercase">Acesso Motorista</h2>
        <input type="text" id="login-id" placeholder="Digite seu ID de Motorista" class="w-full bg-slate-100 p-4 rounded-xl border-2 border-slate-200 outline-none font-bold text-center mb-4">
        <button onclick="fazerLoginMotorista()" class="w-full vroom-btn py-4 rounded-xl text-lg shadow-lg mb-4">Entrar</button>
        <button onclick="nav('portal')" class="text-slate-400 font-bold uppercase text-xs">Voltar</button>
    </div>
  </div>

  <!-- TELA CLIENTE -->
  <div id="screen-cliente" class="screen">
    <div class="p-5 bg-white flex justify-between items-center border-b">
      <span class="text-xl font-extrabold italic">VROOM <span class="text-orange-600">CLIENTE</span></span>
      <button onclick="location.reload()" class="text-slate-400 text-xs font-bold uppercase">Sair</button>
    </div>
    <div class="p-6 flex-1 overflow-y-auto space-y-6" id="cliente-content">
      <div class="card p-6">
        <div class="space-y-3 relative">
          <input type="text" id="origem" placeholder="Sua localização..." class="w-full bg-slate-50 p-4 rounded-xl border-2 border-slate-100 outline-none font-semibold text-sm">
          <input type="text" id="destino" oninput="buscarEndereco(this.value)" placeholder="Destino final" class="w-full bg-slate-50 p-4 rounded-xl border-2 border-slate-100 outline-none focus:border-orange-500 font-bold text-sm">
          <div id="results"></div>
        </div>
        <div class="grid grid-cols-2 gap-3 my-6">
          <div id="mod-mun" onclick="toggleMod('mun')" class="type-card active"><div class="text-[9px] font-extrabold text-slate-400 uppercase">MUNICIPAL</div><div id="disp-fixo" class="text-orange-600 font-extrabold text-lg italic mt-1 leading-none">R$ 0,00</div></div>
          <div id="mod-inter" onclick="toggleMod('inter')" class="type-card"><div class="text-[9px] font-extrabold text-slate-400 uppercase">INTER (KM)</div><div id="disp-km" class="text-orange-600 font-extrabold text-lg italic mt-1 leading-none">R$ 0,00</div></div>
        </div>
        <button onclick="solicitarCorrida()" class="w-full vroom-btn py-5 rounded-2xl text-xl shadow-lg">Chamar Moto</button>
      </div>
    </div>
  </div>

  <!-- TELA MOTORISTA -->
  <div id="screen-motorista" class="screen">
    <div class="p-5 bg-slate-900 text-white flex justify-between items-center">
      <span id="label-motorista" class="text-lg font-extrabold italic uppercase">Motorista</span>
      <button id="btn-online" onclick="toggleOnline()" class="bg-red-500 px-5 py-2 rounded-xl font-extrabold text-[10px] uppercase">Offline</button>
    </div>
    <div class="p-6 flex-1 overflow-y-auto space-y-4" id="fila-motorista">
      <div class="text-center p-20 text-slate-400 font-bold italic opacity-40">Aguardando pedidos...</div>
    </div>
  </div>

  <!-- TELA ADM -->
  <div id="screen-adm" class="screen">
    <div class="p-5 bg-slate-800 text-white flex justify-between items-center">
      <span class="text-xl font-extrabold italic uppercase">Central ADM</span>
      <button onclick="location.reload()" class="bg-slate-700 px-4 py-2 rounded-lg text-[10px] font-extrabold uppercase">Voltar</button>
    </div>
    <div class="p-6 flex-1 overflow-y-auto space-y-6">
      <!-- CADASTRO DE MOTORISTAS -->
      <div class="card p-6 border-t-8 border-slate-900">
        <h4 class="text-xs font-extrabold text-slate-400 uppercase mb-4 text-center">Cadastrar Novo Motociclista</h4>
        <input type="text" id="novo-mot-nome" placeholder="Nome Completo" class="w-full bg-slate-50 p-3 rounded-lg border-2 border-slate-100 font-bold mb-3 outline-none">
        <input type="text" id="novo-mot-id" placeholder="ID de Acesso (Ex: 01, 10, RODOLFO)" class="w-full bg-slate-50 p-3 rounded-lg border-2 border-slate-100 font-bold mb-3 outline-none uppercase">
        <button onclick="cadastrarMotorista()" class="w-full bg-slate-900 text-white py-3 rounded-xl font-extrabold uppercase text-xs">Ativar Motorista</button>
      </div>
      
      <!-- CONFIG DE PREÇOS -->
      <div class="card p-6 border-t-8 border-orange-500">
        <h4 class="text-xs font-extrabold text-slate-400 uppercase mb-4 text-center">Tarifas</h4>
        <div class="grid grid-cols-2 gap-4">
          <input type="number" id="set-fixo" class="w-full bg-slate-50 p-3 rounded-lg border-2 border-slate-100 font-extrabold text-orange-600 outline-none">
          <input type="number" step="0.1" id="set-km" class="w-full bg-slate-50 p-3 rounded-lg border-2 border-slate-100 font-extrabold text-orange-600 outline-none">
        </div>
        <button onclick="salvarConfig()" class="w-full bg-slate-900 text-white py-3 rounded-xl font-extrabold uppercase text-xs mt-4">Salvar Preços</button>
      </div>

      <div class="space-y-3">
        <h4 class="text-xs font-extrabold text-slate-400 uppercase italic">Motoristas Ativos</h4>
        <div id="lista-motoristas" class="space-y-2"></div>
      </div>
    </div>
  </div>

  <script>
    const ENDPOINT = 'https://vroom-moto-default-rtdb.firebaseio.com/vroom_v3_master.json';
    let DB = { corridas: [], settings: { fixo: 7.0, km: 2.5 }, motoristas: [] };
    let APP = { user: null, online: false, mod: 'mun', distancia: 0, origem: null, destino: null, idAtivo: null, motLogado: null };

    function nav(role) {
      APP.user = role;
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById('screen-' + role).classList.add('active');
      if(role === 'cliente') detectarLocal();
      if(role === 'adm') { 
        document.getElementById('set-fixo').value = DB.settings.fixo; 
        document.getElementById('set-km').value = DB.settings.km;
      }
      iniciarSync();
    }

    function showLoginMotorista() {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen-login-motorista').classList.add('active');
    }

    function fazerLoginMotorista() {
        const id = document.getElementById('login-id').value.toUpperCase();
        const mot = (DB.motoristas || []).find(m => m.id === id);
        if(mot) {
            APP.motLogado = mot;
            document.getElementById('label-motorista').innerText = mot.nome;
            nav('motorista');
        } else {
            alert('ID não encontrado! Fale com o administrador.');
        }
    }

    async function cadastrarMotorista() {
        const nome = document.getElementById('novo-mot-nome').value;
        const id = document.getElementById('novo-mot-id').value.toUpperCase();
        if(!nome || !id) return alert('Preencha nome e ID!');
        if(!DB.motoristas) DB.motoristas = [];
        DB.motoristas.push({ nome, id });
        await pushDB();
        document.getElementById('novo-mot-nome').value = '';
        document.getElementById('novo-mot-id').value = '';
        alert('Motorista cadastrado com sucesso!');
    }

    // --- REUTILIZANDO LÓGICA V3.0 ---
    async function pushDB() { try { await fetch(ENDPOINT, { method: 'PUT', body: JSON.stringify(DB) }); } catch(e){} }
    function iniciarSync() {
      setInterval(async () => {
        try {
          const r = await fetch(ENDPOINT + '?t=' + Date.now());
          const data = await r.json();
          if(data) {
            DB = data;
            if(APP.user === 'motorista' && APP.online) renderMotorista();
            if(APP.user === 'cliente' && APP.idAtivo) conferirStatusCliente();
            if(APP.user === 'adm') renderListaMotoristas();
            atualizarPrecos();
          }
        } catch(e){}
      }, 3000);
    }

    function renderListaMotoristas() {
        const container = document.getElementById('lista-motoristas');
        container.innerHTML = (DB.motoristas || []).map(m => `
            <div class="bg-white p-3 rounded-lg border flex justify-between items-center">
                <span class="text-xs font-extrabold uppercase">${m.nome}</span>
                <span class="bg-slate-100 text-[10px] px-2 py-1 rounded font-bold">ID: ${m.id}</span>
            </div>
        `).join('');
    }

    function atualizarPrecos() {
      if(!DB.settings) return;
      const fixo = DB.settings.fixo || 7.0;
      const km = DB.settings.km || 2.5;
      if(document.getElementById('disp-fixo')) document.getElementById('disp-fixo').innerText = `R$ ${fixo.toFixed(2).replace('.',',')}`;
      if(document.getElementById('disp-km')) document.getElementById('disp-km').innerText = `R$ ${(APP.distancia * km).toFixed(2).replace('.',',')}`;
    }

    async function buscarEndereco(q) {
      const resDiv = document.getElementById('results');
      if(q.length < 3) { resDiv.style.display = 'none'; return; }
      try {
        const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}&limit=5&countrycodes=br`);
        const data = await r.json();
        if(data.length > 0) {
          resDiv.innerHTML = data.map(i => `<div class="result-item" onclick="selecionarDestino('${i.display_name}', ${i.lat}, ${i.lon})">${i.display_name}</div>`).join('');
          resDiv.style.display = 'block';
        }
      } catch(e){}
    }
    function selecionarDestino(nome, lat, lon) { document.getElementById('destino').value = nome; document.getElementById('results').style.display = 'none'; APP.destino = { lat, lon }; calcularRota(); }
    async function calcularRota() { if(!APP.origem || !APP.destino) return; const url = `https://router.project-osrm.org/route/v1/driving/${APP.origem.lon},${APP.origem.lat};${APP.destino.lon},${APP.destino.lat}?overview=false`; try { const r = await fetch(url); const data = await r.json(); if(data.routes && data.routes[0]) { APP.distancia = data.routes[0].distance / 1000; atualizarPrecos(); } } catch(e){} }
    function detectarLocal() { if (navigator.geolocation) { navigator.geolocation.getCurrentPosition(pos => { APP.origem = { lat: pos.coords.latitude, lon: pos.coords.longitude }; fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`).then(r => r.json()).then(data => { document.getElementById('origem').value = data.display_name.split(',')[0] + ', ' + data.display_name.split(',')[1]; }); }); } }
    function toggleMod(m) { APP.mod = m; document.getElementById('mod-mun').classList.toggle('active', m === 'mun'); document.getElementById('mod-inter').classList.toggle('active', m === 'inter'); }
    async function solicitarCorrida() { const dest = document.getElementById('destino').value; if(!dest) return alert('Escolha o destino!'); let valor = APP.mod === 'mun' ? DB.settings.fixo : (APP.distancia * DB.settings.km); APP.idAtivo = Date.now(); const nova = { id: APP.idAtivo, destino: dest.split(',')[0], valor: `R$ ${valor.toFixed(2).replace('.',',')}`, status: 'procurando' }; DB.corridas.push(nova); await pushDB(); renderStatusCliente('procurando'); }
    function toggleOnline() { APP.online = !APP.online; const btn = document.getElementById('btn-online'); btn.innerText = APP.online ? 'Online' : 'Offline'; btn.className = APP.online ? 'bg-green-500 px-5 py-2 rounded-xl font-extrabold text-[10px] uppercase shadow-lg' : 'bg-red-500 px-5 py-2 rounded-xl font-extrabold text-[10px] uppercase shadow-lg'; if(APP.online) renderMotorista(); }
    async function aceitar(id) { const c = DB.corridas.find(x => x.id === id); if(c) { c.status = 'aceita'; c.mot_nome = APP.motLogado.nome; await pushDB(); } }
    async function salvarConfig() { DB.settings.fixo = parseFloat(document.getElementById('set-fixo').value); DB.settings.km = parseFloat(document.getElementById('set-km').value); await pushDB(); alert('Preços atualizados!'); }
    function renderMotorista() { const container = document.getElementById('fila-motorista'); const abertas = (DB.corridas || []).filter(c => c.status === 'procurando'); if(abertas.length === 0) { container.innerHTML = '<div class="text-center p-20 text-slate-400 font-bold italic opacity-40">Aguardando pedidos...</div>'; return; } container.innerHTML = abertas.map(c => `<div class="card p-6 border-l-[12px] border-orange-500"><div class="text-lg font-extrabold text-slate-800 italic">${c.destino}</div><div class="flex justify-between items-center mt-4"><span class="text-orange-600 font-extrabold text-xl italic">${c.valor}</span><button onclick="aceitar(${c.id})" class="bg-slate-900 text-white px-8 py-3 rounded-xl font-extrabold uppercase text-xs">Aceitar</button></div></div>`).join(''); }
    function conferirStatusCliente() { const minha = (DB.corridas || []).find(c => c.id === APP.idAtivo); if(minha && minha.status === 'aceita') renderStatusCliente('aceita', minha.mot_nome); }
    function renderStatusCliente(st, mot) { const container = document.getElementById('cliente-content'); if(st === 'procurando') { container.innerHTML = `<div class="card p-12 bg-orange-600 text-white text-center"><div class="text-3xl font-extrabold italic uppercase animate-pulse">Buscando Moto...</div></div>`; } else if(st === 'aceita') { container.innerHTML = `<div class="card p-12 bg-green-600 text-white text-center"><div class="text-3xl font-extrabold italic uppercase">Motorista ${mot} Aceitou!</div><button onclick="location.reload()" class="mt-10 bg-white text-green-600 px-10 py-4 rounded-2xl font-extrabold uppercase text-xs">Finalizar</button></div>`; } }
  </script>
</body>
</html>
