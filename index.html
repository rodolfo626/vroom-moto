<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VROOM MOTO v7.2 - Login Motorista</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        :root { --vroom: #FF6B00; }
        body { font-family: 'Inter', sans-serif; background: #0F172A; margin: 0; padding: 0; overflow-x: hidden; }
        .screen { display: none; min-height: 100vh; width: 100vw; flex-direction: column; background: #F8FAFC; }
        .screen.active { display: flex; }
        .vroom-btn { background: var(--vroom); color: white; font-weight: 800; text-transform: uppercase; border-radius: 18px; transition: 0.2s; border: none; cursor: pointer; }
        .input-vroom { background: #F1F5F9; border: 2px solid #E2E8F0; padding: 14px; border-radius: 16px; outline: none; font-weight: 600; width: 100%; color: #1E293B; font-size: 14px; }
        #map { height: 300px; width: 100%; z-index: 1; border-bottom: 4px solid var(--vroom); }
        .card-job { background: white; border-radius: 20px; padding: 20px; border: 2px solid #E2E8F0; position: relative; overflow: hidden; margin-bottom: 16px; }
        .card-job.next { border-color: var(--vroom); box-shadow: 0 10px 15px -3px rgba(255, 107, 0, 0.1); }
        .badge-next { position: absolute; top: 0; right: 0; background: var(--vroom); color: white; font-size: 8px; font-weight: 900; padding: 4px 12px; border-radius: 0 0 0 12px; text-transform: uppercase; }
        .photo-box { width: 80px; height: 80px; background: #F1F5F9; border: 2px dashed #CBD5E1; border-radius: 20px; display: flex; flex-direction: column; items-center; justify-center; cursor: pointer; overflow: hidden; position: relative; margin: 0 auto; }
        .preview-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: none; }
    </style>
</head>
<body onload="checkFirstAccess()">

    <!-- PORTAL PRINCIPAL -->
    <div id="screen-portal" class="screen items-center justify-center p-8 !bg-[#0F172A] text-white">
        <div class="text-center mb-12">
            <i class="fas fa-motorcycle text-7xl text-orange-500 mb-4"></i>
            <h1 class="text-5xl font-black italic tracking-tighter uppercase">VROOM<span class="text-orange-500">MOTO</span></h1>
            <p class="text-slate-500 text-[10px] font-bold uppercase mt-2 italic">Professional v7.2</p>
        </div>
        <div class="w-full max-w-xs space-y-4">
            <button onclick="nav('cliente-login')" class="w-full vroom-btn py-5 text-lg shadow-2xl">Pedir uma Moto</button>
            <button onclick="nav('motorista-login')" class="w-full bg-slate-800 py-5 rounded-2xl font-black uppercase text-xs text-white">Motorista</button>
            <button onclick="nav('adm-login')" class="w-full bg-transparent border-2 border-slate-700 text-slate-500 py-3 rounded-2xl text-[9px] font-black uppercase">Painel Master</button>
        </div>
    </div>

    <!-- TELA: LOGIN MOTORISTA (RODOLFO) -->
    <div id="screen-motorista-login" class="screen p-8 justify-center items-center">
        <div class="w-full max-w-sm text-center">
            <i class="fas fa-id-badge text-6xl text-slate-800 mb-6"></i>
            <h2 class="text-2xl font-black italic mb-8 uppercase text-slate-800">Acesso Motorista</h2>
            <div class="space-y-4">
                <input type="text" id="mot-user" placeholder="Usuário" class="input-vroom" value="Rodolfo Oliveira">
                <input type="password" id="mot-pass" placeholder="Senha" class="input-vroom" value="Rm280198">
                <button onclick="checkMotorista()" class="w-full vroom-btn py-5 shadow-lg shadow-orange-500/20">Ficar Online</button>
                <button onclick="nav('portal')" class="text-slate-400 font-bold uppercase text-[10px] mt-6 block w-full">Voltar</button>
            </div>
        </div>
    </div>

    <!-- TELA: APP MOTORISTA (FILA) -->
    <div id="screen-motorista-app" class="screen !bg-slate-50">
        <header class="bg-slate-900 text-white p-6 flex justify-between items-center">
            <div class="flex flex-col">
                <span class="text-[8px] font-black text-slate-500 uppercase italic">Motorista Parceiro</span>
                <span class="font-black italic text-sm" id="mot-display-name">Rodolfo Oliveira</span>
            </div>
            <span class="text-[10px] font-black uppercase bg-green-500 px-2 py-1 rounded">Disponível</span>
        </header>
        <div class="p-6 space-y-4 flex-1 overflow-y-auto">
            <div class="flex justify-between items-center mb-2">
                <h2 class="text-xs font-black uppercase text-slate-400 italic">Fila de Espera</h2>
                <span class="text-[9px] font-black text-orange-500 uppercase tracking-widest animate-pulse">Sincronizando...</span>
            </div>
            <div id="queue-container" class="space-y-4">
                <div class="card-job next">
                    <div class="badge-next">PRÓXIMA DA FILA</div>
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <p class="text-[10px] font-black text-slate-400 uppercase">Cliente</p>
                            <p class="text-sm font-black italic">Ana Júlia</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] font-black text-orange-500 uppercase">Municipal</p>
                            <p class="text-xs font-black">R$ 7,00</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-2 text-slate-500 mb-6">
                        <i class="fas fa-map-marker-alt text-xs"></i>
                        <p class="text-[10px] font-bold uppercase">Rua das Acácias, 450</p>
                    </div>
                    <button onclick="alert('Iniciando Navegação para o Cliente...')" class="w-full vroom-btn py-4 text-xs">Aceitar Corrida</button>
                </div>
            </div>
        </div>
        <div class="p-6 bg-white border-t flex justify-around">
            <div class="text-center">
                <p class="text-[8px] font-black text-slate-400 uppercase">Ganhos</p>
                <p class="text-xs font-black italic">R$ 0,00</p>
            </div>
            <button onclick="nav('portal')" class="text-red-500 text-[10px] font-black uppercase">Deslogar</button>
        </div>
    </div>

    <!-- OUTRAS TELAS (CLIENTE/ADM) MANTIDAS NO CÓDIGO -->
    <div id="screen-cliente-login" class="screen p-8 justify-center items-center">
        <div class="w-full max-w-sm text-center">
            <h2 class="text-2xl font-black italic mb-6 uppercase">Cliente</h2>
            <input type="text" id="cli-nome" placeholder="Seu Nome" class="input-vroom mb-4">
            <input type="tel" id="cli-tel" placeholder="WhatsApp" class="input-vroom mb-4">
            <button onclick="registrarCliente()" class="w-full vroom-btn py-5">Entrar</button>
            <button onclick="nav('portal')" class="mt-4 block w-full text-xs font-black text-slate-400">Voltar</button>
        </div>
    </div>
    <div id="screen-cliente-app" class="screen !bg-white">
        <div class="p-4 border-b flex justify-between"><span class="font-black italic" id="user-display-name">Usuário</span><button onclick="logout()">Sair</button></div>
        <div id="map"></div>
        <div class="p-6"><button class="w-full vroom-btn py-5">Confirmar Pedido</button></div>
    </div>
    <div id="screen-adm-login" class="screen p-8 justify-center items-center">
        <div class="w-full max-w-sm bg-white p-10 rounded-[40px] text-center">
            <h2 class="text-2xl font-black italic mb-8 uppercase">ADM</h2>
            <input type="text" id="adm-user" placeholder="Usuário" class="input-vroom mb-4" value="Rodolfo Oliveira">
            <input type="password" id="adm-pass" placeholder="Senha" class="input-vroom mb-4">
            <button onclick="checkAdm()" class="w-full vroom-btn py-4">Entrar</button>
            <button onclick="nav('portal')" class="mt-4 block w-full text-xs font-black text-slate-400">Voltar</button>
        </div>
    </div>
    <div id="screen-adm-dashboard" class="screen !bg-slate-50">
         <header class="bg-slate-900 text-white p-6 flex justify-between items-center"><span class="font-black italic">MASTER</span><button onclick="nav('portal')">Sair</button></header>
         <div class="p-6"><div class="card-adm">Painel Master Ativo.</div></div>
    </div>

    <script>
        let map;
        function nav(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            const target = document.getElementById('screen-' + id);
            if(target) target.classList.add('active');
            if(id === 'cliente-app') initMap();
        }
        function checkFirstAccess() {
            const c = localStorage.getItem('vroom_cliente');
            if(c) loginAutomatico(JSON.parse(c));
            else nav('portal');
        }
        function registrarCliente() {
            const n = document.getElementById('cli-nome').value;
            const t = document.getElementById('cli-tel').value;
            if(!n || !t) { alert('Preencha tudo!'); return; }
            const d = { nome: n, tel: t };
            localStorage.setItem('vroom_cliente', JSON.stringify(d));
            loginAutomatico(d);
        }
        function loginAutomatico(d) { document.getElementById('user-display-name').innerText = d.nome; nav('cliente-app'); }
        function logout() { localStorage.removeItem('vroom_cliente'); window.location.reload(); }
        
        function checkMotorista() {
            const u = document.getElementById('mot-user').value;
            const p = document.getElementById('mot-pass').value;
            if(u === 'Rodolfo Oliveira' && p === 'Rm280198') {
                document.getElementById('mot-display-name').innerText = u;
                nav('motorista-app');
            } else {
                alert('Usuário ou Senha de Motorista incorretos!');
            }
        }

        function checkAdm() {
            const u = document.getElementById('adm-user').value;
            const p = document.getElementById('adm-pass').value;
            if(u === 'Rodolfo Oliveira' && p === 'Rm290198') nav('adm-dashboard');
            else alert('Acesso Negado ADM!');
        }
        function initMap() {
            setTimeout(() => {
                if(!map) {
                    map = L.map('map').setView([-23.55, -46.63], 15);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                }
                map.invalidateSize();
            }, 300);
        }
    </script>
</body>
</html>
