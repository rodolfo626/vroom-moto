<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VROOM MOTO v20.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .screen { display: none; min-height: 100vh; padding: 20px; flex-direction: column; }
        .screen.active { display: flex; }
        .vroom-input { background: #1e293b; border: 1px solid #334155; padding: 16px; border-radius: 12px; width: 100%; color: white; margin-bottom: 12px; outline: none; }
        .vroom-input:focus { border-color: #f97316; }
        .btn-primary { background: #f97316; padding: 18px; border-radius: 16px; font-weight: 900; text-transform: uppercase; width: 100%; transition: all 0.2s; box-shadow: 0 4px 14px 0 rgba(249, 115, 22, 0.39); }
        .btn-primary:active { transform: scale(0.98); }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 20px; padding: 20px; }
    </style>
</head>
<body>

    <!-- 1. PORTAL INICIAL -->
    <div id="screen-portal" class="screen active justify-center items-center">
        <div class="text-center mb-12">
            <h1 class="text-6xl font-black italic tracking-tighter">VROOM<span class="text-orange-500">MOTO</span></h1>
            <p class="text-slate-500 font-bold uppercase text-[10px] tracking-[0.4em] mt-2">Versão 20.0 Oficial</p>
        </div>
        <div class="w-full max-w-xs space-y-4">
            <button onclick="nav('cliente')" class="btn-primary">Pedir uma Moto</button>
            <button onclick="nav('motorista-login')" class="w-full bg-slate-800 py-5 rounded-2xl font-black uppercase text-sm italic border border-slate-700">Área do Motorista</button>
            <button onclick="nav('cadastro')" class="w-full text-orange-500 py-2 font-black uppercase text-[10px] tracking-widest">Trabalhe Conosco (Cadastro)</button>
        
            <div class="pt-6 border-t border-slate-800/50 mt-6">
                <button onclick="location.href='adm.html'" class="w-full bg-slate-900 text-slate-500 py-4 rounded-2xl font-black uppercase text-[10px] tracking-[0.2em] border border-slate-800 hover:border-orange-500 hover:text-orange-500 transition-all flex items-center justify-center gap-3">
                    <i class="fas fa-shield-halved text-sm"></i>
                    Central de Comando ADM
                </button>
            </div>
        </div>
        <p class="mt-20 text-[9px] text-slate-800 font-bold uppercase tracking-widest">Rodolfo Oliveira Adm</p>
    </div>

    <!-- 2. TELA: CADASTRO / RECRUTAMENTO -->
    <div id="screen-cadastro" class="screen overflow-y-auto">
        <div class="flex items-center gap-4 mb-6">
            <button onclick="nav('portal')" class="text-slate-400"><i class="fas fa-arrow-left"></i></button>
            <h2 class="text-2xl font-black italic uppercase">Seja um Piloto</h2>
        </div>
        
        <div class="space-y-1 pb-10">
            <p class="text-[10px] font-black uppercase text-orange-500 mb-2 tracking-widest italic">Dados Pessoais</p>
            <input id="cad-nome" type="text" placeholder="Nome Completo" class="vroom-input">
            <input id="cad-nasc" type="date" placeholder="Data de Nascimento" class="vroom-input">
            <input id="cad-cpf" type="tel" placeholder="CPF" class="vroom-input">
            <input id="cad-cnh" type="tel" placeholder="Número da CNH" class="vroom-input">
            
            <p class="text-[10px] font-black uppercase text-orange-500 mt-4 mb-2 tracking-widest italic">Dados da Moto</p>
            <input id="cad-modelo" type="text" placeholder="Modelo (ex: Titan 160)" class="vroom-input">
            <input id="cad-placa" type="text" placeholder="Placa" class="vroom-input">
            <input id="cad-cor-ano" type="text" placeholder="Cor e Ano" class="vroom-input">
            
            <p class="text-[10px] font-black uppercase text-orange-500 mt-4 mb-2 tracking-widest italic">Crie seu Acesso</p>
            <input id="cad-user" type="text" placeholder="Usuário (Login)" class="vroom-input">
            <input id="cad-pass" type="password" placeholder="Senha" class="vroom-input">
            
            <button onclick="enviarCadastro()" class="btn-primary mt-6">Enviar para Análise</button>
        </div>
    </div>

    <!-- 3. TELA: LOGIN MOTORISTA -->
    <div id="screen-motorista-login" class="screen justify-center items-center">
        <button onclick="nav('portal')" class="absolute top-6 left-6 text-slate-400"><i class="fas fa-arrow-left"></i></button>
        <div class="card w-full max-w-sm">
            <h2 class="text-2xl font-black italic uppercase mb-8 text-center text-orange-500">Login Piloto</h2>
            <input id="log-user" type="text" placeholder="Usuário" class="vroom-input">
            <input id="log-pass" type="password" placeholder="Senha" class="vroom-input">
            <button onclick="fazerLogin()" class="btn-primary">Entrar para o Turno</button>
        </div>
    </div>

    <!-- 4. TELA: CLIENTE (PEDIDO) -->
    <div id="screen-cliente" class="screen">
        <div class="flex items-center gap-4 mb-8">
            <button onclick="nav('portal')" class="text-slate-400"><i class="fas fa-arrow-left"></i></button>
            <h2 class="text-2xl font-black italic uppercase">Chamar Moto</h2>
        </div>
        <div class="card mb-6">
            <input type="text" placeholder="Sua localização..." class="vroom-input">
            <input type="text" placeholder="Para onde você vai?" class="vroom-input">
            <div class="flex justify-between items-center py-4 px-2 border-t border-slate-700 mt-4">
                <span class="text-slate-400 font-bold">Tarifa Estimada:</span>
                <span class="text-xl font-black text-green-500 italic">R$ 10,00</span>
            </div>
            <button onclick="alert('Funcionalidade de Mapa em breve na v21')" class="btn-primary">Confirmar Pedido</button>
        </div>
    </div>

    <script>
        function nav(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + id).classList.add('active');
            window.scrollTo(0,0);
        }

        function enviarCadastro() {
            const campos = ['cad-nome', 'cad-nasc', 'cad-cpf', 'cad-cnh', 'cad-modelo', 'cad-placa', 'cad-cor-ano', 'cad-user', 'cad-pass'];
            const data = { id: Date.now(), status: 'pendente' };
            
            for(let c of campos) {
                const val = document.getElementById(c).value;
                if(!val) return alert("Por favor, preencha todos os campos!");
                data[c.replace('cad-', '')] = val;
            }

            let pendentes = JSON.parse(localStorage.getItem('vroom_pendentes') || '[]');
            pendentes.push(data);
            localStorage.setItem('vroom_pendentes', JSON.stringify(pendentes));
            
            alert("Cadastro enviado com sucesso! Aguarde a aprovação do Rodolfo.");
            nav('portal');
        }

        function fazerLogin() {
            const user = document.getElementById('log-user').value;
            const pass = document.getElementById('log-pass').value;
            
            let aprovados = JSON.parse(localStorage.getItem('vroom_motoristas_aprovados') || '[]');
            const motorista = aprovados.find(m => m.user === user && m.pass === pass);
            
            if(motorista) {
                alert("Login realizado! Bem-vindo, " + motorista.nome);
            } else {
                alert("Acesso negado. Cadastro inexistente ou aguardando aprovação.");
            }
        }
    </script>
</body>
</html>
