<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VROOM v12.4 - 1782772534</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        :root { --vroom: #FF6B00; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0F172A; margin: 0; overflow: hidden; }
        .screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; background: #F8FAFC; z-index: 10; }
        .screen.active { display: flex !important; z-index: 9999 !important; }
        #screen-portal { background: #0F172A !important; justify-content: center; align-items: center; padding: 20px; }
        .vroom-btn { background: var(--vroom); color: white; font-weight: 900; text-transform: uppercase; border-radius: 15px; padding: 18px; width: 100%; border: none; cursor: pointer; font-size: 14px; box-shadow: 0 8px 20px rgba(255, 107, 0, 0.3); margin-bottom: 12px; }
        #map { height: 100%; width: 100%; position: absolute; z-index: 1; }
        .panel-bottom { position: fixed; bottom: 0; left: 0; width: 100%; background: white; border-radius: 25px 25px 0 0; padding: 20px; z-index: 100; box-shadow: 0 -5px 20px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <audio id="snd-buzina"><source src="https://assets.mixkit.co/active_storage/sfx/2855/2855-preview.mp3" type="audio/mpeg"></audio>
    <div id="screen-portal" class="screen active">
        <div class="text-center mb-10">
            <i class="fas fa-motorcycle text-6xl text-orange-500 mb-4"></i>
            <h1 class="text-4xl font-black italic text-white uppercase">VROOM<span class="text-orange-500">MOTO</span></h1>
            <p class="text-slate-500 text-[9px] font-bold mt-2">VERSÃO 12.4</p>
        </div>
        <div class="w-full max-w-xs">
            <button onclick="nav('cliente')" class="vroom-btn">Pedir uma Moto</button>
            <button onclick="nav('motorista-login')" class="vroom-btn" style="background:#1e293b">Área do Motorista</button>
            <button onclick="nav('adm-login')" class="vroom-btn" style="background:transparent; border:1px solid #334155; color:#64748b; font-size:10px">Painel ADM</button>
        </div>
    </div>
    <div id="screen-cliente" class="screen">
        <div id="map"></div>
        <div class="panel-bottom">
            <input type="text" id="inp-origem" value="Localizando..." readonly style="width:100%; padding:12px; border-radius:10px; border:1px solid #eee; margin-bottom:10px; font-size:12px">
            <input type="text" id="inp-destino" placeholder="Para onde vamos?" style="width:100%; padding:15px; border-radius:10px; border:2px solid #ddd; margin-bottom:15px">
            <button onclick="reqR()" class="vroom-btn">Confirmar Corrida</button>
            <button onclick="nav('portal')" style="width:100%; background:none; border:none; color:#ccc; font-size:10px; font-weight:bold; text-transform:uppercase">Voltar</button>
        </div>
    </div>
    <div id="screen-motorista-login" class="screen" style="justify-content:center; align-items:center; padding:20px">
        <h2 class="text-2xl font-black mb-6">LOGIN MOTORISTA</h2>
        <input type="text" value="Rodolfo Oliveira" style="width:100%; padding:15px; border-radius:10px; border:1px solid #ddd; margin-bottom:10px">
        <input type="password" value="Rm280198" style="width:100%; padding:15px; border-radius:10px; border:1px solid #ddd; margin-bottom:20px">
        <button onclick="nav('motorista-app')" class="vroom-btn">Ficar Online</button>
        <button onclick="nav('portal')" style="color:#94a3b8; font-weight:bold">VOLTAR</button>
    </div>
    <div id="screen-motorista-app" class="screen">
        <header style="background:#0f172a; color:white; padding:20px; display:flex; justify-content:space-between"><span>VROOM OPERATOR</span><span style="color:#22c55e; font-weight:bold">ONLINE</span></header>
        <div id="queue" style="flex:1; display:flex; justify-content:center; align-items:center; color:#cbd5e1; font-weight:bold; text-transform:uppercase">Aguardando...</div>
        <button onclick="nav('portal')" style="padding:20px; border:none; border-top:1px solid #eee; background:white; color:#94a3b8; font-weight:bold">SAIR</button>
    </div>
    <div id="screen-adm-login" class="screen" style="justify-content:center; align-items:center; padding:20px">
        <h2 class="text-2xl font-black mb-6">ADM MASTER</h2>
        <input type="text" id="adm-u" placeholder="Usuário" style="width:100%; padding:15px; border-radius:10px; border:1px solid #ddd; margin-bottom:10px">
        <input type="password" id="adm-p" placeholder="Senha" style="width:100%; padding:15px; border-radius:10px; border:1px solid #ddd; margin-bottom:20px">
        <button onclick="checkAdm()" class="vroom-btn">Entrar</button>
        <button onclick="nav('portal')" style="color:#94a3b8; font-weight:bold">VOLTAR</button>
    </div>
    <script>
        let map;
        function nav(id) {
            var screens = document.querySelectorAll('.screen');
            for(var i=0; i<screens.length; i++) {
                screens[i].style.display = 'none';
                screens[i].classList.remove('active');
            }
            var target = document.getElementById('screen-' + id);
            if(target) {
                target.style.display = 'flex';
                target.classList.add('active');
            }
            if(id === 'cliente') {
                setTimeout(function() {
                    if(!map) {
                        map = L.map('map', { zoomControl: false }).setView([-23.55, -46.63], 15);
                        L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}').addTo(map);
                    }
                    map.invalidateSize();
                    if(navigator.geolocation) {
                        navigator.geolocation.getCurrentPosition(function(p) {
                            map.setView([p.coords.latitude, p.coords.longitude], 16);
                            fetch('https://nominatim.openstreetmap.org/reverse?lat='+p.coords.latitude+'&lon='+p.coords.longitude+'&format=json')
                                .then(function(r){return r.json()}).then(function(d){
                                    document.getElementById('inp-origem').value = d.display_name.split(',')[0];
                                });
                        });
                    }
                }, 500);
            }
        }
        function reqR() {
            document.getElementById('snd-buzina').play();
            alert('Enviado!');
            document.getElementById('queue').innerHTML = '<div style="background:white; padding:20px; border:2px solid #FF6B00; border-radius:15px; text-align:left; color:#1e293b"><p style="color:#FF6B00; font-weight:900">NOVA CORRIDA</p><p>Destino: '+document.getElementById('inp-destino').value+'</p><button onclick="location.reload()" class="vroom-btn" style="margin-top:10px; padding:10px">Aceitar</button></div>';
        }
        function checkAdm() {
            if(document.getElementById('adm-u').value === 'Rodolfo Oliveira' && document.getElementById('adm-p').value === 'Rm290198') nav('portal');
            else alert('Erro');
        }
    </script>
</body>
</html>
