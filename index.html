<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VROOM MOTO v21.0 - Projeto Mestre</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #020617; color: white; font-family: 'Inter', sans-serif; }
        .vroom-card { background: #0f172a; border: 1px solid #1e293b; border-radius: 24px; }
        .screen { display: none; min-height: 100vh; padding: 16px; flex-direction: column; }
        .screen.active { display: flex; }
        .vroom-input { background: #1e293b; border: 1px solid #334155; padding: 16px; border-radius: 16px; width: 100%; color: white; outline: none; transition: border 0.3s; }
        .vroom-input:focus { border-color: #f97316; }
        .btn-main { background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); padding: 20px; border-radius: 20px; font-weight: 900; text-transform: uppercase; width: 100%; box-shadow: 0 10px 15px -3px rgba(249, 115, 22, 0.3); }
        #map { width: 100%; height: 280px; border-radius: 24px; margin-bottom: 16px; background: #1e293b; border: 1px solid #334155; }
        .status-badge { font-size: 10px; font-weight: 900; padding: 4px 10px; border-radius: 100px; text-transform: uppercase; }
    </style>
</head>
<body>

    <!-- TELA 1: PORTAL INICIAL -->
    <div id="screen-portal" class="screen active justify-center items-center">
        <div class="text-center mb-12">
            <h1 class="text-6xl font-black italic tracking-tighter leading-none">VROOM<br><span class="text-orange-500">MOTO</span></h1>
            <p class="text-slate-500 font-bold uppercase text-[10px] tracking-[0.4em] mt-4">Ecossistema v21.0</p>
        </div>
        <div class="w-full max-w-sm space-y-4">
            <button onclick="nav('cliente')" class="btn-main italic">Chamar uma Vroom</button>
            <button onclick="nav('motorista-login')" class="w-full bg-slate-900 py-5 rounded-2xl font-black uppercase text-sm italic border border-slate-800 text-slate-400">Área do Piloto</button>
            <button onclick="nav('recrutamento')" class="w-full text-orange-500 py-4 font-black uppercase text-[11px] tracking-widest bg-orange-500/5 rounded-2xl border border-orange-500/10">Trabalhe Conosco (Cadastro)</button>
        </div>
        <button onclick="location.href='adm.html'" class="mt-12 text-slate-700 font-black uppercase text-[9px] tracking-widest flex items-center gap-2">
            <i class="fas fa-shield-halved"></i> Central de Comando ADM
        </button>
    </div>

    <!-- TELA 2: ÁREA DO CLIENTE (MÁXIMA INFORMAÇÃO) -->
    <div id="screen-cliente" class="screen overflow-y-auto">
        <div class="flex items-center justify-between mb-4">
            <button onclick="nav('portal')" class="w-10 h-10 rounded-full bg-slate-900 flex items-center justify-center border border-slate-800"><i class="fas fa-arrow-left"></i></button>
            <h2 class="text-lg font-black italic uppercase">Sua Viagem</h2>
            <div class="w-10"></div>
        </div>

        <!-- O MAPA -->
        <div id="map" class="relative overflow-hidden">
            <div class="absolute inset-0 flex items-center justify-center text-slate-700 text-center p-8">
                <p class="text-[10px] font-black uppercase tracking-widest">Aguardando Chave de API Google Maps para vincular geolocalização real...</p>
            </div>
        </div>

        <!-- FORMULÁRIO DE PEDIDO -->
        <div class="vroom-card p-6 space-y-4 mb-6">
            <div class="relative">
                <label class="text-[10px] font-black uppercase text-slate-500 ml-2 mb-1 block">Origem</label>
                <input id="cli-origem" type="text" placeholder="Detectando sua localização..." class="vroom-input pr-12">
                <button onclick="gpsSimulate()" class="absolute right-4 top-10 text-orange-500"><i class="fas fa-crosshairs text-xl"></i></button>
            </div>
            <div>
                <label class="text-[10px] font-black uppercase text-slate-500 ml-2 mb-1 block">Destino</label>
                <input id="cli-destino" type="text" placeholder="Para onde vamos?" class="vroom-input">
            </div>
            <div>
                <label class="text-[10px] font-black uppercase text-slate-500 ml-2 mb-1 block">Ponto de Referência</label>
                <input id="cli-ref" type="text" placeholder="Ex: Portão Azul, Próximo ao mercado..." class="vroom-input">
            </div>
            
            <div class="flex justify-between items-center py-4 border-t border-slate-800 mt-2">
                <div>
                    <p class="text-[10px] font-black uppercase text-slate-500">Valor Estimado</p>
                    <p class="text-2xl font-black text-green-500 italic leading-none">R$ 10,00</p>
                </div>
                <button class="bg-slate-800 px-4 py-2 rounded-xl text-[10px] font-black uppercase text-orange-500">Ver Detalhes</button>
            </div>
            <button onclick="pedirVroom()" class="btn-main">Confirmar Vroom Moto</button>
        </div>
    </div>

    <!-- TELA 3: RECRUTAMENTO (O QUE O MOTORISTA PREENCHE) -->
    <div id="screen-recrutamento" class="screen overflow-y-auto">
        <button onclick="nav('portal')" class="text-slate-500 mb-4"><i class="fas fa-arrow-left"></i> Voltar</button>
        <h2 class="text-3xl font-black italic uppercase mb-2">Recrutamento</h2>
        <p class="text-slate-400 text-sm mb-8">Envie seus dados para análise do Rodolfo.</p>

        <div class="space-y-6 pb-20">
            <div class="space-y-2">
                <p class="text-[11px] font-black uppercase text-orange-500 tracking-widest italic">1. Dados Pessoais</p>
                <input id="rec-nome" type="text" placeholder="Nome Completo" class="vroom-input">
                <input id="rec-nasc" type="date" placeholder="Data de Nascimento" class="vroom-input">
                <input id="rec-cpf" type="tel" placeholder="CPF" class="vroom-input">
                <input id="rec-cnh" type="tel" placeholder="Número da CNH" class="vroom-input">
            </div>

            <div class="space-y-2">
                <p class="text-[11px] font-black uppercase text-orange-500 tracking-widest italic">2. Dados do Veículo</p>
                <input id="rec-modelo" type="text" placeholder="Modelo da Moto" class="vroom-input">
                <input id="rec-placa" type="text" placeholder="Placa" class="vroom-input">
                <input id="rec-cor-ano" type="text" placeholder="Cor e Ano" class="vroom-input">
            </div>

            <div class="space-y-2">
                <p class="text-[11px] font-black uppercase text-orange-500 tracking-widest italic">3. Crie seu Acesso</p>
                <input id="rec-user" type="text" placeholder="Escolha um Usuário" class="vroom-input">
                <input id="rec-pass" type="password" placeholder="Crie uma Senha" class="vroom-input">
            </div>

            <div class="p-4 bg-orange-500/5 rounded-2xl border border-orange-500/10">
                <label class="flex items-center gap-3 cursor-pointer">
                    <input type="checkbox" id="rec-termos" class="w-5 h-5 accent-orange-500">
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-tight">Aceito os termos e regras da Vroom Moto</span>
                </label>
            </div>

            <button onclick="processarCadastro()" class="btn-main">Enviar Candidatura</button>
        </div>
    </div>

    <!-- TELA 4: LOGIN MOTORISTA -->
    <div id="screen-motorista-login" class="screen justify-center items-center">
        <button onclick="nav('portal')" class="absolute top-8 left-8 text-slate-500"><i class="fas fa-arrow-left"></i></button>
        <div class="vroom-card w-full max-w-sm p-8 text-center">
            <div class="w-20 h-20 bg-orange-500/10 rounded-3xl flex items-center justify-center mx-auto mb-6">
                <i class="fas fa-helmet-safety text-3xl text-orange-500"></i>
            </div>
            <h2 class="text-2xl font-black italic uppercase mb-8">Login do Piloto</h2>
            <input id="log-user" type="text" placeholder="Usuário" class="vroom-input mb-3">
            <input id="log-pass" type="password" placeholder="Senha" class="vroom-input mb-8">
            <button onclick="loginPiloto()" class="btn-main">Entrar no Turno</button>
        </div>
    </div>

    <script>
        function nav(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + id).classList.add('active');
            window.scrollTo(0,0);
        }

        function gpsSimulate() {
            alert("Sinal de GPS Ativo! Detectando sua rua...");
            document.getElementById('cli-origem').value = "Rua Teste do Vroom, 123 - Centro";
        }

        function processarCadastro() {
            const campos = ['rec-nome', 'rec-nasc', 'rec-cpf', 'rec-cnh', 'rec-modelo', 'rec-placa', 'rec-cor-ano', 'rec-user', 'rec-pass'];
            const data = { id: Date.now(), status: 'pendente' };
            for(let c of campos) {
                const v = document.getElementById(c).value;
                if(!v) return alert("Preencha todos os campos!");
                data[c.replace('rec-', '')] = v;
            }
            if(!document.getElementById('rec-termos').checked) return alert("Aceite os termos!");

            let p = JSON.parse(localStorage.getItem('vroom_v21_pendentes') || '[]');
            p.push(data);
            localStorage.setItem('vroom_v21_pendentes', JSON.stringify(p));
            alert("Candidatura enviada! Rodolfo analisará seus dados.");
            nav('portal');
        }

        function loginPiloto() {
            const u = document.getElementById('log-user').value;
            const p = document.getElementById('log-pass').value;
            let aprovados = JSON.parse(localStorage.getItem('vroom_v21_ativos') || '[]');
            const found = aprovados.find(m => m.user === u && m.pass === p);
            if(found) {
                alert("Acesso Liberado! Bom trabalho, " + found.nome);
                // Próxima fase: Dashboard do Motorista
            } else {
                alert("Acesso Negado. Verifique os dados ou aguarde aprovação do Rodolfo.");
            }
        }
    </script>
</body>
</html>
