<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VROOM MOTO v9.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        :root { --vroom: #FF6B00; }
        body { font-family: 'Inter', sans-serif; background: #0F172A; margin: 0; padding: 0; overflow-x: hidden; }
        .screen { display: none; min-height: 100vh; width: 100vw; flex-direction: column; background: #F8FAFC; }
        .screen.active { display: flex !important; }
        .vroom-btn { background: var(--vroom); color: white; font-weight: 800; text-transform: uppercase; border-radius: 18px; transition: 0.2s; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .input-vroom { background: #F1F5F9; border: 2px solid #E2E8F0; padding: 14px; border-radius: 16px; outline: none; font-weight: 600; width: 100%; color: #1E293B; font-size: 14px; }
        #map { height: 350px; width: 100%; z-index: 1; }
        .driver-panel { position: fixed; top: 10px; left: 10px; right: 10px; background: white; border-radius: 20px; padding: 12px 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); z-index: 100; display: none; border-left: 5px solid var(--vroom); }
        .driver-panel.active { display: flex !important; }
    </style>
</head>
<body onload="nav('portal')">

    <audio id="audio-buzina" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2855/2855-preview.mp3" type="audio/mpeg">
    </audio>

    <!-- PORTAL PRINCIPAL -->
    <div id="screen-portal" class="screen items-center justify-center p-8 !bg-[#0F172A] text-white">
        <div class="text-center mb-12">
            <i class="fas fa-motorcycle text-7xl text-orange-500 mb-4"></i>
            <h1 class="text-5xl font-black italic tracking-tighter uppercase leading-none">VROOM<span class="text-orange-500">MOTO</span></h1>
            <p class="text-slate-500 text-[10px] font-bold uppercase mt-2 italic tracking-[0.2em]">v9.3 Stable</p>
        </div>
        <div class="w-full max-w-xs space-y-4">
            <button onclick="nav('cliente-login')" class="w-full vroom-btn py-5 text-lg shadow-2xl">Pedir uma Moto</button>
            <button onclick="nav('motorista-login')" class="w-full bg-slate-800 py-5 rounded-2xl font-black uppercase text-xs text-white">Motorista</button>
            <button onclick="nav('adm-login')" class="w-full bg-transparent border-2 border-slate-700 text-slate-500 py-3 rounded-2xl text-[9px] font-black uppercase">Painel Master</button>
        </div>
    </div>

    <!-- TELA: LOGIN CLIENTE -->
    <div id="screen-cliente-login" class="screen p-8 justify-center items-center">
        <div class="w-full max-w-sm text-center">
            <h2 class="text-2xl font-black italic mb-6 uppercase">Acesso Cliente</h2>
            <input type="text" id="cli-nome" placeholder="Seu Nome" class="input-vroom mb-4">
            <button onclick="nav('cliente-app')" class="w-full vroom-btn py-5">Entrar</button>
            <button onclick="nav('portal')" class="mt-4 block w-full text-xs font-black text-slate-400">VOLTAR</button>
        </div>
    </div>

    <!-- TELA: APP CLIENTE COMPLETA -->
    <div id="screen-cliente-app" class="screen !bg-white">
        <div id="driver-status" class="driver-panel items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-slate-100 rounded-full flex items-center justify-center border-2 border-orange-500"><i class="fas fa-user text-slate-400"></i></div>
                <div><p class="text-sm font-black italic">Rodolfo Oliveira</p><p class="text-[9px] font-bold text-slate-500 uppercase">Moto 160 • ABC-1234</p></div>
            </div>
            <div class="text-right"><p class="text-lg font-black text-orange-500 italic">4 min</p></div>
        </div>
        <div id="map"></div>
        <div class="flex-1 p-6 space-y-4 -mt-10 bg-white rounded-t-[40px] shadow-2xl z-20">
            <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto"></div>
            <input type="text" id="loc-destino" placeholder="Para onde vamos?" class="input-vroom" oninput="autoCalc()">
            <div id="price-card" class="hidden p-4 bg-orange-50 border-2 border-orange-100 rounded-3xl flex justify-between items-center">
                <p class="text-2xl font-black italic" id="ride-price">R$ 7,00</p>
                <p class="text-[9px] font-black text-orange-600 uppercase italic" id="ride-type">Municipal</p>
            </div>
            <button onclick="confirmarPedido()" id="btn-confirm" class="w-full vroom-btn py-5">Confirmar</button>
            <button onclick="nav('portal')" class="w-full text-xs font-black text-slate-400 uppercase mt-4">Sair</button>
        </div>
    </div>

    <!-- TELA: LOGIN MOTORISTA -->
    <div id="screen-motorista-login" class="screen p-8 justify-center items-center">
        <div class="w-full max-w-sm text-center">
            <h2 class="text-2xl font-black italic mb-8 uppercase text-slate-800">Motorista</h2>
            <input type="text" id="mot-user" placeholder="Usuário" class="input-vroom mb-4" value="Rodolfo Oliveira">
            <input type="password" id="mot-pass" placeholder="Senha" class="input-vroom mb-4" value="Rm280198">
            <button onclick="nav('motorista-app')" class="w-full vroom-btn py-5">Entrar</button>
            <button onclick="nav('portal')" class="text-slate-400 font-bold uppercase text-[10px] mt-6 block">Voltar</button>
        </div>
    </div>

    <div id="screen-motorista-app" class="screen !bg-slate-50">
        <header class="bg-slate-900 text-white p-6 flex justify-between items-center"><span class="font-black italic">VROOM FILA</span><button onclick="nav('portal')">SAIR</button></header>
        <div class="p-8 text-center">
            <button onclick="document.getElementById('audio-buzina').play()" class="vroom-btn py-3 px-6 text-xs">Testar Som (Bi-Bii)</button>
        </div>
    </div>

    <!-- TELA ADM -->
    <div id="screen-adm-login" class="screen p-8 justify-center items-center">
        <h2 class="text-2xl font-black italic mb-6">ADM</h2>
        <input type="text" value="Rodolfo Oliveira" class="input-vroom mb-4">
        <button onclick="alert('Master Ativo')" class="vroom-btn py-4 w-full">Acessar</button>
        <button onclick="nav('portal')" class="mt-4 block w-full text-xs font-black text-slate-400">VOLTAR</button>
    </div>

    <script>
        function nav(id) {
            // Esconde todas as telas de forma agressiva
            const screens = document.getElementsByClassName('screen');
            for(let i=0; i < screens.length; i++) {
                screens[i].style.display = 'none';
                screens[i].classList.remove('active');
            }
            // Mostra a tela alvo
            const target = document.getElementById('screen-' + id);
            if(target) {
                target.style.display = 'flex';
                target.classList.add('active');
            }
            if(id === 'cliente-app') initMap();
        }

        function initMap() {
            setTimeout(() => {
                const mapDiv = document.getElementById('map');
                if(mapDiv && !mapDiv.innerHTML) {
                    let m = L.map('map').setView([-23.55, -46.63], 15);
                    L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}').addTo(m);
                }
            }, 300);
        }

        function autoCalc() {
            const d = document.getElementById('loc-destino').value;
            const c = document.getElementById('price-card');
            if(d.length > 4) c.classList.remove('hidden');
            else c.classList.add('hidden');
        }

        function confirmarPedido() {
            alert('Enviado! Buzina tocando na área do motorista.');
            document.getElementById('audio-buzina').play();
            document.getElementById('btn-confirm').innerHTML = 'Aguardando...';
            setTimeout(() => {
                document.getElementById('driver-status').style.display = 'flex';
                document.getElementById('driver-status').classList.add('active');
            }, 3000);
        }
    </script>
</body>
</html>
