<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VROOM MOTO v11.1 - GPS Google Precise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        :root { --vroom: #FF6B00; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: #0F172A; overflow: hidden; height: 100vh; width: 100vw; }
        .screen { display: none; height: 100%; width: 100%; position: fixed; top: 0; left: 0; flex-direction: column; background: #F8FAFC; z-index: 10; }
        .screen.active { display: flex !important; z-index: 100 !important; }
        #screen-portal { background: #0F172A !important; justify-content: center; align-items: center; padding: 30px; }
        .vroom-btn { background: var(--vroom); color: white; font-weight: 800; text-transform: uppercase; border-radius: 20px; padding: 20px; width: 100%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 10px 20px rgba(255, 107, 0, 0.3); font-size: 16px; }
        .input-vroom { background: #F1F5F9; border: 2px solid #E2E8F0; padding: 16px; border-radius: 18px; outline: none; font-weight: 600; width: 100%; color: #1E293B; font-size: 15px; }
        #map { height: 100%; width: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
        .panel-client { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-radius: 35px 35px 0 0; padding: 25px; box-shadow: 0 -10px 40px rgba(0,0,0,0.1); z-index: 150; }
        .loc-badge { background: #eff6ff; color: #3b82f6; padding: 4px 10px; border-radius: 10px; font-size: 9px; font-weight: 900; display: inline-flex; align-items: center; gap: 5px; margin-bottom: 8px; }
    </style>
</head>
<body>
    <div id="screen-portal" class="screen active">
        <div class="text-center mb-12">
            <i class="fas fa-motorcycle text-8xl text-orange-500 mb-4"></i>
            <h1 class="text-5xl font-black italic tracking-tighter uppercase text-white">VROOM<span class="text-orange-500">MOTO</span></h1>
            <p class="text-slate-500 text-[10px] font-black uppercase mt-2 italic tracking-[0.3em]">VERSION 11.1 - GPS FIX</p>
        </div>
        <div class="w-full max-w-xs space-y-4">
            <button onclick="nav('cliente-app')" class="vroom-btn">Pedir uma Moto</button>
            <button onclick="nav('motorista-app')" class="w-full bg-slate-800 text-white py-5 rounded-2xl font-black uppercase text-xs">Motorista</button>
        </div>
    </div>

    <div id="screen-cliente-app" class="screen">
        <div id="map"></div>
        <div class="panel-client">
            <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-4"></div>
            <div class="loc-badge"><i class="fas fa-crosshairs animate-pulse"></i> GPS GOOGLE ATIVO</div>
            <div class="space-y-4">
                <div class="relative">
                    <i class="fas fa-dot-circle text-blue-500 absolute left-4 top-4"></i>
                    <input type="text" id="loc-origem" value="Localizando..." readonly class="input-vroom !pl-10 !bg-slate-50 !border-none text-xs">
                </div>
                <div class="relative">
                    <i class="fas fa-map-marker-alt text-slate-400 absolute left-4 top-4"></i>
                    <input type="text" id="loc-destino" placeholder="Para onde você vai?" class="input-vroom !pl-10">
                </div>
                <button onclick="alert('Confirmado!')" class="vroom-btn">Confirmar Corrida</button>
                <button onclick="nav('portal')" class="w-full text-center text-[10px] font-black text-slate-300 uppercase mt-2">Sair</button>
            </div>
        </div>
    </div>

    <script>
        let map;
        let marker;
        function nav(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + id).classList.add('active');
            if(id === 'cliente-app') { initMap(); getGPS(); }
        }
        function initMap() {
            if(!map) {
                map = L.map('map', { zoomControl: false }).setView([-23.55, -46.63], 15);
                L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}').addTo(map);
            }
            map.invalidateSize();
        }
        function getGPS() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((p) => {
                    const lat = p.coords.latitude;
                    const lng = p.coords.longitude;
                    map.setView([lat, lng], 17);
                    if(marker) map.removeLayer(marker);
                    marker = L.circleMarker([lat, lng], { radius: 8, color: '#3b82f6', fillOpacity: 0.8 }).addTo(map);
                    fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`)
                        .then(r => r.json()).then(d => {
                            document.getElementById('loc-origem').value = d.display_name.split(',')[0] + ', ' + d.display_name.split(',')[1];
                        });
                }, null, { enableHighAccuracy: true });
            }
        }
    </script>
</body>
</html>
