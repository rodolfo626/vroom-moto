<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Vroom Moto - Nova Geração</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root { --vroom-orange: #FF6B00; --vroom-black: #1A1A1A; }
    body { background-color: #F3F4F6; font-family: 'Inter', sans-serif; overflow-x: hidden; }
    .btn-vroom { background-color: var(--vroom-orange); color: white; transition: all 0.3s; }
    .btn-vroom:active { transform: scale(0.95); opacity: 0.9; }
    .screen { display: none; min-height: 100vh; width: 100vw; position: absolute; top: 0; left: 0; }
    .screen.active { display: flex; flex-direction: column; }
    .card-vroom { background: white; border-radius: 20px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
    .orange-gradient { background: linear-gradient(135deg, #FF6B00 0%, #FF8800 100%); }
  </style>
</head>
<body>

  <!-- TELA DE BOAS-VINDAS -->
  <div id="screen-welcome" class="screen active p-8 justify-center items-center text-center bg-white">
    <div class="mb-12 animate-bounce">
      <div class="text-8xl mb-4">🏍️</div>
      <h1 class="text-5xl font-black text-slate-900 italic tracking-tighter">VROOM<span class="text-orange-600">MOTO</span></h1>
      <div class="h-1 w-20 bg-orange-500 mx-auto mt-2 rounded-full"></div>
    </div>
    <div class="w-full max-w-xs space-y-4">
      <button onclick="showScreen('screen-cliente-login')" class="w-full orange-gradient text-white py-5 rounded-2xl font-black text-xl shadow-xl hover:shadow-orange-200">
        SOU CLIENTE
      </button>
      <button onclick="showScreen('screen-motorista-login')" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black text-xl shadow-xl">
        SOU MOTORISTA
      </button>
    </div>
    <div class="absolute bottom-10 text-slate-400 font-bold tracking-widest text-xs">GERAÇÃO 2.0 • 2024</div>
  </div>

  <!-- LOGIN CLIENTE -->
  <div id="screen-cliente-login" class="screen p-8 bg-white">
    <button onclick="showScreen('screen-welcome')" class="mb-8 text-slate-400 font-bold flex items-center gap-2"><i class="fa-solid fa-arrow-left"></i> VOLTAR</button>
    <h2 class="text-4xl font-black text-slate-800 mb-2">Olá! 👋</h2>
    <p class="text-slate-500 mb-10 text-lg">Para começar, qual o seu telefone?</p>
    <div class="space-y-6">
      <div class="relative">
        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 font-bold">🇧🇷 +55</span>
        <input type="tel" id="cli-phone" placeholder="(00) 00000-0000" class="w-full pl-20 p-5 rounded-2xl border-2 border-slate-100 focus:border-orange-500 outline-none transition-all font-bold text-lg">
      </div>
      <button onclick="loginCliente()" class="w-full orange-gradient text-white py-5 rounded-2xl font-black text-lg shadow-lg">ENTRAR AGORA</button>
    </div>
  </div>

  <!-- HOME CLIENTE -->
  <div id="screen-cliente-home" class="screen bg-slate-50">
    <div class="bg-white p-6 shadow-sm flex justify-between items-center">
      <h2 class="text-2xl font-black italic tracking-tighter">VROOM<span class="text-orange-500">MOTO</span></h2>
      <div class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center text-slate-400"><i class="fa-solid fa-user"></i></div>
    </div>
    <div class="p-6 flex-1">
      <div class="card-vroom p-8">
        <h3 class="text-xl font-black text-slate-800 mb-6">Onde vamos? 📍</h3>
        <div class="space-y-4">
          <div class="flex items-center bg-slate-50 p-4 rounded-xl border border-slate-100">
            <i class="fa-solid fa-circle-dot text-orange-500 mr-4"></i>
            <input type="text" value="Minha localização atual" class="bg-transparent w-full outline-none font-bold text-slate-600 text-sm" readonly>
          </div>
          <div class="flex items-center bg-slate-50 p-4 rounded-xl border-2 border-orange-100">
            <i class="fa-solid fa-flag-checkered text-slate-400 mr-4"></i>
            <input type="text" id="cli-destino" placeholder="Digite o destino final..." class="bg-transparent w-full outline-none font-black text-slate-800">
          </div>
        </div>
        
        <div class="mt-8 grid grid-cols-2 gap-4">
          <div class="p-4 rounded-2xl border-2 border-orange-500 bg-orange-50 relative overflow-hidden">
             <div class="font-black text-orange-600 italic">BÁSICA</div>
             <div class="text-xs text-orange-400">R$ 7,00 min.</div>
             <i class="fa-solid fa-motorcycle absolute -right-2 -bottom-2 text-4xl opacity-10"></i>
          </div>
          <div class="p-4 rounded-2xl border border-slate-100 bg-white opacity-50">
             <div class="font-black text-slate-400 italic">EXPRESSA</div>
             <div class="text-xs text-slate-300">R$ 12,00 min.</div>
          </div>
        </div>

        <button onclick="pedirMoto()" class="w-full orange-gradient text-white mt-8 py-5 rounded-2xl font-black text-xl shadow-orange-200 shadow-2xl">
          PEDIR MOTOTAXI
        </button>
      </div>
    </div>
  </div>

  <script>
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      const next = document.getElementById(id);
      if(next) next.classList.add('active');
      window.scrollTo(0,0);
    }

    function loginCliente() {
      const val = document.getElementById('cli-phone').value;
      if(val.length < 5) return alert('Por favor, digite seu telefone');
      showScreen('screen-cliente-home');
    }

    function pedirMoto() {
      const dest = document.getElementById('cli-destino').value;
      if(!dest) return alert('Para onde vamos? Digite o destino!');
      alert('🚀 BUSCANDO MOTORISTA...

Rodolfo, este é o novo visual 2.0! Se você aprovar, vou instalar agora o sistema de nuvem para você testar entre celulares.');
    }
  </script>
</body>
</html>
