<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VROOM MOTO v9.0 - Alerta Sonoro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        :root { --vroom: #FF6B00; }
        body { font-family: 'Inter', sans-serif; background: #0F172A; margin: 0; padding: 0; overflow-x: hidden; }
        .screen { display: none; min-height: 100vh; width: 100vw; flex-direction: column; background: #F8FAFC; }
        .screen.active { display: flex; }
        .vroom-btn { background: var(--vroom); color: white; font-weight: 800; text-transform: uppercase; border-radius: 18px; transition: 0.2s; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .input-vroom { background: #F1F5F9; border: 2px solid #E2E8F0; padding: 14px; border-radius: 16px; outline: none; font-weight: 600; width: 100%; color: #1E293B; font-size: 14px; }
        #map { height: 350px; width: 100%; z-index: 1; }
        .card-job { background: white; border-radius: 20px; padding: 20px; border: 2px solid #E2E8F0; position: relative; margin-bottom: 16px; }
        .card-job.next { border-color: var(--vroom); box-shadow: 0 10px 15px -3px rgba(255, 107, 0, 0.1); }
        .badge-next { position: absolute; top: 0; right: 0; background: var(--vroom); color: white; font-size: 8px; font-weight: 900; padding: 4px 12px; border-radius: 0 0 0 12px; text-transform: uppercase; }
    </style>
</head>
<body onload="nav('portal')"> <!-- FORÇANDO ABERTURA NA TELA INICIAL -->

    <!-- ÁUDIO DE BUZINA (BI-BII) -->
    <audio id="audio-buzina" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2855/2855-preview.mp3" type="audio/mpeg">
    </audio>

    <!-- PORTAL PRINCIPAL -->
    <div id="screen-portal" class="screen items-center justify-center p-8 !bg-[#0F172A] text-white">
        <div class="text-center mb-12">
            <i class="fas fa-motorcycle text-7xl text-orange-500 mb-4"></i>
            <h1 class="text-5xl font-black italic tracking-tighter uppercase leading-none">VROOM<span class="text-orange-500">MOTO</span></h1>
            <p class="text-slate-500 text-[10px] font-bold uppercase mt-2 italic">v9.0 Audio Alert</p>
        </div>
        <div class="w-full max-w-xs space-y-4">
            <button onclick="nav('cliente-login')" class="w-full vroom-btn py-5 text-lg shadow-2xl">Pedir uma Moto</button>
            <button onclick="nav('motorista-login')" class="w-full bg-slate-800 py-5 rounded-2xl font-black uppercase text-xs text-white">Motorista</button>
            <button onclick="nav('adm-login')" class="w-full bg-transparent border-2 border-slate-700 text-slate-500 py-3 rounded-2xl text-[9px] font-black uppercase">Painel Master</button>
        </div>
    </div>

    <!-- TELA: LOGIN MOTORISTA -->
    <div id="screen-motorista-login" class="screen p-8 justify-center items-center">
        <div class="w-full max-w-sm text-center">
            <h2 class="text-2xl font-black italic mb-8 uppercase text-slate-800">Acesso Motorista</h2>
            <div class="space-y-4">
                <input type="text" id="mot-user" placeholder="Usuário" class="input-vroom" value="Rodolfo Oliveira">
                <input type="password" id="mot-pass" placeholder="Senha" class="input-vroom" value="Rm280198">
                <button onclick="checkMotorista()" class="w-full vroom-btn py-5">Ficar Online</button>
                <button onclick="nav('portal')" class="text-slate-400 font-bold uppercase text-[10px] mt-6 block">Voltar</button>
            </div>
        </div>
    </div>

    <!-- TELA: APP MOTORISTA (FILA COM SOM) -->
    <div id="screen-motorista-app" class="screen !bg-slate-50">
        <header class="bg-slate-900 text-white p-6 flex justify-between items-center">
            <span class="font-black italic">VROOM <span class="text-orange-500">FILA</span></span>
            <div class="flex items-center gap-2">
                <i class="fas fa-volume-up text-xs text-green-500"></i>
                <span class="text-[10px] font-black uppercase bg-green-500 px-2 py-1 rounded">Online</span>
            </div>
        </header>
        <div class="p-6 space-y-4 flex-1 overflow-y-auto">
            <div class="flex justify-between items-center">
                <h2 class="text-xs font-black uppercase text-slate-400 italic">Corridas Disponíveis</h2>
                <button onclick="simularNovaCorrida()" class="text-[8px] bg-slate-200 px-2 py-1 rounded font-bold">SIMULAR (TESTAR SOM)</button>
            </div>
            <div id="queue-container" class="space-y-4">
                <!-- Pedidos aqui -->
            </div>
        </div>
        <button onclick="nav('portal')" class="p-6 text-slate-400 text-xs font-black uppercase">Sair</button>
    </div>

    <!-- TELA: CLIENTE (SIMPLIFICADA PARA O EXEMPLO) -->
    <div id="screen-cliente-login" class="screen p-8 justify-center items-center">
        <h2 class="text-2xl font-black italic mb-6">CLIENTE</h2>
        <input type="text" id="cli-nome" placeholder="Seu Nome" class="input-vroom mb-4">
        <button onclick="nav('cliente-app')" class="w-full vroom-btn py-5">Entrar</button>
    </div>
    <div id="screen-cliente-app" class="screen !bg-white">
        <div id="map"></div>
        <div class="p-6">
            <input type="text" id="loc-destino" placeholder="Para onde?" class="input-vroom mb-4">
            <button onclick="enviarParaFila()" class="w-full vroom-btn py-5">Confirmar e Enviar para Fila</button>
        </div>
    </div>

    <script>
        let globalQueue = [];
        
        function nav(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            const target = document.getElementById('screen-' + id);
            if(target) target.classList.add('active');
            if(id === 'cliente-app') initMap();
        }

        function playBuzina() {
            const audio = document.getElementById('audio-buzina');
            audio.play().catch(e => console.log("Áudio bloqueado pelo navegador. Clique na tela para ativar."));
        }

        function checkMotorista() {
            const u = document.getElementById('mot-user').value;
            const p = document.getElementById('mot-pass').value;
            if(u === 'Rodolfo Oliveira' && p === 'Rm280198') nav('motorista-app');
            else alert('Erro no login!');
        }

        function simularNovaCorrida() {
            playBuzina();
            globalQueue.push({ cliente: "Teste Som", tipo: "Municipal", preco: "R$ 7,00", destino: "Rua de Exemplo, 123" });
            updateQueueUI();
        }

        function enviarParaFila() {
            alert('Enviado! Vá para a tela do motorista para ouvir a buzina.');
            globalQueue.push({ 
                cliente: document.getElementById('cli-nome').value || "Cliente", 
                tipo: "Municipal", 
                preco: "R$ 7,00", 
                destino: document.getElementById('loc-destino').value 
            });
            // O som tocaria via WebSocket/Firebase em produção. Aqui simularemos ao atualizar a UI do motorista.
            updateQueueUI();
        }

        function updateQueueUI() {
            const container = document.getElementById('queue-container');
            if(!container) return;
            container.innerHTML = '';
            
            globalQueue.forEach((job, index) => {
                const card = document.createElement('div');
                card.className = `card-job ${index === 0 ? 'next' : ''}`;
                card.innerHTML = `
                    ${index === 0 ? '<div class="badge-next">PRÓXIMA DA FILA</div>' : ''}
                    <div class="flex justify-between items-start mb-2">
                        <div><p class="text-[8px] font-black text-slate-400 uppercase">Cliente</p><p class="text-sm font-black italic">${job.cliente}</p></div>
                        <div class="text-right"><p class="text-[8px] font-black text-orange-500 uppercase">${job.tipo}</p><p class="text-xs font-black">${job.preco}</p></div>
                    </div>
                    <p class="text-[10px] text-slate-500 italic"><i class="fas fa-map-marker-alt"></i> ${job.destino}</p>
                `;
                container.appendChild(card);
            });
        }

        function initMap() {
            setTimeout(() => {
                if(!document.getElementById('map').innerHTML) {
                    let m = L.map('map').setView([-23.55, -46.63], 15);
                    L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}').addTo(m);
                }
            }, 300);
        }
    </script>
</body>
</html>
