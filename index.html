<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VROOM MOTO v8.5 - Google Maps Integration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Scripts Google Maps (Aguardando Chave do Usuário para Ativação Plena) -->
    <!-- <script src="https://maps.googleapis.com/maps/api/js?key=SUA_CHAVE_AQUI&libraries=places"></script> -->
    
    <!-- Fallback Leaflet (Ativo para não quebrar o app sem chave) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        :root { --vroom: #FF6B00; }
        body { font-family: 'Inter', sans-serif; background: #0F172A; margin: 0; padding: 0; overflow-x: hidden; }
        .screen { display: none; min-height: 100vh; width: 100vw; flex-direction: column; background: #F8FAFC; }
        .screen.active { display: flex; }
        .vroom-btn { background: var(--vroom); color: white; font-weight: 800; text-transform: uppercase; border-radius: 18px; transition: 0.2s; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .input-vroom { background: #F1F5F9; border: 2px solid #E2E8F0; padding: 14px; border-radius: 16px; outline: none; font-weight: 600; width: 100%; color: #1E293B; font-size: 14px; }
        #map { height: 400px; width: 100%; z-index: 1; border-bottom: 4px solid var(--vroom); }
        .driver-panel { position: fixed; top: 10px; left: 10px; right: 10px; background: white; border-radius: 20px; padding: 12px 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); z-index: 100; display: none; border-left: 5px solid var(--vroom); }
        .driver-panel.active { display: flex; animation: slideDown 0.4s ease-out; }
        @keyframes slideDown { from { transform: translateY(-100%); } to { transform: translateY(0); } }
    </style>
</head>
<body onload="checkFirstAccess()">

    <!-- PORTAL PRINCIPAL -->
    <div id="screen-portal" class="screen items-center justify-center p-8 !bg-[#0F172A] text-white">
        <div class="text-center mb-12">
            <i class="fas fa-motorcycle text-7xl text-orange-500 mb-4"></i>
            <h1 class="text-5xl font-black italic tracking-tighter uppercase leading-none">VROOM<span class="text-orange-500">MOTO</span></h1>
            <p class="text-slate-500 text-[10px] font-bold uppercase mt-2 italic tracking-[0.2em]">Google Maps Quality v8.5</p>
        </div>
        <div class="w-full max-w-xs space-y-4">
            <button onclick="nav('cliente-login')" class="w-full vroom-btn py-5 text-lg shadow-2xl shadow-orange-500/20">Pedir uma Moto</button>
            <button onclick="nav('motorista-login')" class="w-full bg-slate-800 py-5 rounded-2xl font-black uppercase text-xs text-white">Acesso Motorista</button>
            <button onclick="nav('adm-login')" class="w-full bg-transparent border-2 border-slate-700 text-slate-500 py-3 rounded-2xl text-[9px] font-black uppercase">Painel Master</button>
        </div>
    </div>

    <!-- TELA: APP CLIENTE (GOOGLE MAPS UI) -->
    <div id="screen-cliente-app" class="screen !bg-white">
        <!-- PAINEL SUPERIOR -->
        <div id="driver-status" class="driver-panel items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-slate-100 rounded-full flex items-center justify-center border-2 border-orange-500"><i class="fas fa-user text-slate-400"></i></div>
                <div><p class="text-[10px] font-black text-slate-400 uppercase leading-none">Motorista a caminho</p><p class="text-sm font-black italic">Rodolfo Oliveira</p></div>
            </div>
            <div class="text-right"><p class="text-[8px] font-black uppercase text-slate-400">Chegada</p><p class="text-lg font-black text-orange-500 italic leading-none">3 min</p></div>
        </div>

        <div id="map"></div>
        
        <div class="flex-1 p-6 space-y-4 -mt-10 bg-white rounded-t-[40px] shadow-2xl z-20 overflow-y-auto pb-12">
            <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-2"></div>
            
            <div class="space-y-1">
                <label class="text-[9px] font-black text-slate-400 uppercase ml-2">Sua Localização (Google Precise)</label>
                <div class="relative">
                    <i class="fas fa-dot-circle text-blue-500 absolute left-4 top-4"></i>
                    <input type="text" id="loc-origem" value="Localizando pelo Google..." readonly class="input-vroom !pl-10 !bg-slate-50 !border-none text-xs">
                </div>
            </div>

            <div class="space-y-1">
                <label class="text-[9px] font-black text-slate-400 uppercase ml-2">Para onde você vai?</label>
                <div class="relative">
                    <i class="fas fa-map-marked-alt text-slate-400 absolute left-4 top-4"></i>
                    <input type="text" id="loc-destino" placeholder="Digite o destino ou nome do local..." class="input-vroom !pl-10" oninput="autoCalc()">
                </div>
            </div>

            <div id="price-card" class="hidden p-5 bg-orange-50 border-2 border-orange-100 rounded-3xl flex justify-between items-center">
                <div><p class="text-[9px] font-black text-orange-600 uppercase italic" id="ride-type">Municipal</p><p class="text-3xl font-black italic" id="ride-price">R$ 7,00</p></div>
                <div class="text-right">
                    <p class="text-[9px] font-bold text-slate-400 uppercase mb-1">Pagamento</p>
                    <div class="flex gap-1 text-slate-800 font-black text-xs uppercase"><i class="fas fa-money-bill-wave"></i> Dinheiro</div>
                </div>
            </div>

            <button onclick="confirmarPedido()" id="btn-confirm" class="w-full vroom-btn py-5 shadow-xl shadow-orange-500/20">Confirmar Corrida</button>
            <button onclick="cancelarPedido()" id="btn-cancel" class="hidden w-full bg-slate-100 text-slate-400 py-4 rounded-2xl font-black uppercase text-xs">Cancelar</button>
        </div>
    </div>

    <!-- TELAS AUXILIARES -->
    <div id="screen-cliente-login" class="screen p-8 justify-center items-center"><div class="text-center w-full"><h2 class="text-2xl font-black italic mb-6">BEM-VINDO</h2><input type="text" id="cli-nome" placeholder="Seu Nome" class="input-vroom mb-3"><input type="tel" id="cli-tel" placeholder="WhatsApp" class="input-vroom mb-6"><button onclick="registrarCliente()" class="w-full vroom-btn py-5">Entrar</button></div></div>
    <div id="screen-motorista-login" class="screen p-8 justify-center items-center"><div class="text-center w-full"><h2 class="text-2xl font-black italic mb-6">MOTORISTA</h2><input type="text" id="mot-user" class="input-vroom mb-3" value="Rodolfo Oliveira"><input type="password" id="mot-pass" class="input-vroom mb-6" value="Rm280198"><button onclick="checkMotorista()" class="w-full vroom-btn py-5">Ficar Online</button></div></div>
    <div id="screen-adm-login" class="screen p-8 justify-center items-center"><div class="text-center w-full"><h2 class="text-2xl font-black italic mb-6">ADM</h2><input type="text" id="adm-user" class="input-vroom mb-3" value="Rodolfo Oliveira"><input type="password" id="adm-pass" class="input-vroom mb-6" value="Rm290198"><button onclick="checkAdm()" class="w-full vroom-btn py-4">Acessar Master</button></div></div>

    <script>
        let map;
        function nav(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            const target = document.getElementById('screen-' + id);
            if(target) target.classList.add('active');
            if(id === 'cliente-app') initMap();
        }
        function checkFirstAccess() {
            const c = localStorage.getItem('vroom_cliente');
            if(c) { document.getElementById('user-display-name'); nav('cliente-app'); }
            else nav('portal');
        }
        function registrarCliente() {
            const n = document.getElementById('cli-nome').value;
            const t = document.getElementById('cli-tel').value;
            if(!n || !t) return alert('Preencha tudo!');
            localStorage.setItem('vroom_cliente', JSON.stringify({nome:n, tel:t}));
            nav('cliente-app');
        }
        function initMap() {
            setTimeout(() => {
                if(!map) {
                    // Estrutura preparada para o Google Maps, usando Leaflet como motor de renderização gratuito
                    // Para precisão Google, o sistema agora usa o Geolocation API nativo de alta precisão
                    map = L.map('map').setView([-23.55, -46.63], 15);
                    L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}').addTo(map); // Camada Google Maps
                    if(navigator.geolocation) {
                        navigator.geolocation.getCurrentPosition(pos => {
                            const { latitude, longitude } = pos.coords;
                            map.setView([latitude, longitude], 17);
                            L.marker([latitude, longitude]).addTo(map).bindPopup('Sua localização exata').openPopup();
                            fetch(`https://nominatim.openstreetmap.org/reverse?lat=${latitude}&lon=${longitude}&format=json`)
                                .then(r => r.json()).then(data => {
                                    document.getElementById('loc-origem').value = data.display_name.split(',')[0] + ', ' + data.display_name.split(',')[1];
                                });
                        }, () => { alert('Ative o GPS para alta precisão Google.'); }, { enableHighAccuracy: true });
                    }
                }
                map.invalidateSize();
            }, 300);
        }
        function autoCalc() {
            const d = document.getElementById('loc-destino').value;
            const c = document.getElementById('price-card');
            if(d.length > 3) {
                c.classList.remove('hidden');
                if(d.toLowerCase().includes('inter')) {
                    document.getElementById('ride-type').innerText = "Intermunicipal (KM)";
                    document.getElementById('ride-price').innerText = "R$ 24,00";
                } else {
                    document.getElementById('ride-type').innerText = "Municipal (Fixo)";
                    document.getElementById('ride-price').innerText = "R$ 7,00";
                }
            } else c.classList.add('hidden');
        }
        function confirmarPedido() {
            const b = document.getElementById('btn-confirm');
            b.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Buscando no Google Maps...';
            setTimeout(() => {
                alert('Sua moto foi solicitada com sucesso!');
                b.innerHTML = 'Aguardando Chegada';
                document.getElementById('btn-cancel').classList.remove('hidden');
            }, 2000);
        }
        function cancelarPedido() { if(confirm('Cancelar?')) window.location.reload(); }
        function checkMotorista() { alert('Online na Fila de Espera!'); }
        function checkAdm() { alert('Painel Master Ativo!'); }
    </script>
</body>
</html>
