<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vroom Moto - Controle de Combustível</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .btn-primary { background-color: #ffc107; border: none; color: #000; font-weight: bold; }
        .btn-primary:hover { background-color: #e0a800; color: #000; }
        .header { background-color: #212529; color: #ffc107; padding: 20px 0; text-align: center; margin-bottom: 30px; border-bottom: 4px solid #ffc107; }
        .stats-card { text-align: center; padding: 15px; }
        .stats-val { font-size: 1.5rem; font-weight: bold; color: #212529; }
        .stats-label { color: #6c757d; font-size: 0.9rem; }
        .history-table { background: white; border-radius: 10px; overflow: hidden; }
    </style>
</head>
<body>

<div class="header">
    <h1><i class="bi bi-fuel-pump-fill"></i> Vroom Moto</h1>
    <p class="mb-0">Controle de Combustível</p>
</div>

<div class="container">
    <!-- Dashboard -->
    <div class="row mb-4">
        <div class="col-6 col-md-3">
            <div class="card stats-card">
                <div class="stats-label">Total Gasto</div>
                <div class="stats-val" id="totalSpent">R$ 0,00</div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card stats-card">
                <div class="stats-label">Média KM/L</div>
                <div class="stats-val" id="avgConsum">0,00</div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card stats-card">
                <div class="stats-label">Total Litros</div>
                <div class="stats-val" id="totalLiters">0,0 L</div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card stats-card">
                <div class="stats-label">KM Rodados</div>
                <div class="stats-val" id="totalKM">0</div>
            </div>
        </div>
    </div>

    <!-- Novo Registro -->
    <div class="card">
        <div class="card-body">
            <h5 class="card-title mb-3"><i class="bi bi-plus-circle"></i> Novo Abastecimento</h5>
            <form id="fuelForm">
                <div class="row g-3">
                    <div class="col-md-3 col-6">
                        <label class="form-label">Data</label>
                        <input type="date" class="form-control" id="date" required>
                    </div>
                    <div class="col-md-3 col-6">
                        <label class="form-label">Odômetro (KM)</label>
                        <input type="number" class="form-control" id="km" placeholder="00000" required>
                    </div>
                    <div class="col-md-2 col-6">
                        <label class="form-label">Litros</label>
                        <input type="number" step="0.01" class="form-control" id="liters" placeholder="0.00" required>
                    </div>
                    <div class="col-md-2 col-6">
                        <label class="form-label">Preço p/ L</label>
                        <input type="number" step="0.01" class="form-control" id="price" placeholder="R$ 0.00" required>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">&nbsp;</label>
                        <button type="submit" class="btn btn-primary w-100">Salvar</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Histórico -->
    <div class="card">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="card-title mb-0"><i class="bi bi-clock-history"></i> Histórico</h5>
                <button class="btn btn-sm btn-outline-secondary" onclick="exportCSV()"><i class="bi bi-download"></i> Exportar</button>
            </div>
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>Data</th>
                            <th>KM</th>
                            <th>Litros</th>
                            <th>Preço/L</th>
                            <th>Total</th>
                            <th>KM/L</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="historyBody">
                        <!-- Gerado via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    let logs = JSON.parse(localStorage.getItem('vroom_fuel_logs')) || [];

    document.getElementById('date').valueAsDate = new Date();

    const form = document.getElementById('fuelForm');
    form.addEventListener('submit', (e) => {
        e.preventDefault();
        const newLog = {
            id: Date.now(),
            date: document.getElementById('date').value,
            km: parseFloat(document.getElementById('km').value),
            liters: parseFloat(document.getElementById('liters').value),
            price: parseFloat(document.getElementById('price').value)
        };
        logs.push(newLog);
        logs.sort((a, b) => new Date(b.date) - new Date(a.date));
        saveAndRefresh();
        form.reset();
        document.getElementById('date').valueAsDate = new Date();
    });

    function saveAndRefresh() {
        localStorage.setItem('vroom_fuel_logs', JSON.stringify(logs));
        render();
    }

    function deleteLog(id) {
        if(confirm('Excluir este registro?')) {
            logs = logs.filter(l => l.id !== id);
            saveAndRefresh();
        }
    }

    function render() {
        const body = document.getElementById('historyBody');
        body.innerHTML = '';
        
        let totalSpent = 0;
        let totalLiters = 0;
        let minKM = logs.length > 0 ? logs[logs.length-1].km : 0;
        let maxKM = logs.length > 0 ? logs[0].km : 0;

        logs.forEach((log, index) => {
            const total = log.liters * log.price;
            totalSpent += total;
            totalLiters += log.liters;

            let kml = '-';
            if (index < logs.length - 1) {
                const prevLog = logs[index + 1];
                const kmDiff = log.km - prevLog.km;
                kml = (kmDiff / log.liters).toFixed(2);
            }

            const row = `<tr>
                <td>${log.date.split('-').reverse().join('/')}</td>
                <td>${log.km}</td>
                <td>${log.liters}L</td>
                <td>R$ ${log.price.toFixed(2)}</td>
                <td>R$ ${total.toFixed(2)}</td>
                <td><span class="badge bg-success">${kml}</span></td>
                <td class="text-end"><i class="bi bi-trash text-danger" style="cursor:pointer" onclick="deleteLog(${log.id})"></i></td>
            </tr>`;
            body.innerHTML += row;
        });

        document.getElementById('totalSpent').innerText = `R$ ${totalSpent.toFixed(2)}`;
        document.getElementById('totalLiters').innerText = `${totalLiters.toFixed(1)} L`;
        
        const kmRodados = logs.length > 1 ? (logs[0].km - logs[logs.length-1].km) : 0;
        document.getElementById('totalKM').innerText = kmRodados;

        const avg = totalLiters > 0 && kmRodados > 0 ? (kmRodados / (totalLiters - logs[logs.length-1].liters)).toFixed(2) : '0,00';
        document.getElementById('avgConsum').innerText = avg;
    }

    function exportCSV() {
        if (logs.length === 0) return alert('Sem dados para exportar');
        let csv = 'Data,KM,Litros,PrecoPorLitro,Total\n';
        logs.forEach(l => {
            csv += `${l.date},${l.km},${l.liters},${l.price},${(l.liters * l.price).toFixed(2)}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.setAttribute('href', url);
        a.setAttribute('download', 'combustivel_vroom.csv');
        a.click();
    }

    render();
</script>

</body>
</html>
