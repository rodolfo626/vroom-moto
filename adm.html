<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAINEL ADM v21.0 - Rodolfo Oliveira</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #020617; color: white; font-family: sans-serif; }
        .adm-card { background: #0f172a; border: 1px solid #1e293b; border-radius: 20px; padding: 20px; }
        .btn-approve { background: #22c55e; color: #052e16; font-weight: 900; padding: 10px; border-radius: 12px; width: 100%; text-transform: uppercase; font-size: 11px; }
        .btn-deny { background: #ef4444; color: #450a0a; font-weight: 900; padding: 10px; border-radius: 12px; width: 100%; text-transform: uppercase; font-size: 11px; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-2xl mx-auto">
        <header class="flex justify-between items-end mb-10">
            <div>
                <h1 class="text-3xl font-black italic tracking-tighter">VROOM<span class="text-orange-500">ADM</span></h1>
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.3em]">Gestão de Ecossistema v21.0</p>
            </div>
            <button onclick="location.href='index.html'" class="text-[10px] font-bold text-slate-600 uppercase border border-slate-800 px-4 py-2 rounded-full">Sair do Painel</button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- COLUNA 1: RECRUTAMENTO -->
            <section>
                <h2 class="text-xs font-black uppercase text-orange-500 mb-4 flex items-center gap-2">
                    <i class="fas fa-user-plus"></i> Novos Candidatos
                </h2>
                <div id="lista-pendentes" class="space-y-4"></div>
            </section>

            <!-- COLUNA 2: FROTA ATIVA -->
            <section>
                <h2 class="text-xs font-black uppercase text-green-500 mb-4 flex items-center gap-2">
                    <i class="fas fa-check-double"></i> Frota Ativa (Monitoramento)
                </h2>
                <div id="lista-ativos" class="space-y-3"></div>
            </section>
        </div>
    </div>

    <script>
        function load() {
            renderPendentes();
            renderAtivos();
        }

        function renderPendentes() {
            const container = document.getElementById('lista-pendentes');
            let p = JSON.parse(localStorage.getItem('vroom_v21_pendentes') || '[]');
            if(p.length === 0) return container.innerHTML = '<p class="text-slate-800 text-[10px] font-bold uppercase italic py-10 text-center">Nenhum cadastro pendente</p>';
            
            container.innerHTML = p.map(item => `
                <div class="adm-card space-y-4">
                    <div>
                        <p class="font-black italic text-lg leading-tight">${item.nome}</p>
                        <p class="text-[10px] text-slate-500 font-bold uppercase">CPF: ${item.cpf} | CNH: ${item.cnh}</p>
                    </div>
                    <div class="bg-slate-950 p-3 rounded-xl text-[10px] space-y-1">
                        <p class="text-slate-400 font-bold uppercase tracking-tight italic">Veículo</p>
                        <p class="text-orange-500 font-black uppercase">${item.modelo} - ${item.placa}</p>
                        <p class="text-slate-500 uppercase">${item.corAno}</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="aprovar(${item.id})" class="btn-approve italic">Aprovar</button>
                        <button onclick="reprovar(${item.id})" class="btn-deny italic">Recusar</button>
                    </div>
                </div>
            `).join('');
        }

        function renderAtivos() {
            const container = document.getElementById('lista-ativos');
            let a = JSON.parse(localStorage.getItem('vroom_v21_ativos') || '[]');
            if(a.length === 0) return container.innerHTML = '<p class="text-slate-800 text-[10px] font-bold uppercase italic py-10 text-center">Nenhum piloto ativo</p>';

            container.innerHTML = a.map(item => `
                <div class="flex justify-between items-center bg-slate-900 border border-slate-800 p-4 rounded-2xl">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-green-500/10 rounded-xl flex items-center justify-center text-green-500 font-black italic">V</div>
                        <div>
                            <p class="text-xs font-black italic">${item.nome}</p>
                            <p class="text-[9px] text-slate-500 uppercase font-bold tracking-widest">${item.placa}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-green-500"></span>
                        <span class="text-[9px] font-black uppercase text-green-500 italic">Disponível</span>
                    </div>
                </div>
            `).join('');
        }

        function aprovar(id) {
            let pend = JSON.parse(localStorage.getItem('vroom_v21_pendentes') || '[]');
            let ativos = JSON.parse(localStorage.getItem('vroom_v21_ativos') || '[]');
            const idx = pend.findIndex(x => x.id === id);
            const motoboy = pend.splice(idx, 1)[0];
            ativos.push(motoboy);
            localStorage.setItem('vroom_v21_pendentes', JSON.stringify(pend));
            localStorage.setItem('vroom_v21_ativos', JSON.stringify(ativos));
            load();
        }

        function reprovar(id) {
            if(!confirm("Apagar cadastro?")) return;
            let pend = JSON.parse(localStorage.getItem('vroom_v21_pendentes') || '[]');
            const idx = pend.findIndex(x => x.id === id);
            pend.splice(idx, 1);
            localStorage.setItem('vroom_v21_pendentes', JSON.stringify(pend));
            load();
        }

        load();
    </script>
</body>
</html>
