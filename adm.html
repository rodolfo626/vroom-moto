<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ADM MASTER v21.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>body { background: #020617; color: white; font-family: 'Inter', sans-serif; }</style>
</head>
<body class="p-6">
    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-4xl font-black italic tracking-tighter leading-none">ADM<span class="text-orange-500">MASTER</span></h1>
                <p class="text-[9px] text-slate-500 font-bold uppercase tracking-[0.3em] mt-1">Gestão Completa Rodolfo Oliveira</p>
            </div>
            <button onclick="location.href='index.html'" class="text-xs font-bold text-slate-600 border border-slate-800 px-5 py-2 rounded-full uppercase italic">Sair</button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            <div class="bg-slate-900 border border-slate-800 p-6 rounded-3xl">
                <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Faturamento Bruto</p>
                <p class="text-3xl font-black text-white italic mt-1">R$ 2.450,00</p>
            </div>
            <div class="bg-slate-900 border border-slate-800 p-6 rounded-3xl">
                <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Corridas (Hoje)</p>
                <p class="text-3xl font-black text-orange-500 italic mt-1">42</p>
            </div>
            <div class="bg-slate-900 border border-slate-800 p-6 rounded-3xl">
                <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Lucro do Sistema</p>
                <p class="text-3xl font-black text-green-500 italic mt-1">R$ 612,00</p>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
            <section>
                <h2 class="text-xs font-black uppercase text-orange-500 mb-6 flex items-center gap-2 italic tracking-widest">
                    <i class="fas fa-user-clock"></i> Pendentes de Aprovação
                </h2>
                <div id="lista-pendentes" class="space-y-4"></div>
            </section>
            <section>
                <h2 class="text-xs font-black uppercase text-green-500 mb-6 flex items-center gap-2 italic tracking-widest">
                    <i class="fas fa-users"></i> Gestão da Frota Ativa
                </h2>
                <div id="lista-ativos" class="space-y-4"></div>
            </section>
        </div>
    </div>

    <script>
        function load() {
            const p = JSON.parse(localStorage.getItem('vroom_v21_pendentes') || '[]');
            const a = JSON.parse(localStorage.getItem('vroom_v21_ativos') || '[]');
            
            document.getElementById('lista-pendentes').innerHTML = p.map(x => `
                <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800">
                    <p class="font-black italic text-lg mb-1">${x.nome}</p>
                    <p class="text-[10px] text-slate-500 uppercase font-bold mb-4">Placa: ${x.placa}</p>
                    <div class="flex gap-2">
                        <button onclick="aprovar(${x.id})" class="flex-1 bg-green-600 py-3 rounded-2xl font-black text-[10px] uppercase italic text-green-100">Aprovar</button>
                        <button onclick="reprovar(${x.id})" class="flex-1 bg-red-900/20 py-3 rounded-2xl font-black text-[10px] uppercase italic text-red-500 border border-red-900/30">Recusar</button>
                    </div>
                </div>
            `).join('') || '<p class="text-slate-800 text-xs italic">Nenhum pendente...</p>';

            document.getElementById('lista-ativos').innerHTML = a.map(x => `
                <div class="flex justify-between items-center bg-slate-900 p-5 rounded-3xl border border-slate-800">
                    <div>
                        <p class="text-sm font-black italic">${x.nome}</p>
                        <p class="text-[9px] text-green-500 font-bold uppercase tracking-widest">Ativo e Online</p>
                    </div>
                    <button onclick="remover(${x.id})" class="text-slate-700 hover:text-red-500 transition-colors"><i class="fas fa-trash-alt text-lg"></i></button>
                </div>
            `).join('') || '<p class="text-slate-800 text-xs italic">Frota vazia...</p>';
        }

        function aprovar(id) {
            let p = JSON.parse(localStorage.getItem('vroom_v21_pendentes') || '[]');
            let a = JSON.parse(localStorage.getItem('vroom_v21_ativos') || '[]');
            const i = p.findIndex(x => x.id === id);
            a.push(p.splice(i,1)[0]);
            localStorage.setItem('vroom_v21_pendentes', JSON.stringify(p));
            localStorage.setItem('vroom_v21_ativos', JSON.stringify(a));
            load();
        }

        function reprovar(id) {
            let p = JSON.parse(localStorage.getItem('vroom_v21_pendentes') || '[]');
            const i = p.findIndex(x => x.id === id);
            p.splice(i,1);
            localStorage.setItem('vroom_v21_pendentes', JSON.stringify(p));
            load();
        }

        function remover(id) {
            let a = JSON.parse(localStorage.getItem('vroom_v21_ativos') || '[]');
            const i = a.findIndex(x => x.id === id);
            a.splice(i,1);
            localStorage.setItem('vroom_v21_ativos', JSON.stringify(a));
            load();
        }

        load();
    </script>
</body>
</html>
