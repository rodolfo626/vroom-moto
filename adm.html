<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ADM VROOM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background: #f1f5f9; }</style>
</head>
<body class="p-6">
    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-black mb-6">VROOM <span class="text-orange-500">ADM</span></h1>
        <div id="lista" class="space-y-4"></div>
        <button onclick="location.href='index.html'" class="mt-8 text-slate-400 font-bold text-sm uppercase">Sair</button>
    </div>

    <script>
        function render() {
            const db = JSON.parse(localStorage.getItem('vroom_db') || '[]');
            document.getElementById('lista').innerHTML = db.map(x => `
                <div class="bg-white p-4 rounded-xl shadow-sm flex justify-between items-center">
                    <div>
                        <p class="font-bold">${x.nome}</p>
                        <p class="text-xs text-slate-400">User: ${x.user}</p>
                    </div>
                    <button onclick="aprovar(${x.id})" class="bg-green-500 text-white px-3 py-1 rounded-lg text-xs font-bold uppercase">Aprovar</button>
                </div>
            `).join('') || '<p class="text-slate-400 italic">Sem novos cadastros.</p>';
        }

        function aprovar(id) {
            let db = JSON.parse(localStorage.getItem('vroom_db') || '[]');
            let ativos = JSON.parse(localStorage.getItem('vroom_ativos') || '[]');
            const i = db.findIndex(x => x.id === id);
            ativos.push(db.splice(i, 1)[0]);
            localStorage.setItem('vroom_db', JSON.stringify(db));
            localStorage.setItem('vroom_ativos', JSON.stringify(ativos));
            render();
        }
        render();
    </script>
</body>
</html>
